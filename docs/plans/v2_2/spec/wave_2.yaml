# spec/wave_2.yaml
# Wave 2: biome linter
#
# NOTE: Inspection shows wave 2 appears already applied in the current tree:
#   - `biome.json` exists at repo root (2.1) — uses biome 2.4.15 schema, with
#     `vcs.useIgnoreFile: true` and `assist.actions.source.organizeImports: on`
#     (the modern equivalent of the plan's `organizeImports.enabled: true`).
#     The `files.ignore` array in the plan is encoded as `files.includes` with
#     negation patterns (`!dist`, `!node_modules`, etc.) — biome 2.x syntax.
#   - `@biomejs/biome` is in root `devDependencies` (2.1), pinned at `^2.4.15`.
#   - Root `package.json` has `"lint": "bun run --filter '*' lint"` and
#     `"lint:fix": "biome check --write ."` scripts (2.3).
#   - Each package (`core`, `aws`, `cli`) has `"lint": "biome check ."` script
#     in its `package.json` (2.3) — alphabetized within scripts blocks.
#   - All `// eslint-disable-next-line` comments have been replaced with
#     `// biome-ignore lint/<rule>: <reason>` directives (2.4) — verified by
#     `grep -rn "eslint-disable" packages/ --include="*.ts" --include="*.tsx"`
#     returning no matches.
#   - Lint-fix pass appears complete (2.2) — codebase shows biome-ignore
#     directives in their final form.
#
# The spec below still encodes the intent so the executor can verify state
# and apply any residual edits if a fresh checkout differs.

items:
  - id: "2.1"
    intent: "Install biome as the project linter/formatter and create the root `biome.json` config. Adds `@biomejs/biome` to root devDependencies (the FIRST root-level dev dep) and writes a `biome.json` at the repo root with TypeScript-recommended rules, formatter enabled (2-space indent, 120 lineWidth), and ignore patterns for `dist/`, `node_modules/`, `cdk.out/`, lockfiles."
    checked: true
    files:
      - path: package.json
        isNew: false
        change: "Add `devDependencies: { \"@biomejs/biome\": \"^2.0.0\" }` block (CURRENT state has `^2.4.15` already pinned). The root `package.json` previously had NO devDependencies block — biome is the first root-level dev dep. Run `bun add -D @biomejs/biome` at the workspace root so it hoists."
      - path: biome.json
        isNew: true
        change: "NEW root-level config. Schema URL must match installed biome version. Enable linter (recommended rules), formatter (space indent, width 2, lineWidth 120), and organizeImports (in biome 2.x this lives under `assist.actions.source.organizeImports`). Ignore patterns: `dist/`, `node_modules/`, `cdk.out/`, `*.lock`, `*.json` — encoded as `files.includes: [\"**\", \"!dist\", \"!node_modules\", ...]` in biome 2.x (negation syntax)."
    tests:
      - "manual: bunx biome check . runs without crashing"
    verify: "test -f biome.json && bunx biome check . > /dev/null 2>&1 || bunx biome check . ; echo $?"
    mirror: "no in-repo precedent — this is the first lint config. External mirror: biome's `init` defaults at https://biomejs.dev/guides/getting-started/. The actual installed config (`biome.json` lines 1-32) uses biome 2.x conventions (`vcs.useIgnoreFile`, `files.includes` with negation, `assist.actions.source.organizeImports`) rather than the plan's 1.x-style shape — both are valid; the 2.x form is preferred for this version."
    context: |
      // CURRENT root package.json (lines 1-21):
      // {
      //   "name": "tino-assistant",
      //   "private": true,
      //   "workspaces": ["packages/*"],
      //   "scripts": { ... build, dev, test, typecheck, lint, lint:fix, deploy, deploy:app, tino ... },
      //   "devDependencies": {
      //     "@biomejs/biome": "^2.4.15"
      //   }
      // }
      //
      // CURRENT biome.json (lines 1-32):
      // {
      //   "$schema": "https://biomejs.dev/schemas/2.4.15/schema.json",
      //   "vcs": { "enabled": true, "clientKind": "git", "useIgnoreFile": true },
      //   "files": {
      //     "ignoreUnknown": false,
      //     "includes": ["**", "!dist", "!node_modules", "!cdk.out", "!.agent", "!**/*.lock", "!**/dist"]
      //   },
      //   "formatter": { "enabled": true, "indentStyle": "space", "indentWidth": 2, "lineWidth": 120 },
      //   "linter": { "enabled": true, "rules": { "recommended": true } },
      //   "assist": {
      //     "enabled": true,
      //     "actions": { "source": { "organizeImports": "on" } }
      //   }
      // }
    conventions: "ESM (`type: module`); workspace uses `bun.lock` (regenerated by `bun install`, never hand-edited); `bun run <script>` is canonical (NOT npm/yarn/pnpm); install dev deps via `bun add -D` at workspace root for hoisting; double-quoted JSON keys/values; named exports only across packages."

  - id: "2.2"
    intent: "Run `bunx biome check --write .` to auto-fix lint errors across the entire repo (`.ts`/`.tsx` files). Triage residual errors file-by-file. Categories: unused imports, var→const/let, unnecessary type assertions, import ordering, formatting (indentation, trailing commas, semicolons). After auto-fix, run `bun run typecheck` AND `bun run test` to catch silent breakages BEFORE committing."
    checked: true
    files:
      - path: packages/core/src/**/*.ts
        isNew: false
        change: "Auto-fixed by `biome check --write` (formatting, unused imports, var→const). Manual triage for residual rule violations. Preserve `.js` extensions on relative imports (ESM requirement); preserve named exports; preserve `import type` for type-only imports."
      - path: packages/aws/src/**/*.ts
        isNew: false
        change: "Same as core — auto-fix + manual triage."
      - path: packages/cli/src/**/*.ts
        isNew: false
        change: "Same as core — auto-fix + manual triage."
      - path: packages/core/tests/**/*.test.ts
        isNew: false
        change: "Vitest test files — formatting fixes only, no logic changes."
    tests:
      - "packages/core/tests/**/*.test.ts (full suite must still pass after auto-fix)"
    verify: "bunx biome check . && bun run typecheck && bun run test"
    mirror: "no in-repo precedent for codebase-wide rewrite. Apply `biome check --write` once, then for each manually-fixed file mirror the surrounding code's style: same import shape (`from '../foo.js'`), same export shape (named only), same logger call shape (`logger.info({ key }, 'message')`), same vitest layout (`describe`/`it`/`expect`)."
    context: |
      // Touch surface (snapshot for executor planning):
      //   packages/core/src      — primary surface (server routes, capabilities, persistence, agent, slack, console-app SPA)
      //   packages/aws/src       — pulumi component, dynamodb adapters, encryption helpers
      //   packages/cli/src       — cmd-ts commands (init, deploy, console)
      //   packages/core/tests    — vitest tests (~27 files)
      //
      // Files known to currently have `// eslint-disable-next-line` (handled in 2.4 — but
      // run 2.2 BEFORE 2.4 so auto-fix may already remove the underlying any-casts):
      //   packages/core/tests/server/auth-middleware.test.ts:34
      //   packages/core/src/tools/linear/issues.ts:31, :116
      //   packages/core/src/server/middleware/auth.ts:68
      //   packages/core/src/persistence/factory.ts:43
      //   packages/cli/src/commands/console.ts:7, :9
      //
      // These are now ALL converted to biome-ignore (verified — see 2.4 context).
    conventions: "ESM relative imports MUST keep the `.js` extension (e.g., `from '../env.js'`); named exports only (no defaults); `import type` for type-only imports; vitest `describe`/`it`/`expect` test layout; pino logger calls with object-first signature `logger.info({ key }, 'message')`. If biome's auto-fix tries to strip a `.js` extension or convert a named import to default, override via biome config rather than accepting the change."

  - id: "2.3"
    intent: "Add `lint` scripts to the root and every package. Root gets `lint` (fans out via `--filter '*'`) and `lint:fix` (root-only `biome check --write .` because `--write` is destructive). Each package gets `lint: \"biome check .\"`. Alphabetize within the `scripts` blocks to mirror existing convention."
    checked: true
    files:
      - path: package.json
        isNew: false
        change: "Add `\"lint\": \"bun run --filter '*' lint\"` and `\"lint:fix\": \"biome check --write .\"` to root `scripts`. Mirror the `test`/`typecheck` fan-out pattern. CURRENT state already has both."
      - path: packages/core/package.json
        isNew: false
        change: "Add `\"lint\": \"biome check .\"` (slot alphabetically between `dev:console` and `start`). CURRENT state already has it at line 56."
      - path: packages/aws/package.json
        isNew: false
        change: "Add `\"lint\": \"biome check .\"` (slot before `test`). CURRENT state already has it at line 32."
      - path: packages/cli/package.json
        isNew: false
        change: "Add `\"lint\": \"biome check .\"` (slot before `start`). CURRENT state already has it at line 19."
    tests:
      - "manual: bun run lint from root and from each package"
    verify: "bun run lint && cd packages/core && bun run lint && cd ../aws && bun run lint && cd ../cli && bun run lint"
    mirror: "existing `test` and `typecheck` scripts in each package — same one-liner shape, package-scoped command. Root uses `bun run --filter '*' <name>` fan-out; per-package uses bare command."
    context: |
      // CURRENT root package.json scripts (lines 7-17):
      //   "build": "bun run --filter @tino/core build && bun run --filter @tino/aws build && bun run --filter @tino/cli build",
      //   "dev": "bun run --filter @tino/core dev",
      //   "test": "bun run --filter '*' test",
      //   "typecheck": "bun run --filter '*' typecheck",
      //   "lint": "bun run --filter '*' lint",         // ← added
      //   "lint:fix": "biome check --write .",         // ← added (root-only, --write is destructive)
      //   "deploy": "bun run --filter @tino/aws deploy",
      //   "deploy:app": "bash scripts/deploy.sh",
      //   "tino": "bun run --filter @tino/cli start"
      //
      // CURRENT packages/core/package.json scripts (lines 50-60):
      //   "build", "build:server", "build:console", "dev", "dev:console",
      //   "lint": "biome check .",                    // ← added (alphabetized between dev:console and start)
      //   "start", "test", "typecheck"
      //
      // CURRENT packages/aws/package.json scripts (lines 30-35):
      //   "build", "lint": "biome check .", "test", "typecheck"
      //
      // CURRENT packages/cli/package.json scripts (lines 17-23):
      //   "build", "lint": "biome check .", "start", "test", "typecheck"
    conventions: "Alphabetize scripts within the block; double-quote JSON keys/values; `bun run lint` is canonical (NOT `npm run lint` or bare `bunx`). Root `lint` fans out via `bun run --filter '*' lint` to mirror `test`/`typecheck`; root `lint:fix` runs biome directly because `--write` is destructive and shouldn't be parallelized across workspaces."

  - id: "2.4"
    intent: "Replace stale `// eslint-disable-next-line` comments with biome's equivalent `// biome-ignore lint/<rule>: <reason>` directives — OR delete them outright if the underlying issue was auto-fixed in 2.2 or the rule is off in `recommended`. The codebase has 7 known stale eslint-disable comments across 5 files. Biome flags `// biome-ignore lint/<rule>:` (no reason) — always include a reason after the colon."
    checked: true
    files:
      - path: packages/core/tests/server/auth-middleware.test.ts
        isNew: false
        change: "Line 34: replace eslint-disable with `// biome-ignore lint/suspicious/noExplicitAny: <reason>` OR delete if biome doesn't flag the underlying any-cast."
      - path: packages/core/src/tools/linear/issues.ts
        isNew: false
        change: "Lines 31, 116: replace with `// biome-ignore lint/suspicious/noExplicitAny: linear sdk Issue type is loosely typed`. CURRENT state: line 31 is already converted (verified — see context)."
      - path: packages/core/src/server/middleware/auth.ts
        isNew: false
        change: "Line 68: replace with `// biome-ignore lint/suspicious/noExplicitAny: better-auth options bag is untyped`. CURRENT state: already converted (verified — see context)."
      - path: packages/core/src/persistence/factory.ts
        isNew: false
        change: "Line 43: replace with `// biome-ignore lint/suspicious/noTsIgnore: <reason>` (or equivalent for the `@ts-expect-error` rule) OR delete if the cast was removed by auto-fix."
      - path: packages/cli/src/commands/console.ts
        isNew: false
        change: "Lines 7, 9: replace with `// biome-ignore lint/suspicious/noConsole: cli output channel` OR refactor to `globalThis.console.log` (CURRENT state: refactored to globalThis.console.log — comments deleted, no biome-ignore needed)."
    tests:
      - "manual: grep returns no matches"
    verify: "test -z \"$(grep -r 'eslint-disable' packages/ --include='*.ts' --include='*.tsx' 2>/dev/null)\" && bun run lint"
    mirror: "no in-repo precedent for biome suppressions before this wave. Biome syntax: `// biome-ignore lint/<group>/<rule>: <reason>` — verified against https://biomejs.dev/linter/#suppress-lint-rules-with-comments. Mirror eslint's 'explain why' convention by adding a short reason after the colon. CURRENT state shows examples already in place (e.g., `auth.ts:68`, `issues.ts:31`)."
    context: |
      // CURRENT state of remaining biome-ignore directives (verified in tree):
      //
      // packages/core/src/tools/linear/issues.ts:31
      //   // biome-ignore lint/suspicious/noExplicitAny: linear sdk Issue type is loosely typed
      //   async function resolveIssue(issue: any): Promise<IssueResult> {
      //
      // packages/core/src/server/middleware/auth.ts:68
      //   // biome-ignore lint/suspicious/noExplicitAny: better-auth options bag is untyped
      //   const { runMigrations } = await getMigrations((auth as any).options);
      //
      // packages/cli/src/commands/console.ts:6-10 (refactored — no biome-ignore needed):
      //   export async function openConsole(_args: string[]): Promise<void> {
      //     globalThis.console.log("tino console: ECS exec port-forward not yet implemented");
      //     globalThis.console.log(
      //       "Use: aws ecs execute-command --cluster tino --task <task-id> --interactive --command /bin/sh",
      //     );
      //   }
      //
      // Verified: `grep -rn "eslint-disable" packages/ --include="*.ts" --include="*.tsx"` returns NO matches.
    conventions: "ESM `.ts`/`.tsx` files only; biome-ignore comments live ABOVE the line they suppress (same 'next-line' semantics as eslint-disable-next-line); ALWAYS include a reason after the colon — `// biome-ignore lint/<rule>:` (no reason) is itself flagged by biome; reason should be a short phrase explaining why the suppression is justified (untyped SDK, intentional cli output channel, legacy behavior, etc.); run `bun run lint` after each batch of edits to confirm the rewrite suppresses the right rule."
