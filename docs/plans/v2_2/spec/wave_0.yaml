  - id: "0.3"
    intent: "Switch the Dockerfile from `node:22-slim` to `oven/bun:1` for both build and runtime stages. Drop `RUN npm install -g bun` (no longer needed) and change the CMD to `bun run packages/core/dist/index.js`. Keep the `tsc` and `vite build` steps in the builder stage unchanged."
    checked: true
    files:
      - path: Dockerfile
        isNew: false
        change: "Line 1: `FROM node:22-slim AS deps` → `FROM oven/bun:1 AS deps`. Remove `RUN npm install -g bun` from the `deps` stage. Line ~21: `FROM node:22-slim AS runner` → `FROM oven/bun:1 AS runner`. Remove `RUN npm install -g bun` from `runner`. Final CMD: `[\"node\", \"packages/core/dist/index.js\"]` → `[\"bun\", \"run\", \"packages/core/dist/index.js\"]`. Keep all COPY and tsc/vite build steps unchanged. Note: `oven/bun:1` is Debian-based like `node:22-slim` so no other adjustments needed."
    tests:
      - "docker build (CI) and `docker run --rm tino bun --version`"
    verify: "docker build -t tino . && docker run --rm tino bun --version"
    mirror: "Dockerfile"
    context: |
      # Dockerfile — CURRENT state (already migrated; full file, 40 lines)
      FROM oven/bun:1 AS deps
      WORKDIR /app
      COPY package.json bun.lock* ./
      COPY packages/core/package.json ./packages/core/
      COPY packages/aws/package.json ./packages/aws/
      COPY packages/cli/package.json ./packages/cli/
      RUN bun install --frozen-lockfile

      FROM deps AS builder
      COPY packages/core/tsconfig.json packages/core/tsconfig.build.json packages/core/tsconfig.app.json packages/core/vite.config.ts ./packages/core/
      COPY packages/core/src ./packages/core/src
      COPY packages/aws/tsconfig.json packages/aws/tsconfig.build.json ./packages/aws/
      COPY packages/aws/src ./packages/aws/src
      RUN cd packages/core && \
          ./node_modules/.bin/tsc -p tsconfig.build.json && \
          ./node_modules/.bin/vite build && \
          cd ../aws && ./node_modules/.bin/tsc -p tsconfig.build.json

      FROM oven/bun:1 AS runner
      WORKDIR /app
      COPY --from=deps /app/node_modules ./node_modules
      # ... COPY steps ...
      ENV NODE_ENV=production
      CMD ["bun", "run", "packages/core/dist/index.js"]
    conventions: |
      Multi-stage build (`deps` → `builder` → `runner`); `WORKDIR /app`; ESM workspace
      layout copied into `/app/packages/*`; symlinks under `node_modules/@tino/*` for
      workspace resolution; `ENV NODE_ENV=production` in the runner stage; single `CMD`
      (not `ENTRYPOINT`); `oven/bun:1` (Debian-based, ~150MB) replaces `node:22-slim`
      everywhere — do not mix runtimes across stages.

