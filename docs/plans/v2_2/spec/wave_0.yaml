  - id: "0.5"
    intent: "Configure vitest to spawn Bun-runtime workers so `bun:sqlite` resolves inside tests. Add `pool: 'forks'` (and let the parent Bun process propagate via `bun --bun ./node_modules/vitest/dist/cli.js run` — already wired in the `test` npm script). Skip `packages/aws/vitest.config.ts` — it does not exist."
    checked: true
    files:
      - path: packages/core/vitest.config.ts
        isNew: false
        change: "Add `pool: 'forks'` under `test`. Forks inherit the Bun runtime via `process.execPath` because the parent vitest process is launched with `bun --bun` (see the `test` script in `packages/core/package.json`). Also add `server.deps.inline: ['zod']` to force vitest to bundle zod's ESM entry — Bun's native CJS/ESM interop mishandles zod's `index.js` re-export under vitest's Module Runner."
    tests:
      - "packages/core/tests/**/*.test.ts (full suite, ~267 tests)"
    verify: "cd packages/core && bun run test"
    mirror: "packages/core/vitest.config.ts"
    context: |
      // packages/core/vitest.config.ts — CURRENT state (already migrated; full file, 28 lines)
      import { defineConfig } from "vitest/config";

      // Bun runtime: tests must run under Bun so `bun:sqlite` resolves. The `test`
      // npm script invokes vitest via `bun --bun ./node_modules/vitest/dist/cli.js
      // run`, which makes the parent process Bun; child workers (forks) inherit
      // the Bun runtime via process.execPath.
      //
      // `server.deps.inline: ['zod']` forces vitest to bundle zod's ESM entry
      // instead of relying on Bun's native CJS/ESM interop, which mishandles
      // zod's `index.js` re-export under vitest's Module Runner.
      export default defineConfig({
        test: {
          include: ["tests/**/*.{test,spec}.{ts,tsx}", "src/**/*.{test,spec}.{ts,tsx}"],
          exclude: ["**/node_modules/**", "src/console-app/**"],
          pool: "forks",
          server: {
            deps: {
              inline: ["zod"],
            },
          },
        },
      });

      // package.json `test` script (REQUIRED for the Bun-fork inheritance to work):
      //   "test": "bun --bun ./node_modules/vitest/dist/cli.js run"
      //
      // NOTE: `packages/aws/vitest.config.ts` does NOT exist. The aws package has
      // no vitest config and no tests of its own — SKIP that file. Document the
      // absence in the executor return payload.
    conventions: |
      Vitest config uses `defineConfig` from `vitest/config`; ESM module syntax;
      top-level `test:` block with `include`/`exclude` globs; tests live under
      `packages/core/tests/**/*.test.ts` and `packages/core/src/**/*.test.ts`;
      `pool: 'forks'` not `'threads'` (worker_threads can't inherit Bun runtime
      cleanly); the `bun --bun` invocation in the npm `test` script is what makes
      `bun:sqlite` resolvable in workers — do NOT change the `test` script without
      re-verifying the test suite.
