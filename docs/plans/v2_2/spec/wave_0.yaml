# spec/wave_0.yaml
# Wave 0: bun:sqlite migration
#
# NOTE: Inspection shows the migration appears to be already applied in the
# current tree (imports already use `bun:sqlite`, Dockerfile already uses
# `oven/bun:1`, vitest.config.ts already has `pool: "forks"`, package.json no
# longer lists better-sqlite3). The spec below still encodes the intent so the
# executor can verify state and apply any residual edits if a fresh checkout
# differs.

items:
  - id: "0.1"
    intent: "Migrate 6 persistence/auth files from `better-sqlite3` to `bun:sqlite`. Replace `import Database from 'better-sqlite3'` with `import { Database } from 'bun:sqlite'`. Replace each `db.prepare<Generics>(sql)` with `db.query(sql)` (drop generics) and cast `.get()` / `.all()` results at the call site."
    checked: true
    files:
      - path: packages/core/src/persistence/sqlite.ts
        isNew: false
        change: "Change import to `import { Database } from 'bun:sqlite'`. Replace `db.prepare<[string], { messages_json: string }>(...)` with `db.query(...)` and cast row at `.get()` call site: `stmtGet.get(userId) as { messages_json: string } | null`."
      - path: packages/core/src/persistence/config.ts
        isNew: false
        change: "Same import swap. `db.prepare<[string], { value: string }>` → `db.query(sql)`; cast `.get()` and `.all()` results (`as { value: string } | null`, `as ConfigRow[]`)."
      - path: packages/core/src/persistence/preferences.ts
        isNew: false
        change: "Same import swap. `db.prepare<...>` → `db.query(...)`; cast `stmtList.all(userId) as Array<{ key: string; value: string }>`."
      - path: packages/core/src/persistence/tasks.ts
        isNew: false
        change: "Same import swap. The recovery `UPDATE` query at lines 76-78 already had no generics — only the `.prepare` → `.query` rename applies there. All other prepared statements use generics; convert the same way and cast row results to `TaskRow` / `TaskRow[]`."
      - path: packages/core/src/persistence/factory.ts
        isNew: false
        change: "No structural change required. The dynamic `await import('./sqlite.js')` calls remain (they keep the DynamoDB SDK out of the SQLite bundle path). Plan note about removing them is OPTIONAL — prefer no-change to minimize risk."
      - path: packages/core/src/server/middleware/auth.ts
        isNew: false
        change: "Replace `import Database from 'better-sqlite3'` with `import { Database } from 'bun:sqlite'`. Constructor call `new Database(opts.dbPath ?? './tino-auth.db')` is unchanged — better-auth duck-types the SQLite dialect."
    tests:
      - "packages/core/tests/**/*.test.ts (full suite)"
    verify: "cd packages/core && bun run test && bun -e \"import { Database } from 'bun:sqlite'; const db = new Database(':memory:'); console.log('ok')\""
    mirror: "packages/core/src/persistence/sqlite.ts"
    context: |
      // packages/core/src/persistence/sqlite.ts — canonical mirror (CURRENT, post-migration state)
      import { Database } from "bun:sqlite";
      import type { ModelMessage } from "ai";
      import type { HistoryStore } from "../agent/history.js";
      import { trim } from "../agent/history.js";

      export function createSqliteHistoryStore({ dbPath, cap = 40 }: { dbPath: string; cap?: number }): HistoryStore {
        const db = new Database(dbPath);
        db.exec(`CREATE TABLE IF NOT EXISTS conversations ( ... )`);

        const stmtGet = db.query("SELECT messages_json FROM conversations WHERE user_id = ?");
        const stmtUpsert = db.query(`INSERT INTO conversations ... ON CONFLICT(user_id) DO UPDATE SET ...`);
        const stmtDelete = db.query("DELETE FROM conversations WHERE user_id = ?");

        return {
          get(userId: string): Promise<ModelMessage[]> {
            const row = stmtGet.get(userId) as { messages_json: string } | null;
            // ...
          },
          // ...
        };
      }

      // PRE-MIGRATION pattern (what to replace if any file still has it):
      //   import Database from "better-sqlite3";
      //   const stmtGet = db.prepare<[string], { messages_json: string }>(
      //     "SELECT messages_json FROM conversations WHERE user_id = ?"
      //   );
      //   const row = stmtGet.get(userId);  // typed by generic
      //
      // POST-MIGRATION pattern:
      //   import { Database } from "bun:sqlite";
      //   const stmtGet = db.query("SELECT messages_json FROM conversations WHERE user_id = ?");
      //   const row = stmtGet.get(userId) as { messages_json: string } | null;  // cast at call site
    conventions: |
      ESM workspace (`"type": "module"` in package.json), `.js` extensions on relative imports
      (e.g. `from '../agent/history.js'`), named exports for factories
      (`export function createXxxStore({ dbPath }: { dbPath: string }): XxxStore`),
      interfaces co-located with the factory in the same file, async store methods return
      `Promise<T>` even when underlying SQLite is sync (wrap with `Promise.resolve(...)`),
      named import `{ Database }` from `bun:sqlite` (NOT default), bun:sqlite has no
      generic type params on `.query()` — cast results at the call site.

