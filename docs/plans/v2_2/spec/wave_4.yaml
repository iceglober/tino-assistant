# spec/wave_4.yaml
# Wave 4: deploy verification.
#
# Wave 4 is observational, not edit-driven — every item is a probe/verify
# step against an already-built artifact. No source files are MODIFIED in
# this wave. The `files:` field on each item lists the artifact under test
# (Dockerfile, server entrypoint, infra index.ts) rather than an edit.
#
# Status snapshot (from wave_4.md):
#   - 4.1 local smoke test  — DONE (acceptance boxes all [x])
#   - 4.2 docker container  — DONE (acceptance boxes all [x])
#   - 4.3 pulumi deploy     — BLOCKED (AWS SSO session unavailable; cannot
#     run `aws sso login` non-interactively)
#   - 4.4 e2e verification  — BLOCKED (depends on 4.3)
#   - 4.5 rollback plan     — reference-only; never runs unless 4.3 fails

items:
  - id: "4.1"
    intent: "Local smoke test under Bun runtime. Build with `bun run build`, start `packages/core/dist/index.js` with `PERSISTENCE_ADAPTER=sqlite`, then probe `/api/health`, the React SPA root, and `/assets/tino-logo.png`. Confirms wave 0 (bun:sqlite + Dockerfile) didn't regress local startup."
    checked: true
    files:
      - path: packages/core/dist/index.js
        isNew: false
        change: "Build output of `packages/core/src/index.ts` via `tsc -p tsconfig.build.json && vite build`. Not edited — only executed."
      - path: packages/core/src/server/index.ts
        isNew: false
        change: "Not edited. Source of the listen log (`config console listening port host`) at line 211 and the bind logic at line 209 (CONSOLE_BASE_URL → 0.0.0.0 vs 127.0.0.1)."
      - path: packages/core/src/server/routes/health.ts
        isNew: false
        change: "Not edited. Source of the `/api/health` response shape under test."
    tests:
      - "manual: curl http://localhost:3001/api/health"
      - "manual: open http://localhost:3001 in browser"
    verify: "bun run build && PERSISTENCE_ADAPTER=sqlite bun run packages/core/dist/index.js & sleep 3 && curl -fsS http://localhost:3001/api/health | jq && curl -sI http://localhost:3001/ | head -1 && curl -sI http://localhost:3001/assets/tino-logo.png | head -1"
    mirror: "packages/core/src/server/index.ts"
    context: |
      // packages/core/src/server/index.ts — bind logic + listen log (lines 206-212)
      // Production: bind 0.0.0.0 so the ALB can reach the container.
      // Dev: bind 127.0.0.1.
      const hostname = process.env.CONSOLE_BASE_URL ? "0.0.0.0" : "127.0.0.1";
      const server = serve({ fetch: app.fetch, port, hostname }, () => {
        logger.info({ port, host: hostname }, "config console listening");
      });

      // packages/core/src/server/routes/health.ts — response shape (lines 18-31)
      app.get("/", (c) => {
        const capState = opts.registry?.getState() ?? {};
        return c.json({
          ok: true,
          tools: Object.keys(opts.tools),
          uptime: (Date.now() - opts.startTime) / 1000,
          capabilities: Object.entries(capState).map(([id, s]) => ({
            id,
            toolCount: s.toolCount,
            lastFindWorkScanAt: s.lastFindWorkScanAt,
            lastError: s.lastError,
          })),
        });
      });

      // packages/core/src/persistence/factory.ts — PERSISTENCE_ADAPTER default (lines 37-38)
      // 'sqlite' is the default; setting it explicitly removes ambiguity.
      const adapter = env.PERSISTENCE_ADAPTER ?? "sqlite";

      // Failure signature for a wave-0 regression (should NOT appear):
      //   Error: ENOENT ... better_sqlite3.node
      //   ERR_DLOPEN_FAILED
    conventions: |
      Bun runtime is the target — invoke with `bun run …` not `node …`. ESM-only
      (`"type": "module"` in root package.json). Workspaces: `packages/*`. Logger
      is pino — JSON logs in prod, `pino-pretty` for dev. Health response is the
      contract the React SPA's `useHealth.ts` polls every 30s; capability cards
      derive "connected" status from the `tools[]` array
      (see `packages/core/src/console-app/lib/capabilityTools.ts`). DB defaults
      to `./tino.db` when DB_PATH is unset.

  - id: "4.2"
    intent: "Docker build + local container test. Build the image (oven/bun:1 base, post-wave-0), run with `-e PERSISTENCE_ADAPTER=sqlite -e CONSOLE_BASE_URL=http://localhost:3001`, then verify `/api/health` and `/assets/tino-logo.png` both return 200. Confirms the Dockerfile is shippable."
    checked: true
    files:
      - path: Dockerfile
        isNew: false
        change: "Not edited in this wave (wave 0 did the rewrite). Multi-stage: deps → builder → runner; final stage `oven/bun:1` with `CMD [\"bun\", \"run\", \"packages/core/dist/index.js\"]`. WORKDIR /app; COPY assets ./assets puts the logo at `/app/assets/tino-logo.png`."
      - path: assets/tino-logo.png
        isNew: false
        change: "Not edited. Asset under test — must be reachable at `/assets/tino-logo.png` after Dockerfile `COPY assets ./assets`."
    tests:
      - "manual: docker build -t tino ."
      - "manual: docker run + curl health/logo"
    verify: "docker build -t tino . && docker run --rm -d --name tino-smoke -p 3001:3001 -e PERSISTENCE_ADAPTER=sqlite -e CONSOLE_BASE_URL=http://localhost:3001 tino && sleep 5 && curl -fsS http://localhost:3001/api/health | jq && curl -s -o /dev/null -w '%{http_code}\\n' http://localhost:3001/assets/tino-logo.png && docker stop tino-smoke"
    mirror: "Dockerfile"
    context: |
      # Dockerfile — current state (post-wave-0; full file, 40 lines)
      FROM oven/bun:1 AS deps
      WORKDIR /app
      COPY package.json bun.lock* ./
      COPY packages/core/package.json ./packages/core/
      COPY packages/aws/package.json ./packages/aws/
      COPY packages/cli/package.json ./packages/cli/
      RUN bun install --frozen-lockfile

      FROM deps AS builder
      COPY packages/core/tsconfig.json packages/core/tsconfig.build.json packages/core/tsconfig.app.json packages/core/vite.config.ts ./packages/core/
      COPY packages/core/src ./packages/core/src
      COPY packages/aws/tsconfig.json packages/aws/tsconfig.build.json ./packages/aws/
      COPY packages/aws/src ./packages/aws/src
      RUN cd packages/core && \
          ./node_modules/.bin/tsc -p tsconfig.build.json && \
          ./node_modules/.bin/vite build && \
          cd ../aws && ./node_modules/.bin/tsc -p tsconfig.build.json

      FROM oven/bun:1 AS runner
      WORKDIR /app
      COPY --from=deps /app/node_modules ./node_modules
      # ... node_modules + workspace COPY steps ...
      COPY --from=builder /app/packages/core/dist ./packages/core/dist
      COPY --from=builder /app/packages/aws/dist ./packages/aws/dist
      COPY assets ./assets
      COPY scripts ./scripts
      COPY tino.deploy.json* ./
      ENV NODE_ENV=production
      CMD ["bun", "run", "packages/core/dist/index.js"]

      # CONSOLE_BASE_URL is REQUIRED in Docker — without it the server binds to
      # 127.0.0.1 inside the container and the host port-forward sees no listener.
      # See packages/core/src/server/index.ts:209.
    conventions: |
      Single Dockerfile at repo root, multi-stage. Image is `tino:latest` locally;
      production Pulumi tags it with the ECR repo URI. `oven/bun:1` is Debian-based.
      Env vars passed via `-e KEY=VALUE`. Required: `PERSISTENCE_ADAPTER`. Required
      in Docker: `CONSOLE_BASE_URL` (presence flips bind to 0.0.0.0). Logs are
      line-delimited JSON on stdout (pino) — `docker logs <id>` shows them raw.
      Slack will NOT connect without tokens — `tino slack connected` is expected
      to be ABSENT in the local container test (only `config console listening`).

