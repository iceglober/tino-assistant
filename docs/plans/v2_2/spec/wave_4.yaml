  - id: "4.5"
    intent: "Reference rollback plan — invoked only if 4.3 deploy fails. Three failure modes: (a) ECS task won't start (check CloudWatch for `bun:sqlite` import or `@hono/node-server` errors); (b) Pulumi previews `replace` of DynamoDB → ABORT with ctrl+c; (c) Slack won't connect → check DynamoDB config store. Rollback path: `pulumi up` with the previous commit checked out, OR pin the prior ECS task-def revision via `aws ecs update-service`."
    checked: false
    files:
      - path: Dockerfile
        isNew: false
        change: "Not edited in this wave. Reference: revert to the pre-wave-0 `node:22-slim` + `better-sqlite3` version via `git revert <wave-0-sha>` if a forward fix isn't viable."
      - path: packages/core/src/persistence/sqlite.ts
        isNew: false
        change: "Not edited in this wave. Reference: pre-wave-0 `better-sqlite3` import is the rollback target alongside the Dockerfile."
    tests:
      - "manual (recovery only): aws ecs update-service --task-definition tino:<prev>"
      - "manual (recovery only): git revert <wave-0-sha> && pulumi up"
    verify: "aws ecs list-task-definitions --family-prefix tino --profile production/developer --sort DESC | head -10"
    mirror: "Dockerfile"
    context: |
      # Pulumi preview ABORT condition (rule 4.5.b):
      #   any line containing `replace` on a DynamoDB / ECR / CloudWatch-LogGroup
      #   resource → ctrl+c IMMEDIATELY during `pulumi up`.

      # CloudWatch failure-signature greps (rule 4.5.a):
      #   ERR_DLOPEN_FAILED              → bun:sqlite native module missing
      #   better_sqlite3.node            → wave-0 regression (should not appear)
      #   @hono/node-server: ...          → runtime adapter incompat

      # ECS rollback by task-def revision (no IaC change — creates drift):
      #   aws ecs list-task-definitions --family-prefix tino --profile production/developer --sort DESC
      #   aws ecs update-service \
      #     --cluster tino --service tino \
      #     --task-definition tino:<prev-revision> \
      #     --profile production/developer

      # IaC rollback (clean — no drift):
      #   git revert <wave-0-sha>           # reverts Dockerfile + sqlite.ts together
      #   cd .../infra-tino
      #   pulumi preview --stack prod        # confirm no `replace` lines
      #   pulumi up --yes --stack prod
    conventions: |
      Rollback is a recovery path — narrate every step in chat before executing
      (no silent `pulumi up` after a failed deploy). HARD RULES: NEVER
      `pulumi destroy` (it deletes resources). NEVER `git push --force` to
      revert wave 0 on `main`. ABORT (`ctrl+c`) on any `pulumi up` that
      previews a `replace` of DynamoDB / ECR / CloudWatch-LogGroup. Confirm
      with the user before invoking `aws ecs update-service` to pin a prior
      task-def revision — that bypasses Pulumi as the source of truth and
      creates IaC drift. The auth-session SQLite DB inside the task is
      ephemeral; rolling back the runtime swap (bun:sqlite ↔ better-sqlite3)
      does NOT lose user-facing state because the durable config store is
      DynamoDB and OAuth sessions are short-lived.
