      // [x] No AppDataClient imports outside src/drive/

      // [x] No references to deleted adapter files remain
    conventions: Wave-level verification is a single `bun --bun vitest run` from the
      package root plus two ripgrep guards; manual deploy steps are tracked
      separately and not part of the automated proof.
    proof: "`bun --bun vitest run` exits 0 from packages/core. ripgrep for
      'createAppDataPreferencesStore', 'createAppDataPrivacyConfigStore',
