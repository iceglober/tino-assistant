items:
  - id: 0a
    intent: Define UserKeyStorePort interface — abstract port for per-user
      encryption key storage, decoupled from any specific backend (Drive, KMS,
      etc).
    checked: true
    files:
      - path: packages/core/src/persistence/key-store.ts
        isNew: true
        change: New file exporting the UserKeyStorePort interface with
          getOrCreateKey(userId) and evict(userId).
    tests: []
    verify: bun --bun vitest run --root packages/core --typecheck
    mirror: packages/core/src/persistence/config.ts
    context: |
      // packages/core/src/persistence/key-store.ts (target)
      export interface UserKeyStorePort {
        getOrCreateKey(userId: string): Promise<Buffer | null>;
        evict(userId: string): void;
      }
    conventions: ESM imports with .js extension suffixes; named exports only;
      interface-as-port pattern matches sibling persistence ports (ConfigStore,
      PreferencesStore); no implementation in port file.
    proof: "Importing UserKeyStorePort from
      packages/core/src/persistence/key-store.ts type-checks. The interface
      declares exactly two methods: getOrCreateKey(userId: string):
      Promise<Buffer | null> and evict(userId: string): void."
    proof_type: type-check
