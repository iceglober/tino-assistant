  - id: 0i
    intent: Document data migration consideration — no automated migration; users
      re-set preferences/privacy/discovery in console. Old Drive data stays
      harmlessly in users' Google accounts.
    checked: true
    files:
      - path: .glrs/plans/discovery_and_storage/wave_0.md
        isNew: false
        change: "Section 0i documents the migration stance: re-set preferences (low
          impact), re-configure privacy (DynamoDB fallback populates fresh),
          re-run discovery (~30s). No code change required."
    tests: []
    verify: "true"
    mirror: .glrs/plans/discovery_and_storage/wave_0.md
    context: >
      ### 0i. Data migration consideration

      Users who have data in Drive but not DynamoDB will lose:

      - Preferences: re-set in the console. Low impact.

      - Privacy config: re-configure in console. DynamoDB fallback populates on
      fresh setups.

      - Discovery results: re-run in 30 seconds.

      No automated migration. Old Drive data stays harmlessly in users' Google
      accounts.
    conventions: 'Documentation-only items have verify: "true" and proof_type:
      manual; no executable assertion.'
    proof: Wave 0 markdown contains an explicit 0i section acknowledging no
      automated migration and naming the three affected data classes
      (preferences, privacy config, discovery results) with their recovery
      paths.
    proof_type: manual
  - id: 0j
    intent: Final wave verification — all unit tests pass, AppDataClient does not
      leak, no references to deleted adapters remain.
    checked: false
    files: []
    tests:
      - packages/core/tests/drive/encrypted-history-store.test.ts
      - packages/core/tests/drive/key-manager.test.ts
      - packages/core/tests/drive/app-data-client.test.ts
    verify: bun --bun vitest run --root packages/core
    mirror: packages/core/tests/drive/encrypted-history-store.test.ts
    context: >
      // Verification checklist from wave_0.md:

      // [x] bun --bun vitest run passes

      // [ ] Deploy → set preference → read back (DynamoDB only) — manual

      // [ ] Deploy → run discovery → results in Customize page — manual

