        isNew: false
        change: Delete file.
      - path: packages/core/src/index.ts
        isNew: false
        change: Remove createAppDataPreferencesStore import; remove wrappedPreferences
          variable; pass preferencesStore directly wherever wrappedPreferences
          was used.
    tests: []
    verify: test ! -f packages/core/src/drive/adapters/preferences-store.ts && !
      grep -rn 'createAppDataPreferencesStore\|preferences-store'
      packages/core/src apps
    mirror: packages/core/src/discovery/store.ts
    context: >
      // packages/core/src/index.ts (current — already migrated)

      // line 37:  preferences: preferencesStore,

      // line 91:  preferences: preferencesStore,

      // line 158: preferencesStore: preferencesStore,

      // No wrappedPreferences variable anywhere; no
      createAppDataPreferencesStore import.
    conventions: When deleting an adapter, also delete any test file under
      packages/core/tests/drive/ covering it; consumer call sites take the
