  - id: 0c
    intent: "Simplify createEncryptedHistoryStore — replace { keyManager,
      resolveClient } deps with a single { keyStore: UserKeyStorePort } dep. The
      encrypted-history adapter no longer knows that keys live in Drive."
    checked: true
    files:
      - path: packages/core/src/drive/adapters/encrypted-history-store.ts
        isNew: false
        change: "Change deps signature from { inner, keyManager, resolveClient, logger,
          cap? } to { inner, keyStore: UserKeyStorePort, logger, cap? }. Replace
          internal resolveKey(userId) helper with direct
          deps.keyStore.getOrCreateKey(userId) calls in get() and append().
          Remove resolveClient invocation entirely."
    tests:
      - packages/core/tests/drive/encrypted-history-store.test.ts
    verify: bun --bun vitest run --root packages/core
      tests/drive/encrypted-history-store.test.ts
    mirror: packages/core/src/drive/key-manager.ts
    context: |
      // packages/core/src/drive/adapters/encrypted-history-store.ts
      import type { UserKeyStorePort } from "../../persistence/key-store.js";

      export function createEncryptedHistoryStore(deps: {
        inner: HistoryStore;
        keyStore: UserKeyStorePort;
        logger: AppLogger;
        cap?: number;
      }): HistoryStore {
        const { inner, keyStore, logger, cap = 40 } = deps;
        // get(): const dek = await keyStore.getOrCreateKey(userId);
        // append(): const dek = await keyStore.getOrCreateKey(userId);
      }
    conventions: Imports type UserKeyStorePort with .js suffix from sibling
      persistence module; deps destructured at top of factory; null DEK falls
      back gracefully (return [] on get, write plaintext on append).
    proof: createEncryptedHistoryStore accepts { inner, keyStore, logger } where
      keyStore is a UserKeyStorePort mock. Test uses createDriveKeyStore over a
      mock AppDataClient and verifies (1) appended messages round-trip through
      encrypt/decrypt, (2) get() returns [] when keyStore.getOrCreateKey returns
      null. The deps signature does NOT include keyManager or resolveClient —
      type-check rejects the old shape.
    proof_type: test
  - id: 0d
    intent: "Update wiring in core entrypoint — construct keyStore via
      createDriveKeyStore({ resolveClient: appDataResolver }) and pass it to
      createEncryptedHistoryStore. Drive dependency stops at the
      UserKeyStorePort boundary."
    checked: true
    files:
      - path: packages/core/src/index.ts
        isNew: false
        change: "Replace `const appDataKeyManager = createKeyManager();` with `const
          keyStore = createDriveKeyStore({ resolveClient: appDataResolver });`.
          Update createEncryptedHistoryStore call from { keyManager:
          appDataKeyManager, resolveClient: appDataResolver, ... } to {
          keyStore, ... }. Imports updated accordingly."
    tests: []
    verify: bun --bun vitest run --root packages/core --typecheck
    mirror: packages/core/src/server/index.ts
    context: >
      // packages/core/src/index.ts (target)

      import { createEncryptedHistoryStore } from
      "./drive/adapters/encrypted-history-store.js";

      import { createDriveKeyStore } from "./drive/key-manager.js";


      const appDataResolver = createAppDataClientResolver({ resolveCreds:
      googleCreds, logger });

      const keyStore = createDriveKeyStore({ resolveClient: appDataResolver });

      const wrappedHistory = createEncryptedHistoryStore({
        inner: history,
        keyStore,
        logger,
      });
    conventions: Composition root in src/index.ts; deps wired top-down (resolver ->
      store -> wrapper); appDataResolver still constructed but no longer flows
      past the keyStore boundary.
    proof: "tsc/typecheck passes on packages/core/src/index.ts. grep for
      'keyManager' and 'resolveClient: appDataResolver' in src/index.ts returns
      zero matches outside the createDriveKeyStore line. The wrappedHistory
      constructor call uses the keyStore variable."
    proof_type: type-check
  - id: 0e
