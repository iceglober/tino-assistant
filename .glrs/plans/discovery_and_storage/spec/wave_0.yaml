  - id: 0g
    intent: Simplify createDiscoveryStore — remove resolveClient dep, write/read
      only through ConfigStore (DynamoDB).
    checked: true
    files:
      - path: packages/core/src/discovery/store.ts
        isNew: false
        change: "Reduce deps to { configStore: ConfigStore }. get() reads from
          configStore.get(`user.${userId}.discovery_result`); set() writes to
          configStore.set with same key. JSON.parse with try/catch returning
          null on malformed data."
      - path: packages/core/src/server/index.ts
        isNew: false
        change: "Remove resolveAppDataClient from createDiscoveryStore call site; pass
          only { configStore: config }."
    tests: []
    verify: bun --bun vitest run --root packages/core --typecheck
    mirror: packages/core/src/persistence/config.ts
    context: >
      // packages/core/src/discovery/store.ts (target — already in place)

      import type { ConfigStore } from "../persistence/config.js";

      import type { DiscoveryResult } from "./types.js";


      function configKey(userId: string): string {
        return `user.${userId}.discovery_result`;
      }


      export function createDiscoveryStore(deps: { configStore: ConfigStore }):
      DiscoveryStore {
        const { configStore } = deps;
        return {
          async get(userId) { /* configStore.get only */ },
          async set(userId, result) { /* configStore.set only */ },
        };
      }
    conventions: Config keys namespaced as `user.${userId}.<feature>`; JSON.parse
      wrapped in try/catch returning null; ConfigStore is the single source of
      truth.
    proof: createDiscoveryStore({ configStore }) returns a store whose get/set
      round-trip a DiscoveryResult through ConfigStore alone (no AppDataClient
      mock needed). The deps type does NOT include
      resolveClient/resolveAppDataClient — type-check rejects the old shape.
    proof_type: type-check
