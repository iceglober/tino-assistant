      }
    conventions: "ESM with .js suffix imports; deps-object factory pattern (deps: {
      ... }); cache uses Map<string, CacheEntry>; setInterval is unref'd to
      avoid blocking process exit; errors swallowed and surfaced as null."
    proof: createDriveKeyStore({ resolveClient }) returns an object satisfying
      UserKeyStorePort. Calling getOrCreateKey(userId) twice in succession
      resolves the underlying AppDataClient only once (cache hit on second call
      within TTL). Calling evict(userId) clears the cache entry so the next
      getOrCreateKey re-resolves the client. When resolveClient returns null,
      getOrCreateKey returns null without throwing.
