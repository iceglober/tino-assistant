          createDriveKeyStore(deps: { resolveClient }) returning
          UserKeyStorePort. Move resolveClient invocation inside getOrCreateKey.
          Keep KEY_FILE constant, TTL_MS, cache Map, sweepInterval, and 32-byte
          key generation logic unchanged."
    tests:
      - packages/core/tests/drive/key-manager.test.ts
    verify: bun --bun vitest run --root packages/core tests/drive/key-manager.test.ts
    mirror: packages/core/src/drive/adapters/encrypted-history-store.ts
    context: >
