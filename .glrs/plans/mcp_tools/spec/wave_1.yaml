# spec/wave_1.yaml — Console UI: Catalog Browser + Credential Entry
items:
  - id: "1.1"
    intent: "Add API client functions for MCP catalog browsing and server management"
    checked: true
    files:
      - path: packages/core/src/console-app/lib/api.ts
        isNew: false
        change: "Add McpCatalogEntry and McpServerStatus interfaces, plus four fetch functions: getMcpCatalog, getMcpServers, saveMcpServer, removeMcpServer — following the existing unwrap/credentials pattern"
    tests:
      - "packages/core/tests/console-app/mcp-api.test.ts"
    verify: "bun --bun vitest run tests/console-app/mcp-api.test.ts"
    mirror: "packages/core/src/console-app/lib/api.ts"
    context: |
      // Existing fetch pattern (api.ts:59-66):
      async function unwrap<T>(res: Response): Promise<T> {
        if (res.status === 401) throw new UnauthorizedError();
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || `${res.status} ${res.statusText}`);
        }
        return res.json() as Promise<T>;
      }

      // Existing CRUD pattern — getUserCapabilities (api.ts:111-116):
      export async function getUserCapabilities(userId: string): Promise<CapabilityEntry[]> {
        const r = await fetch(`/api/user-capabilities/${encodeURIComponent(userId)}`, {
          credentials: "include",
        });
        return unwrap<CapabilityEntry[]>(r);
      }

      // Existing DELETE pattern — deleteUserCapability (api.ts:132-141):
      export async function deleteUserCapability(
        userId: string,
        capabilityId: string,
      ): Promise<{ ok: true; userId: string; id: string }> {
        const r = await fetch(`/api/user-capabilities/${encodeURIComponent(userId)}/${encodeURIComponent(capabilityId)}`, {
          method: "DELETE",
          credentials: "include",
        });
        return unwrap(r);
      }
    conventions: "ESM imports with .js extensions, named exports, credentials: 'include' on all fetches, unwrap<T> for response parsing, encodeURIComponent on path params, interfaces exported alongside functions"
    proof: "getMcpCatalog calls GET /api/mcp/catalog and returns McpCatalogEntry[]; getMcpServers calls GET /api/mcp/servers and returns McpServerStatus[]; saveMcpServer calls POST /api/mcp/servers/:id with credentials body; removeMcpServer calls DELETE /api/mcp/servers/:id; all four use unwrap and credentials: 'include'"
    proof_type: "test"

  - id: "1.2"
