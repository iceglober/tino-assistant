  - id: "2.3"
    intent: "Pre-install MCP server npm packages in the Docker image so npx resolves from disk at runtime"
    checked: false
    files:
      - path: Dockerfile
        isNew: false
        change: "Add RUN lines in the runner stage (after COPY --from=deps) to globally install MCP server packages with npm install -g, so npx finds them without network access"
    tests: []
    verify: "docker build -t tino-test . && docker run --rm tino-test npx --yes <package-name> --version"
    mirror: "Dockerfile"
    context: |
      // Dockerfile runner stage (lines 21-41):
      FROM oven/bun:1 AS runner
      WORKDIR /app
      COPY --from=deps /app/node_modules ./node_modules
      COPY --from=deps /app/packages/core/node_modules ./packages/core/node_modules
      COPY --from=deps /app/packages/aws/node_modules ./packages/aws/node_modules
      COPY package.json ./
      COPY packages/core/package.json ./packages/core/
      COPY packages/aws/package.json ./packages/aws/
      COPY --from=builder /app/packages/core/dist ./packages/core/dist
      COPY --from=builder /app/packages/aws/dist ./packages/aws/dist
      COPY assets ./assets
      COPY scripts ./scripts
      COPY tino.deploy.json* ./

      # Ensure workspace packages are resolvable via node_modules/@tino/*
      RUN mkdir -p node_modules/@tino && \
          ln -s /app/packages/core node_modules/@tino/core && \
          ln -s /app/packages/aws node_modules/@tino/aws

      ENV NODE_ENV=production
      CMD ["bun", "run", "packages/core/dist/index.js"]
    conventions: "Multi-stage build: deps → builder → runner. Runner base is oven/bun:1. npm not available in runner by default — may need apt-get install npm or use the deps stage. Use || true to tolerate packages that don't support --version flag"
    proof: "Docker image builds successfully; npx <package-name> --version resolves from local cache inside the container without network access"
    proof_type: "script"
