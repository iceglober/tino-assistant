  - id: "0.5"
    intent: "Add API routes for MCP catalog browsing and per-user server credential management"
    checked: false
    files:
      - path: packages/core/src/server/routes/mcp.ts
        isNew: true
        change: "New route file with GET /catalog (public catalog shape), GET /servers (user's configured MCP servers from UserCapabilityStore), POST /servers/:id (save credentials), DELETE /servers/:id (remove config + kill pool entry)"
      - path: packages/core/src/server/index.ts
        isNew: false
        change: "Import createMcpRoutes and mount at /api/mcp with app.route()"
    tests:
      - "packages/core/tests/server/routes/mcp.test.ts"
    verify: "bun --bun vitest run tests/server/routes/mcp.test.ts"
    mirror: "packages/core/src/server/routes/user-capabilities.ts"
    context: |
      // user-capabilities.ts route factory pattern (user-capabilities.ts:22-29):
      export function createUserCapabilityRoutes(opts: {
        config: ConfigStore;
        logger: AppLogger;
        auditLogger?: AuditLogger;
        userCapabilities?: UserCapabilityStore;
      }): Hono<{ Variables: AuthVariables }> {
        const app = new Hono<{ Variables: AuthVariables }>();
        const { config, logger, auditLogger, userCapabilities } = opts;

      // Route mounting pattern (server/index.ts:213):
      app.route("/api/user-capabilities", createUserCapabilityRoutes({ config, logger, auditLogger, userCapabilities }));

      // Auth enforcement pattern (user-capabilities.ts:40-46):
      const loggedInUser = c.get("user");
      if (!loggedInUser) return c.json({ error: "unauthorized" }, 401);
      if (loggedInUser.id !== userId) {
        return c.json({ error: "Forbidden" }, 403);
      }

      // Server index imports (server/index.ts:26-42):
      import { createUserCapabilityRoutes } from "./routes/user-capabilities.js";
    conventions: "Hono route factory returning Hono<{ Variables: AuthVariables }>, auth via c.get('user'), decodeURIComponent for path params, JSON error responses with HTTP status codes, AuditLogger for config mutations"
    proof: "GET /catalog returns catalog entries with only public fields (id, displayName, description, icon, fields); GET /servers returns user's configured servers scoped to authenticated user; POST /servers/:id saves credentials to UserCapabilityStore; DELETE /servers/:id removes config and calls pool.kill; all mutating endpoints enforce auth and audit-log"
    proof_type: "test"
