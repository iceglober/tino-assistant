title: Per-User MCP Tool Servers
goal: >
  tino's capabilities are hardcoded TypeScript modules. Adding a new integration
  (Ramp, Rippling, Notion, etc.) requires writing a capability module, tool
  wrappers, and redeploying. Users can't connect their own tools. MCP is the
  standard for tool servers. tino needs lifecycle management, per-user
  credential isolation, and a way to surface MCP tools in the existing
  buildPrivateTools pipeline.
constraints: null
