        change: |
          New module extracted from slack.ts. `scope: 'private'`. Owns the xoxp-token-scoped tools (slack_list_dms, slack_read_dm, slack_search_messages, slack_read_thread). Reads `capability.slack-personal.credentials.userToken` from the global blob in wave 1. `buildToolsForUser` returns `null` when userToken is missing.
      - path: packages/core/tests/capabilities/registry.test.ts
        isNew: false
        change: |
          Add cases: "buildPrivateTools(SYSTEM) returns empty", "buildPrivateTools includes gmail when configured", "buildPrivateTools skips gmail when disabled", "buildPrivateTools skips gmail when refreshToken missing".
    tests:
      - packages/core/tests/capabilities/registry.test.ts
    verify: bun run test packages/core/tests/capabilities/registry.test.ts
    mirror: packages/core/src/capabilities/gmail.ts
    context: |
      // packages/core/src/capabilities/gmail.ts:16-60 (current — to be reshaped)
      export const gmailCapability: CapabilityModule = {
        id: "gmail",
        displayName: "Gmail",
        fieldSchema: [
          { key: "clientId", label: "Google OAuth Client ID", target: "credentials.clientId", placeholder: "...apps.googleusercontent.com" },
          { key: "clientSecret", label: "Google OAuth Client Secret", target: "credentials.clientSecret", secret: true },
          { key: "refreshToken", label: "Refresh Token", target: "credentials.refreshToken", secret: true },
        ],
        async registerTools(config, _configStore, logger, tools): Promise<void> {
          const { clientId, clientSecret, refreshToken } = config.credentials;
          if (!clientId) throw new Error("Gmail capability: credentials.clientId is not set");
          if (!clientSecret) throw new Error("Gmail capability: credentials.clientSecret is not set");
          if (!refreshToken) throw new Error("Gmail capability: credentials.refreshToken is not set");
          const auth = new google.auth.OAuth2(clientId, clientSecret);
          auth.setCredentials({ refresh_token: refreshToken });
          tools.gmail_search = gmailSearchTool(auth);
          tools.gmail_get_message = gmailGetMessageTool(auth);
          logger.info("gmail tools enabled");
        },
      };
      // After wave 1: scope: 'private', buildToolsForUser returns null on
      // missing creds instead of throwing — non-throwing is the contract.

      // SYSTEM_USER_ID lives in packages/core/src/identity/types.ts:57
      //   export const SYSTEM_USER_ID = "SYSTEM" as const;

      // packages/core/src/capabilities/calendar.ts:16-65 (same shape change)
      // Uses same Google OAuth pattern; registers calendar_list_events tool.

      // slack.ts:20-64 — currently uses xoxp- user token for ALL tools:
      // slack_search_messages, slack_read_thread, slack_list_dms, slack_read_dm.
      // After split: these tools move to slack-personal.ts. slack.ts becomes a
      // shared shell (scope: 'shared') that registers no tools until bot-token
      // public-channel search is added in a future wave.

      // NEW file slack-personal.ts exports:
      //   export const slackPersonalCapability: PrivateCapability
      //   buildToolsForUser(tinoUserId, config, configStore, logger): Promise<ToolSet | null>
    conventions: |
      Throw-on-missing-creds becomes return-null-on-missing-creds for private capabilities — the registry uses null to mean "not connected for this user".
      Import SYSTEM_USER_ID from `../identity/types.js` (with `.js` extension).
      Build per-user tools with the same factory functions used today (gmailSearchTool, slackReadDmTool, etc.) — wave 1 only changes WHO calls them, not the tool implementations.
      The slack tool factories accept (userClient, userCache?) — create the WebClient + cache inside buildToolsForUser.

