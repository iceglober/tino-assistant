    mirror: packages/core/tests/capabilities/registry.test.ts
    context: |
      // packages/core/tests/capabilities/scope-types.test-d.ts (lines 12-30)
      import { describe, expect, expectTypeOf, it } from "vitest";
      import type { CapabilityModule, PrivateCapability, SharedCapability } from "../../src/capabilities/types.js";

      describe("CapabilityModule discriminated union — type-level assertions", () => {
        it("type-checks (runtime anchor)", () => {
          // This test exists so vitest reports a pass rather than "no tests found".
          expect(true).toBe(true);
        });
        it("SharedCapability allows startFindWork", () => {
          const shared: SharedCapability = {
            id: "test-shared", displayName: "Test Shared", scope: "shared",
            async registerTools(_c, _s, _l, _t) {},
            startFindWork(_c, _l, _o) { return () => {}; },
          };
          expectTypeOf(shared).toMatchTypeOf<SharedCapability>();
        });
        // ...PrivateCapability rejects startFindWork via @ts-expect-error
      });
    conventions: |
      vitest with `describe` / `it` / `expect`; `expectTypeOf` for type assertions;
      `@ts-expect-error <reason>` directive comments to assert compile-time errors;
      runtime anchor `expect(true).toBe(true)` keeps vitest happy on type-only files;
      relative imports use `.js` extension (NodeNext) even for `.ts` source.
