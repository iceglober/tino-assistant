        change: |
          Add `scope: 'private'`. Replace `registerTools` with `buildToolsForUser(tinoUserId, config, configStore, logger)`. Return `null` when `!config?.enabled` or credentials missing. In wave 1 the function still reads from the global `capability.gmail` blob (transitional).
      - path: packages/core/src/capabilities/calendar.ts
