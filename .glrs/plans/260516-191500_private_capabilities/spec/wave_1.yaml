      Test file naming: `<module>.test.ts` colocated under `packages/core/tests/<area>/`.
      Mock helpers via `vi.fn()`; no real network or filesystem in unit tests.
      Use `describe`/`it`/`expect` from vitest; `beforeEach` for per-test reset.
      Assertion style: `expect(actual).toBe(expected)` / `toEqual` / `toMatchObject`; never `assert`.
      Mock googleapis at module level: `vi.mock("googleapis", () => ({ google: { auth: { OAuth2: class FakeOAuth2 {...} }, gmail: () => ({}) } }))`.
      Mock @slack/bolt at module level for slack tests: `vi.mock("@slack/bolt", ...)`.
