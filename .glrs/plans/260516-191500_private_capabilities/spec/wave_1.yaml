      // system prompt sections — only needs the string[] of active ids.
    conventions: |
      Keep iteration order stable (sort by id) to match the existing capabilityIds ordering — downstream prompt-builders may rely on stable ordering for caching/diffing.
      Do not expose runtime credentials in the returned ids — only capability ids.

