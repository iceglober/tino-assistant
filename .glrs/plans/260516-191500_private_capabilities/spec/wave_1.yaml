# spec/wave_1.yaml
# Wave 1: Capability scope split (shape only).
# Pure structural refactor — split CapabilityModule into a discriminated union
# of SharedCapability | PrivateCapability, refactor the registry to expose
# `sharedTools` (built once at init) and `buildPrivateTools(userId)` (lazy per
# runAgent), classify each capability, and split slack into shared (xoxb-) and
# slack-personal (xoxp-). No per-user storage; private capabilities still read
# the global `capability.<id>` blob in this wave.
#
# Note: Test files live under `packages/core/tests/...`, not `tests/...` as
# the markdown plan suggests. Verify commands below reflect the actual paths.
# Project uses vitest (run via bun) — see packages/core/package.json:
#   "test": "bun --bun ./node_modules/vitest/dist/cli.js run"

items:
  - id: a1
    intent: |
      CapabilityModule is a discriminated union of SharedCapability and
      PrivateCapability. The `scope` field is the discriminator. The TypeScript
      compiler enforces that startFindWork can only be declared on shared
      capabilities (declaring it on a `scope: 'private'` module is a compile
      error).
    checked: false
    files:
      - path: packages/core/src/capabilities/types.ts
        isNew: false
        change: |
          Replace the single CapabilityModule interface with a discriminated
          union. Add BaseCapability (common fields: id, displayName, fieldSchema),
          SharedCapability (extends Base, scope: 'shared', registerTools,
          optional startFindWork), and PrivateCapability (extends Base,
          scope: 'private', buildToolsForUser returning ToolSet | null).
          Export `CapabilityModule = SharedCapability | PrivateCapability`.
          Also extend the exported `CapabilityRegistry` interface: replace
          `tools: ToolSet` with `sharedTools: ToolSet`,
          `buildPrivateTools(tinoUserId): Promise<ToolSet>`, and
          `getActiveCapabilities(tinoUserId): Promise<string[]>`.
    tests:
      - packages/core/tests/capabilities/scope-types.test-d.ts
    verify: bun run --filter @tino/core test tests/capabilities/scope-types.test-d.ts && bunx tsc --noEmit -p packages/core
    mirror: packages/core/src/capabilities/types.ts
    context: |
      // packages/core/src/capabilities/types.ts (current shape — pre-wave-1)
      // Single, undifferentiated interface — no scope discriminator.
      export interface CapabilityConfig {
        enabled: boolean;
        credentials: Record<string, string>;
        settings: Record<string, unknown>;
        findWork?: { enabled: boolean; intervalMinutes: number; lastScanAt?: number };
      }
      export interface CapField { /* console field schema */ }
      // BEFORE: single shape with no scope
      // export interface CapabilityModule {
      //   id: string;
      //   displayName: string;
      //   fieldSchema?: CapField[];
      //   registerTools(config, configStore, logger, tools): Promise<void>;
      //   startFindWork?(config, logger, onNewWork): () => void;
      // }
      // AFTER: discriminated union (see plan for full shape)
    conventions: |
      ESM imports with .js extensions on relative paths (NodeNext resolution);
      named exports only (no default exports); `import type` for type-only imports;
      tabs are 2-space; double-quoted strings; rich JSDoc on public interfaces.

  - id: a2
    intent: |
      The registry exposes `sharedTools` (built once at init) and
      `buildPrivateTools(userId)` (called per agent run). Shared tools never
      include private-capability tools. `reload()` mutates `sharedTools` in
      place so external holders of the reference see the new toolset.
    checked: false
    files:
      - path: packages/core/src/capabilities/registry.ts
        isNew: false
        change: |
          Refactor `initCapabilityRegistry` to partition ALL_CAPABILITIES by
          scope. Build `sharedTools` once at init by walking SharedCapability
          modules and calling `registerTools`; also register non-capability
          tools (preferences, tasks). For PrivateCapability modules, do
          NOTHING at init time. Add `buildPrivateTools(tinoUserId)` that
          walks private capabilities, reads each one's config (wave 1: from
          the global `capability.<id>` blob), and merges results from
          `buildToolsForUser`. Add a `_materializePrivate(tinoUserId)` helper
          shared with `getActiveCapabilities`. `reload()` clears only the
          shared-capability keys (not preferences/tasks) and re-runs the
          shared loop, mutating `sharedTools` in place.
    tests:
      - packages/core/tests/capabilities/registry.test.ts
    verify: bun run --filter @tino/core test tests/capabilities/registry.test.ts
    mirror: packages/core/src/capabilities/registry.ts
    context: |
      // BEFORE (shape):
      //   export interface CapabilityRegistry {
      //     tools: ToolSet;
      //     capabilityIds: string[];
      //     stopAll(): void;
      //     getState(): Record<string, CapabilityRuntimeState>;
      //     reload(): Promise<{ ok: boolean; error?: string }>;
      //   }
      //
      // AFTER (extracted from current registry.ts:163-200):
      // export async function initCapabilityRegistry(opts: RegistryOptions): Promise<CapabilityRegistry> {
      //   const sharedCapabilities = ALL_CAPABILITIES.filter((c): c is SharedCapability => c.scope === "shared");
      //   const privateCapabilities = ALL_CAPABILITIES.filter((c): c is PrivateCapability => c.scope === "private");
      //   const sharedTools: ToolSet = {};
      //   let stopFns: Array<() => void> = [];
      //   let state: Record<string, CapabilityRuntimeState> = {};
      //   let loadedSharedCapabilityIds: string[] = [];
      //
      //   await loadSharedCapabilityTools({ configStore, logger, onNewWork, sharedTools, ... });
      //   // preferences + task tools registered into sharedTools
      //
      //   return { sharedTools, buildPrivateTools, getActiveCapabilities, stopAll, getState, reload };
      // }
