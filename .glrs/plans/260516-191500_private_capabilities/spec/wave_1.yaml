# spec/wave_1.yaml
# Wave 1: Capability scope split (shape only).
# Path note: the markdown plan references `tests/capabilities/*` and
# `packages/core/src/capabilities/*`. The actual test root in this repo is
# `packages/core/tests/capabilities/*` — paths below are the real paths.
items:
  - id: a1
    intent: |
      CapabilityModule is a discriminated union of SharedCapability and PrivateCapability.
      The `scope` field is the discriminator. The TypeScript compiler enforces that
      `startFindWork` can only be declared on shared capabilities (compile error on private).
    checked: true
    files:
      - path: packages/core/src/capabilities/types.ts
        isNew: false
        change: |
          Split `CapabilityModule` into a discriminated union:
          - BaseCapability (id, displayName, fieldSchema)
          - SharedCapability extends Base with scope:'shared', registerTools(), optional startFindWork()
          - PrivateCapability extends Base with scope:'private', buildToolsForUser(tinoUserId, config|null, configStore, logger): Promise<ToolSet | null>
          - export type CapabilityModule = SharedCapability | PrivateCapability
          startFindWork is intentionally absent from PrivateCapability.
      - path: packages/core/tests/capabilities/scope-types.test-d.ts
        isNew: true
        change: |
          New type-only test asserting:
            - SharedCapability allows startFindWork
            - PrivateCapability rejects startFindWork (@ts-expect-error)
            - CapabilityModule narrows on `scope`
    tests:
      - packages/core/tests/capabilities/scope-types.test-d.ts
    verify: bun run test packages/core/tests/capabilities/scope-types.test-d.ts && bunx tsc --noEmit
    mirror: packages/core/src/capabilities/types.ts
    context: |
      // packages/core/src/capabilities/types.ts:58-83 (current CapabilityModule — to be split)
      export interface CapabilityModule {
        id: string;
        displayName: string;
        fieldSchema?: CapField[];
        registerTools(config: CapabilityConfig, configStore: ConfigStore, logger: AppLogger, tools: ToolSet): Promise<void>;
        startFindWork?(
          config: CapabilityConfig,
          logger: AppLogger,
          onNewWork: "(summary: string) => Promise<void>,"
        ): () => void;
      }

      // CapabilityRegistry (types.ts:86-107) also needs updating in a2
      export interface CapabilityRegistry {
        tools: ToolSet;
        stopAll(): void;
        getState(): Record<string, CapabilityRuntimeState>;
        capabilityIds: string[];
        reload(): Promise<{ ok: boolean; error?: string }>;
      }

      // Supporting types that stay unchanged:
      // CapabilityConfig { enabled, credentials, settings, findWork? }
      // CapField { key, label, target, kind?, secret?, placeholder?, value? }
      // CapabilityRuntimeState { toolCount, lastFindWorkScanAt?, lastError? }
    conventions: |
      ESM imports with `.js` extensions on relative paths even for .ts source.
      Named exports only (no default exports).
      Test framework: vitest (run via `bun --bun ./node_modules/vitest/dist/cli.js run`).
      Type-level tests use `.test-d.ts` suffix; assert with `expectTypeOf` from vitest or `@ts-expect-error` comments.
      JSDoc on every exported interface/function; explain WHY, not just what.

  - id: a2
    intent: |
      The registry exposes `sharedTools` (built once at init) and
      `buildPrivateTools(userId)` (called per agent run). Shared tools never
      include private-capability tools.
    checked: false
    files:
      - path: packages/core/src/capabilities/registry.ts
        isNew: false
        change: |
          - Replace `tools: ToolSet` on CapabilityRegistry with `sharedTools: ToolSet` plus `buildPrivateTools(tinoUserId): Promise<ToolSet>` and `getActiveCapabilities(tinoUserId): Promise<string[]>`.
          - Split `loadCapabilityTools` so the init loop only handles `scope === 'shared'` modules; private modules are skipped at init.
          - Implement `buildPrivateTools` that walks ALL_CAPABILITIES, filters scope==='private', reads each one's global `capability.<id>` blob (wave-1 transitional), calls `buildToolsForUser`, merges non-null results. Returns `{}` for SYSTEM_USER_ID.
          - Implement `getActiveCapabilities(userId)`: union of all enabled shared ids and every private id whose `buildToolsForUser` returned non-null.
          - `reload()` continues to mutate `sharedTools` in place; private flow is stateless per call.
      - path: packages/core/src/capabilities/types.ts
        isNew: false
        change: |
          Update `CapabilityRegistry` interface: drop `tools`, add `sharedTools`, `buildPrivateTools(userId)`, `getActiveCapabilities(userId)`. Keep `stopAll`, `getState`, `reload`, `capabilityIds`.
      - path: packages/core/tests/capabilities/registry.test.ts
        isNew: false
        change: |
          - Replace assertions on `registry.tools` with `registry.sharedTools` plus `await registry.buildPrivateTools(userId)`.
          - Add cases: "registry exposes shared tools after init", "registry sharedTools does not include gmail tools".
    tests:
      - packages/core/tests/capabilities/registry.test.ts
    verify: bun run test packages/core/tests/capabilities/registry.test.ts
    mirror: packages/core/src/capabilities/registry.ts
    context: |
      // packages/core/src/capabilities/registry.ts:61-118 — loadCapabilityTools (the init loop)
      // Currently calls `cap.registerTools(config, configStore, logger, tools)` unconditionally
      // for every enabled capability. After wave 1, dispatch on cap.scope:
      async function loadCapabilityTools(opts: {
        configStore: "ConfigStore; logger: AppLogger;"
        onNewWork?: (summary: string) => Promise<void>;
        tools: ToolSet;
        state: Record<string, CapabilityRuntimeState>;
        stopFns: Array<() => void>;
        loadedCapabilityIds: string[];
      }): Promise<void> {
        for (const cap of ALL_CAPABILITIES) {
          const raw = await configStore.get(`capability.${cap.id}`);
          // ... JSON parse, enabled check ...
          await cap.registerTools(config, configStore, logger, tools);
          // ... findWork poller start ...
        }
      }

      // packages/core/src/capabilities/registry.ts:127-264 — initCapabilityRegistry
      // Returns { tools, capabilityIds, stopAll, getState, reload }
      // The `tools` object includes both capability tools AND preferences/task tools.
      // After wave 1: `sharedTools` replaces `tools` for capabilities; preferences/task
      // tools still go into `sharedTools` (they're always-available).

      // packages/core/src/capabilities/registry.ts:208-262 — reload()
      // NON_CAPABILITY_TOOLS exclusion set: set_preference, get_preferences,
      // schedule_task, list_tasks, cancel_task. These must not be cleared on reload.
    conventions: |
      Per-capability errors are logged via `logger.warn({ capabilityId, err })` and recorded in `state[cap.id].lastError`; never thrown out of the loop.
      Mutate the existing `tools` reference in place during `reload()` so external holders see updates without re-import — preserve this for `sharedTools`.
      `state` and `stopFns` are mutable buckets re-bound on reload via closure.

  - id: a3
