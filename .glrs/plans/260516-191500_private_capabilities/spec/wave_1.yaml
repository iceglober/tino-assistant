      // SYSTEM_USER_ID = "SYSTEM"; buildPrivateTools(SYSTEM_USER_ID) returns {}.
    conventions: |
      Closure-captured mutable state for `state`/`stopFns`/`loadedSharedCapabilityIds`;
      `sharedTools: ToolSet = {}` is a stable reference mutated in place across reloads;
      per-capability try/catch with `logger.warn` so one bad cap doesn't kill the registry;
      vitest mocks (`vi.fn()`); SYSTEM_USER_ID sentinel ("SYSTEM") for system-initiated runs.

  - id: a3
    intent: |
      `buildPrivateTools` materializes per-user tools from the configured
      private capabilities. SYSTEM_USER_ID returns {} (no private tools).
      Missing or disabled credentials skip cleanly without throwing
      (buildToolsForUser returns null and the cap is omitted).
    checked: false
    files:
      - path: packages/core/src/capabilities/registry.ts
        isNew: false
        change: |
          Inside `_materializePrivate(tinoUserId)`: short-circuit to
          `{ ids: [], tools: {} }` when `tinoUserId === SYSTEM_USER_ID`.
          For each private capability, read the global blob (wave 1
          transitional), JSON.parse with try/catch, and call
          `cap.buildToolsForUser(tinoUserId, config, configStore, logger)`.
          Treat a `null` return as "not connected" — skip the capability,
          do not throw. Catch per-capability exceptions and log.warn so
          one broken capability doesn't poison the whole materialization.
      - path: packages/core/src/capabilities/gmail.ts
        isNew: false
        change: |
          Convert from `registerTools` (shared pattern) to `buildToolsForUser`
          (private pattern). Add `scope: 'private'`. Return `null` when
          config is missing/disabled or any of clientId/clientSecret/
          refreshToken is absent. Construct `google.auth.OAuth2` and return
          a fresh `{ gmail_search, gmail_get_message }` ToolSet.
      - path: packages/core/src/capabilities/calendar.ts
        isNew: false
        change: |
          Same conversion as gmail.ts: scope: 'private',
          replace registerTools with buildToolsForUser, return null on
          missing/disabled config or missing credentials.
    tests:
      - packages/core/tests/capabilities/registry.test.ts
      - packages/core/tests/capabilities/gmail.test.ts
      - packages/core/tests/capabilities/calendar.test.ts
    verify: bun run --filter @tino/core test tests/capabilities/registry.test.ts tests/capabilities/gmail.test.ts tests/capabilities/calendar.test.ts
    mirror: packages/core/src/capabilities/gmail.ts
    context: |
      // packages/core/src/capabilities/gmail.ts (lines 17-69 — wave-1 shape)
      import { google } from "googleapis";
      import type { ConfigStore } from "../persistence/config.js";
      import type { AppLogger } from "../slack/app.js";
      import { gmailGetMessageTool, gmailSearchTool } from "../tools/google/gmail.js";
      import type { CapabilityConfig, PrivateCapability } from "./types.js";

      export const gmailCapability: PrivateCapability = {
        id: "gmail",
        displayName: "Gmail",
        scope: "private",
        fieldSchema: [ /* clientId, clientSecret, refreshToken */ ],
        async buildToolsForUser(_tinoUserId, config, _configStore, logger) {
          if (!config?.enabled) return null;
          const { clientId, clientSecret, refreshToken } = config.credentials;
          if (!clientId || !clientSecret || !refreshToken) return null;
          const auth = new google.auth.OAuth2(clientId, clientSecret);
          auth.setCredentials({ refresh_token: refreshToken });
          return {
            gmail_search: gmailSearchTool(auth, logger),
            gmail_get_message: gmailGetMessageTool(auth, logger),
          };
        },
      };
    conventions: |
      Return `null` from buildToolsForUser to mean "not connected" (NOT throw);
      destructure `config.credentials` after the null/enabled guard; OAuth client
      construction is per-call (cheap, isolates user state); fieldSchema declared
      alongside the module so the console can render an empty card before any blob exists.

  - id: a4
    intent: |
      `getActiveCapabilities` returns the right ids for the agent system prompt:
      shared ids always present (when enabled at init time); private ids present
      only when `buildToolsForUser` returned non-null for that user. SYSTEM_USER_ID
      returns shared ids only.
    checked: false
    files:
      - path: packages/core/src/capabilities/registry.ts
        isNew: false
        change: |
          Implement `getActiveCapabilities(tinoUserId)` as the union of
          `loadedSharedCapabilityIds` (captured at init when registerTools
          succeeds) and the connected-private ids returned by
          `_materializePrivate(tinoUserId).ids`. Track shared ids by pushing
          onto `loadedSharedCapabilityIds` only after `registerTools` succeeds
          (not when it throws or the cap is disabled).
    tests:
      - packages/core/tests/capabilities/registry.test.ts
    verify: bun run --filter @tino/core test tests/capabilities/registry.test.ts
    mirror: packages/core/src/capabilities/registry.ts
    context: |
      // packages/core/src/capabilities/registry.ts:298-301
      // async getActiveCapabilities(tinoUserId: string): Promise<string[]> {
      //   const { ids: privateIds } = await _materializePrivate(tinoUserId);
      //   return [...loadedSharedCapabilityIds, ...privateIds];
      // },
      //
      // _materializePrivate is the shared helper used by both buildPrivateTools
      // and getActiveCapabilities — avoids double-materializing on the same call.
      // For SYSTEM_USER_ID: returns { ids: [], tools: {} } at the top of the helper.
    conventions: |
      Use the shared `_materializePrivate` helper (do not duplicate its logic);
      `loadedSharedCapabilityIds` is pushed inside the per-cap try block AFTER
      `registerTools` resolves so failed caps don't appear active.

