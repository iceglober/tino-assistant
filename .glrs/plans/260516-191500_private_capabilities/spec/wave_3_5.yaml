# spec/wave_3_5.yaml
# Generated from wave_3_5.md — source-respecting privacy
items:
  - id: a1
    intent: |
      The Calendar privacy filter gates events whose source-side visibility is
      private or confidential, and gates default-visibility events when the
      calendar's default itself is private. Public events and explicit
      default-with-non-private-default pass through. The user-level
      gateAllByDefault opt-in gates everything when on.
    checked: true
    files:
      - path: packages/core/src/privacy/calendar.ts
        isNew: true
        change: |
          Pure function calendarPrivacyFilter(toolArgs, toolResult, gmailConfig?).
          Implements the table from "Per-capability behavior → Calendar":
            - visibility=private|confidential → persist:false (reason: 'private_event')
            - visibility=default + calendarDefaultVisibility=private → persist:false
            - visibility=default + calendarDefaultVisibility!=private → persist:true
            - visibility=public → persist:true
            - gateAllByDefault:true → persist:false unconditionally
          ~70 LOC. Branch coverage: each table row is one branch + one test.
      - path: packages/core/src/privacy/types.ts
        isNew: true
        change: |
          Defines PrivacyConfig, Decision, ToolResultPlaceholder, PrivacyFilter,
          CapabilityFilter. ToolResultPlaceholder has 'reason' enum including
          'private_event'. Calendar filter consumes config.calendar shape.
    tests:
      - packages/core/tests/privacy/calendar-filter.test.ts
    verify: cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/privacy/calendar-filter.test.ts
    mirror: packages/core/src/agent/history-appender.ts
    context: |
      // Existing wave-2 ToolResultPlaceholder + Decision shape lives in
      // packages/core/src/agent/history-appender.ts (lines 28-39):
      export type ToolResultPlaceholder = {
        type: "redacted";
        reason: string;                 // wave 3.5 narrows to a union
        metadata: Record<string, unknown>;
      };
      export type Decision =
        | { persist: true }
        | { persist: false; placeholder: ToolResultPlaceholder };
      export interface PrivacyFilter {
        evaluate(args: {
          capabilityId: string;
          toolName: string;
          toolArgs: unknown;
          toolResult: unknown;
        }): Decision;
      }
      // Wave 3.5 moves these (re-exporting for back-compat) into
      // packages/core/src/privacy/types.ts and tightens the `reason` union to
      // 'private_event' | 'private_label' | 'deny_listed_thread'
      // | 'deny_listed_dm' | 'address_deny_listed'.
    conventions: |
      ESM imports with .js extensions on relative paths; named exports only;
      pure functions for filters (no I/O, no side effects); test framework is
      vitest (not bun:test) — `import { describe, it, expect, vi } from "vitest"`;
      capability ids are kebab-case strings ('calendar', 'gmail', 'slack-personal');
      filter input shape: (toolArgs, toolResult, capabilityConfigSlice).

  - id: a2
    intent: |
      The Gmail privacy filter gates threads where any message has a label in
      privateLabels, or where any participant address is in
      denyListedAddresses. Conservative threading: one matching message gates
      the whole thread.
    checked: true
    files:
      - path: packages/core/src/privacy/gmail.ts
        isNew: true
        change: |
          Pure function gmailPrivacyFilter(toolArgs, toolResult, gmailConfig?).
          Helpers:
            - labelMatches(messageLabels, privateLabels): case-insensitive
              set membership.
            - addressMatches(addr, denyList): normalize plus-addressing
              (foo+tag@x → foo@x) and dots-in-localpart (Gmail rule);
              case-insensitive.
          Threading: scan all messages; first hit returns persist:false with
          reason 'private_label' or 'address_deny_listed'. ~100 LOC.
      - path: packages/core/src/privacy/types.ts
        isNew: true
        change: |
          GmailPrivacyConfig: { privateLabels: string[],
          denyListedAddresses: string[], threadingMode: 'conservative' }.
          Placeholder reason union includes 'private_label' and
          'address_deny_listed'. Placeholder metadata for Gmail:
          { threadId?, receivedAt?, labelHash? } (label name HASHED, not stored).
    tests:
      - packages/core/tests/privacy/gmail-filter.test.ts
    verify: cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/privacy/gmail-filter.test.ts
    mirror: packages/core/src/privacy/calendar.ts
    context: |
      // Pattern from existing capability module
      // (packages/core/src/capabilities/gmail.ts) for shape of the
      // toolResult that the filter receives — Gmail tools today wrap
      // googleapis output:
      //   thread = { id: string, messages: GmailMessage[] }
      //   GmailMessage = { id, labelIds, payload: { headers: [{name,value}] } }
      // Wave 2's defaultPrivacyFilter (the seam this replaces):
      export const defaultPrivacyFilter: PrivacyFilter = {
        evaluate: () => ({ persist: true }),
      };
    conventions: |
      ESM with .js on relative imports; vitest; pure-function filters;
      conservative threading by default; case-insensitive comparisons for
      labels and addresses; normalize Gmail-specific address quirks
      (plus-addressing, dots) before compare; hash label names in
      placeholder metadata (don't leak names like 'HR—termination').

  - id: a3
    intent: |
      The Slack privacy filter gates conversations whose id is deny-listed and
      conversations where any participant is deny-listed. Conservative
      multi-party: one deny-listed participant gates the whole MPIM.
    checked: true
    files:
      - path: packages/core/src/privacy/slack.ts
        isNew: true
        change: |
          Pure function slackPrivacyFilter(toolArgs, toolResult, slackConfig?).
          Handles 1:1 DMs (channel id starts with 'D'), MPIMs ('G'), and
          channels ('C'). Logic:
            - channelId in denyListedConversationIds → persist:false
              (reason 'deny_listed_dm')
            - any participant in denyListedUserIds → persist:false
              (reason 'deny_listed_dm')
            - else → persist:true
          Conservative multi-party rule for MPIMs. ~70 LOC.
      - path: packages/core/src/privacy/types.ts
        isNew: true
        change: |
          SlackPrivacyConfig: { denyListedConversationIds: string[],
          denyListedUserIds: string[], multiPartyMode: 'conservative' }.
          Placeholder metadata for Slack: { channelId?, ts? }.
    tests:
      - packages/core/tests/privacy/slack-filter.test.ts
    verify: cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/privacy/slack-filter.test.ts
    mirror: packages/core/src/privacy/calendar.ts
    context: |
      // Slack-personal capability id (already used in capabilities registry):
      //   'slack-personal' — see packages/core/src/capabilities/all.ts
      // Tool result shape uses Slack Web API conversation/message types:
      //   { channelId: string, messages: Array<{ user: string, ts: string, ... }> }
      //   For MPIMs the participant list typically comes via
      //   conversations.members or is inferred from message.user values.
    conventions: |
      ESM .js imports; vitest; pure functions; channel-id prefix discrimination
      (D/G/C) for DM vs MPIM vs channel; conservative-by-default multi-party
      semantics; asymmetric posture (alice's deny-list applies only to alice's
      history).

  - id: a4
    intent: |
      The history writer's seam is wired to the real privacy filter. Tool
      results that the filter gates are persisted as the metadata-only
      placeholder; non-gated results persist as bodies. The seam is the single
      path through which tool results enter HISTORY.
    checked: false
    files:
      - path: packages/core/src/agent/history-appender.ts
        isNew: false
        change: |
          Replace the wave-2 default filter wiring at call sites with
          createPrivacyFilter({ capabilities: { gmail, slack, calendar } })
          from privacy/filter.ts. The appender itself stays unchanged
          internally — only the *injected* filter changes. Add per-runAgent-call
          PrivacyConfigStore.get caching so one run produces multiple tool
          results without redundant config fetches. Add `privacy.filterEnabled`
          feature flag that falls back to defaultPrivacyFilter when off.
      - path: packages/core/src/privacy/filter.ts
        isNew: true
        change: |
          Orchestrator. createPrivacyFilter({capabilities}) returns a
          PrivacyFilter that dispatches by capabilityId:
            - 'gmail'          → gmailFilter
            - 'slack-personal' → slackFilter
            - 'calendar'       → calendarFilter
            - else (shared / SYSTEM) → { persist: true }
          ~60 LOC.
      - path: packages/core/src/agent/run.ts
        isNew: false
        change: |
          Thread the per-user PrivacyConfig fetch through the runAgent call so
          appendToolResult sees the right config slice for each tool result.
          Cache the config for the duration of the run.
    tests:
      - packages/core/tests/agent/history-appender.test.ts
    verify: cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/agent/history-appender.test.ts
    mirror: packages/core/src/agent/history-appender.ts
    context: |
      // Current wave-2 seam in packages/core/src/agent/history-appender.ts
      // (lines 75-124) — the function whose injected filter changes:
      export function createHistoryAppender(deps: {
        history: HistoryStore;
        privacyFilter: PrivacyFilter;
        logger: AppLogger;
      }): ToolResultAppender {
        const { history, privacyFilter, logger } = deps;
        return {
          async appendToolResult(input) {
            const decision = privacyFilter.evaluate({
              capabilityId: input.capabilityId,
              toolName:     input.toolName,
              toolArgs:     input.toolArgs,
              toolResult:   input.toolResult,
            });
            let output: ToolResultPart["output"];
            if (decision.persist) {
              output = { type: "json", value: input.toolResult as JSONValue };
            } else {
              logger.debug({ ... }, "redacted by privacy filter");
              output = { type: "json", value: decision.placeholder as JSONValue };
            }
            // ...build ModelMessage and history.append(...)
          },
        };
      }
    conventions: |
      DO NOT add new write paths — appendToolResult must remain the single
      seam (wave-2 invariant); inject filters via dependency injection,
      never import them directly inside the appender; per-run config cache;
      feature flag with safe wave-2 fallback behavior.

  - id: a5
    intent: |
      PrivacyConfigStore stores per-user privacy config encrypted with userId
      encryption context. Get returns plaintext config. Different users'
      configs are isolated. Decryption with mismatched userId fails.
    checked: false
    files:
      - path: packages/core/src/privacy/config-store.ts
        isNew: true
        change: |
          PrivacyConfigStore interface (get/set/computeDelta/isAdditive).
          SQLite + Dynamo adapters mirror UserCapabilityStore. Encrypt full
          PrivacyConfig JSON as one envelope per write with
          EncryptionContext={ userId, capabilityId: 'privacy_config',
          fieldName: 'config' }. ~120 LOC.
      - path: packages/core/package.json
        isNew: false
        change: |
          Add new export entries:
            "./privacy/types"
            "./privacy/config-store"
            "./privacy/filter"
            "./privacy/scrub"
          mirroring the wave-2 user-capabilities entry layout.
    tests:
      - packages/core/tests/privacy/config-store.test.ts
    verify: cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/privacy/config-store.test.ts
    mirror: packages/core/src/persistence/user-capabilities.ts
    context: |
      // From packages/core/src/persistence/user-capabilities.ts (wave-2
      // pattern this mirrors) — encryption-context wiring:
      async set(tinoUserId: string, capabilityId: string, config: UserCapabilityConfig) {
        const encryptedMap: Record<string, EnvelopeCiphertext> = {};
        for (const [fieldName, plaintext] of Object.entries(config.credentials)) {
          const ctx: EncryptionContext = { userId: tinoUserId, capabilityId, fieldName };
          encryptedMap[fieldName] = await cryptoAdapter.encrypt(plaintext, ctx);
        }
        stmtUpsert.run(tinoUserId, capabilityId, ...);
      }
      // Wave 3.5: capabilityId is the constant 'privacy_config' (the row is
      // a single JSON envelope, not a per-field map):
      //   ctx = { userId, capabilityId: 'privacy_config', fieldName: 'config' }
      //   encryptedConfig = cryptoAdapter.encrypt(JSON.stringify(config), ctx)
    conventions: |
      Mirror UserCapabilityStore layout (sqlite + dynamo adapters);
      EncryptionContext is FIXED schema { userId, capabilityId, fieldName } —
      see packages/core/src/crypto/types.ts; one envelope per write
      (not per-field as user-capabilities does, because privacy config is a
      single coherent blob); decrypt MUST fail on wrong userId context (KMS
      AAD enforcement) — assert this in tests.

  - id: a6
    intent: |
      The retroactive scrub re-evaluates persisted history rows under a new
      (additive) privacy config and overwrites bodies with placeholders.
      Idempotent. Emits an audit entry on completion.
    checked: false
    files:
      - path: packages/core/src/privacy/scrub.ts
        isNew: true
        change: |
          runScrub(deps) function. Paginates HISTORY#<userId>, decrypts each
          tool-result row, re-evaluates the new filter against
          (capability, args, result), re-encrypts placeholder if filter now
          gates, writes back via conditional update. Emits 'privacy_scrub'
          audit entry. Idempotent (rows already scrubbed re-evaluate to
          'still gated'). Per-user lock with 5-minute lease to avoid
          concurrent scrubs on the same partition. ~150 LOC.
      - path: packages/core/src/audit/logger.ts
        isNew: false
        change: |
          Extend AuditEntry.action union with 'privacy_scrub',
          'privacy_config_change', 'privacy_setup_completed'.
    tests:
      - packages/core/tests/privacy/scrub.test.ts
    verify: cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/privacy/scrub.test.ts
    mirror: packages/core/src/agent/history-appender.ts
    context: |
      // Current AuditEntry.action union in packages/core/src/audit/logger.ts:
      action:
        | "tool_call"
        | "config_change"
        | "login"
        | "capability_toggle"
        | "task_scheduled"
        | "task_executed"
        | "injection_suspected"
        | "user_deprovisioned"
        | "admin_restart";
      // Wave 3.5 adds three actions:
      //   | "privacy_config_change"
      //   | "privacy_scrub"
      //   | "privacy_setup_completed"
    conventions: |
      Vitest tests; idempotency-by-construction (re-running yields the same
      placeholder because metadata derives from args/result, not from the
      now-replaced body); per-user job lock; conditional-update writes
      (don't blindly overwrite); audit entry on completion only (one per
      page when paginating large histories).

  - id: a7
    intent: |
      The onboarding gate redirects new users to /onboarding until
      privacy_setup_completed_at is set. API routes return 403 with
      onboarding_required. The /api/auth/* and /onboarding/* paths bypass
      the gate.
    checked: false
    files:
      - path: packages/core/src/server/middleware/onboarding-gate.ts
        isNew: true
        change: |
          Hono middleware. Bypass paths: /onboarding, /api/onboarding,
          /api/auth. Otherwise: if user.privacy_setup_completed_at is null,
          API routes (/api/*) return 403 { error: 'onboarding_required' };
          non-API routes c.redirect('/onboarding'). Reads user from
          c.get('user') populated by the wave-3 auth middleware. ~30 LOC.
      - path: packages/core/src/server/index.ts
        isNew: false
        change: |
          Mount onboardingGate() AFTER buildAuthMiddleware() so it sees the
          authenticated user on context. Gate every protected console route.
    tests:
      - packages/core/tests/server/onboarding-gate.test.ts
    verify: cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/server/onboarding-gate.test.ts
    mirror: packages/core/src/server/middleware/auth.ts
    context: |
      // From packages/core/src/server/middleware/auth.ts (the bypass-list
      // pattern to mirror, lines 107-148):
      return async (c, next) => {
        const url = c.req.path;
        // Public paths bypass auth
        if (url.startsWith("/api/auth/") || url === "/api/health" || url.startsWith("/assets/")) {
          await next();
          return;
        }
        // ... session check ...
        c.set("user", { id: session.user.id, email: session.user.email, name: session.user.name });
        await next();
      };
      // Wave 3.5 onboarding-gate is the next middleware in the chain;
      // it reads c.get('user') after auth has set it.
    conventions: |
      Hono MiddlewareHandler<{ Variables: AuthVariables }>; path-prefix
      bypass list; differentiate /api/* (JSON 403) vs browser routes
      (302 redirect); read user from c.get('user') (set by auth middleware);
      privacy_setup_completed_at lives on the better-auth user table
      extension, accessed via the same session lookup.

