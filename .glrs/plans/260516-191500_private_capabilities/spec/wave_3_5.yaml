    mirror: packages/core/src/server/routes/user-capabilities.ts
    context: |
      // From packages/core/src/server/routes/user-capabilities.ts —
      // pattern to mirror for resolving the requesting user and shape of
      // route handlers (lines 30-69):
      async function resolveUser(c, identityResolver): Promise<string | null> {
        const user = c.get("user");
        if (!user?.email) return null;
        return identityResolver.resolveGoogle(user.email);
      }
      app.get("/", async (c) => {
        const tinoUserId = await resolveUser(c, identityResolver);
