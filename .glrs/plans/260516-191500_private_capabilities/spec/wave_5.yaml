      //     await config.delete(capKey);
      //   }
      //
      // After wave 5:
      //
      //   await config.set(userStatusKey(targetUserId), "deactivated");
      //   const prefix = userCapabilityKeyPrefix(targetUserId);
      //   const personalCapKeys = entries
      //     .filter((e) => e.key.startsWith(prefix))
      //     .map((e) => e.key);
