# spec/wave_5.yaml
# Wave 5: instruction precedence + per-instance isolation + multi-tenant foundation.
#
# This wave is PURELY ADDITIVE on top of waves 0–4. It introduces:
#  - An InstructionResolver (pure function over Instruction[]) implementing the
#    precedence rules from docs/plans/product.md:401-424 (most-restrictive-wins
#    for permissions; later-overrides-earlier for behavior, ordered base → org →
#    cap-type → cap-instance → user).
#  - System-prompt extensions to render the resolved Instructions and Permissions
#    sections (buildSystemPrompt grows an `instructions` arg).
#  - Per-capability-instance `canShareWith` isolation — opt-in allow-list for
#    cross-instance tool-result visibility. Capabilities that don't declare it
#    are unaffected.
#  - A central tenant-prefix module (`packages/core/src/persistence/keys.ts`)
#    that owns every partition-key shape. `tenantPrefix()` returns "" today;
#    flipping to "TENANT#<id>#" is a one-line change later. Every existing
#    `USER#...` / `ORG#USER#...` / `IDENTITY#...` / etc. literal is replaced
#    with a call to a helper from this module.
#  - Admin/user instruction CRUD routes (/api/org/instructions + /api/me/instructions).
#
# Wave 5 is OPTIONAL — waves 0–4 already deliver the privacy boundary. Skipping
# wave 5 doesn't break anything. The instruction-precedence rules are nice-to-have
# for a 3-person team; per-instance isolation is for users who connect to multiple
# instances of the same capability type; the multi-tenant constant is no-op today.
#
# IMPORTANT — path notes (executor: read carefully):
#   - The plan-doc paths `packages/core/src/...` are correct; the plan-doc paths
#     `tests/...` map to `packages/core/tests/...` (tests are co-located per
#     package). Use `packages/core/tests/...` when creating real files.
#   - The plan-doc says `bun:test`; THIS REPO USES VITEST. Use
#     `import { describe, it, expect, vi } from "vitest";`. The verify command
#     `bun run test` is fine — it wraps vitest at the workspace level.
#   - Partition keys live in BOTH `packages/core` (sqlite stores, in-memory) AND
#     `packages/aws/src/persistence/dynamo/*.ts`. The keys module MUST be the
#     single source of truth for both. Place `keys.ts` under `packages/core`
#     and import it from the aws package (which already depends on @tino/core).
#   - `requireAdmin()` middleware is introduced in wave 3/4 (see wave_3.yaml and
#     wave_4.yaml). Wave 5 ASSUMES it exists. If executor finds it missing,
#     escalate — do not re-implement it here.
#   - `CapabilityConfig` already exists at `packages/core/src/capabilities/types.ts:13-22`
#     — wave 5 ADDS an optional `instructions?: { ... }` field; do not change the
#     existing fields' shapes.
#   - `buildSystemPrompt` currently takes `{ activeCapabilities, toolNames }`
#     (see packages/core/src/agent/systemPrompt.ts:20). Wave 5 ADDS an optional
#     third arg `instructions?: ResolvedInstructions`. Keep the arg optional so
#     existing call-sites and tests don't break — when omitted, render the
#     prompt as today (no Instructions/Permissions section).

items:
  - id: a1
    intent: |
      The instruction resolver implements the precedence rules from
      docs/plans/product.md:401-424 — permissions resolve via
      most-restrictive-wins regardless of level (any `false` beats any
      `true`); behavioral text resolves via later-overrides-earlier ordered
      by level (base → org → cap-type → cap-instance → user). Conflicts at
      the cap-instance level (two instances of the same type disagreeing on
      permissions) are recorded in `conflicts` but do NOT block resolution
      — the most-restrictive value still wins.
    checked: false
    files:
      - path: packages/core/src/instructions/types.ts
        isNew: true
        change: |
          Define InstructionLevel ('base' | 'org' | 'cap-type' |
          'cap-instance' | 'user'), Instruction (level, source, text?,
          permissions?), and ResolvedInstructions (permissions,
          behaviorChunks, conflicts). Exported types only — no logic.
          See the wave_5.md "file-level changes" section for the exact
          interface shapes.
      - path: packages/core/src/instructions/resolver.ts
        isNew: true
        change: |
          Pure function `resolveInstructions(instructions: Instruction[]):
          ResolvedInstructions`. Algorithm:
            1. Permissions: default { write: true, delete: true,
               crossContextShare: true }. Iterate every input; any
               `permissions.<field> === false` flips the resolved field
               to false. Order doesn't matter for permissions.
            2. Behavior: sort inputs by level (base=0, org=1, cap-type=2,
               cap-instance=3, user=4), then by source within a level for
               stable output. Emit `{ source, text }` for each input that
               has a non-empty text. The "later-overrides-earlier" rule
               is implicit in ordering — we DO NOT attempt to detect-and-
               replace earlier text; we just append later. The model
               treats later context as stronger.
            3. Conflicts: at level === 'cap-instance', if two inputs share
               the same cap-type prefix (derive from source — e.g.
               'linear-internal' and 'linear-customer' both prefixed
               'linear') AND disagree on any permission field, push
               { a, b, field } to conflicts. Do NOT block; the most-
               restrictive value already won in step 1.
          No I/O. No external deps beyond the types module.
    tests:
      - packages/core/tests/instructions/resolver.test.ts::"empty input returns default permissions"
      - packages/core/tests/instructions/resolver.test.ts::"org write:false beats user write:true (most-restrictive)"
      - packages/core/tests/instructions/resolver.test.ts::"behavior chunks are ordered base to user"
      - packages/core/tests/instructions/resolver.test.ts::"two cap-instance instructions with disagreeing permissions record a conflict"
    verify: bun run --filter @tino/core test tests/instructions/resolver.test.ts
    mirror: packages/core/src/agent/output-validator.ts
    context: |
      // packages/core/src/instructions/types.ts (NEW) — exact shape
      export type InstructionLevel = 'base' | 'org' | 'cap-type' | 'cap-instance' | 'user';
      export interface Instruction {
        level: InstructionLevel;
        source: string;
        text?: string;
        permissions?: Partial<{
          write: boolean;
          delete: boolean;
          crossContextShare: boolean;
        }>;
      }
      export interface ResolvedInstructions {
        permissions: { write: boolean; delete: boolean; crossContextShare: boolean };
        behaviorChunks: Array<{ source: string; text: string }>;
        conflicts: Array<{ a: Instruction; b: Instruction; field: string }>;
      }

      // packages/core/src/agent/output-validator.ts — mirror for the pure-function
      // shape; it's a small, dependency-free module that takes plain inputs and
      // returns a structured result. Same style applies here.
    conventions: |
      - ESM imports with `.js` extensions (TypeScript ESM project resolution).
      - Named exports only (no default exports anywhere in this repo).
      - Vitest: `import { describe, it, expect } from "vitest";`
      - Co-located tests under `packages/core/tests/<area>/<name>.test.ts`.
      - Pure functions: no I/O, no logger, no Date.now() — deterministic
        inputs and outputs so tests can be exhaustive.
      - Use string-literal-union types for discriminators (see
        `InstructionLevel`), not TS enums.
    proof: |
      Tests must cover:
        - empty Instruction[] → permissions all true, behaviorChunks empty,
          conflicts empty.
        - one org-level instruction with permissions.write=false →
          resolved.permissions.write === false.
        - org write:false + user write:true → resolved.permissions.write
          === false (most-restrictive across levels).
        - Mixed text across all 5 levels → behaviorChunks length matches
          input count and the order is exactly base, org, cap-type,
          cap-instance, user (verify by reading `level` of each chunk's
          source, or by ordering source strings deterministically).
        - Two cap-instance instructions both prefixed 'linear-' (e.g.
          'linear-internal' write:true and 'linear-customer' write:false)
          → conflicts contains exactly one entry whose `field` is 'write';
          resolved.permissions.write === false.
        - Two cap-instance instructions on DIFFERENT cap types ('linear-internal'
          vs 'jira-internal') with disagreeing perms → NO conflict recorded
          (different types — not a comparable conflict).
    proof_type: test

