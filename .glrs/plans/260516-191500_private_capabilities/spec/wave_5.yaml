  - id: a4
    intent: |
      All partition-key construction is centralised in a single keys
      module. The tenant prefix is currently empty string but is the
      single point of change for a future managed-multi-tenant offering.
      Every existing call site that builds a `user.<id>...` key (or any
      future `USER#<id>...` shape) routes through one of the helpers; no
      bare string-concatenation of partition keys remains in the
      codebase.
    checked: true
    files:
      - path: packages/core/src/persistence/keys.ts
        isNew: true
        change: |
          New module exporting:
            - `tenantPrefix(): string` — returns `""` today; documented as
              the single point of edit for managed multi-tenancy. The plan's
              comment block ("read from `org.tenantId` config at startup")
              describes the future shape; wave 5 ships the no-arg
              constant return.
            - `userKey(tinoUserId: string): string` — returns
              `${tenantPrefix()}user.${tinoUserId}` matching the existing
              key shape used by `server/routes/users.ts` (e.g.
              `user.<id>.status`, `user.<id>.capability.<capId>`). Do NOT
              switch to a synthetic `USER#<id>` prefix that doesn't exist
              today.
            - `userStatusKey`, `userCapabilityKey`, `userHistoryKey`, and
              one helper per partition-key shape currently constructed
              by string concat across the codebase. Audit the codebase
              first (grep `user.${` and `user.\${`) and add a helper for
              each unique shape found. The plan's `userHistoryKey` is
              forward-looking; if no `user.<id>.HISTORY` shape exists
              today, omit it OR implement against whatever history-store
              partition shape DOES exist.
          All helpers are pure functions; `tenantPrefix()` is read on
          every call (no caching) so a future config-driven version can
          flip without process restart.
      - path: packages/core/src/server/routes/users.ts
        isNew: false
        change: |
          Replace the literal `user.${targetUserId}.status` and
          `user.${targetUserId}.capability.` prefixes (lines 29 and 34)
          with calls to `userStatusKey(targetUserId)` and
          `userCapabilityKeyPrefix(targetUserId)`. Behavior unchanged.
      - path: packages/core/src/persistence/user-capabilities.ts
        isNew: false
        change: |
          Audit for any `user.${...}.capability.` literal construction;
          replace with helpers. If the file already factors keys through
          a local helper, prefer routing that local helper through the
          new keys module.
      - path: packages/core/src/persistence/preferences.ts
        isNew: false
        change: |
          Same audit + replacement for preferences keys.
      - path: packages/core/tests/persistence/keys.test.ts
        isNew: true
        change: |
          Vitest unit tests:
            - tenantPrefix() returns "" by default.
            - userKey('abc') returns 'user.abc' (matching existing shape).
            - changing tenantPrefix (via a temporary export-for-tests
              hook OR by spying with vi.spyOn) flows through every
              derived helper.
            - round-trip: a key built by `userStatusKey(id)` parses back
              into the same id when split (sanity check).
    tests:
      - 'packages/core/tests/persistence/keys.test.ts::"tenantPrefix returns empty string by default"'
      - 'packages/core/tests/persistence/keys.test.ts::"userKey produces USER#<id> with no prefix"'
      - 'packages/core/tests/persistence/keys.test.ts::"changing tenantPrefix changes all derived keys"'
    verify: bun run --filter @tino/core test tests/persistence/keys.test.ts
    mirror: packages/core/src/persistence/config.ts
    context: |
      // EXISTING — packages/core/src/server/routes/users.ts (lines 28-37)
      // shows the current key-construction pattern that needs centralising:
      //
      //   // 1. Set user status to deactivated
      //   await config.set(`user.${targetUserId}.status`, "deactivated");
      //
      //   // 2. Delete personal capability tokens
      //   const entries = await config.list();
      //   const personalCapKeys = entries
      //     .filter((e) => e.key.startsWith(`user.${targetUserId}.capability.`))
      //     .map((e) => e.key);
