  - id: a3
    intent: |
      Per-instance isolation prevents data from one capability instance
      leaking into a context that shouldn't see it. `canShareWith` is the
      explicit allow-list — an array of capability-instance ids that the
      data source allows its data to flow to. When the active context's
      instance id is NOT in the source's canShareWith, the tool result is
      replaced with `{ filtered: true, reason: 'isolated by canShareWith' }`
      so the model can adapt. Capabilities WITHOUT `canShareWith` declared
      are unaffected (backwards-compatible).
    checked: false
    files:
      - path: packages/core/src/capabilities/types.ts
        isNew: false
        change: |
          Extend `CapabilityConfig` (currently at lines 13-22) with an
          optional `instructions` field:
            export interface CapabilityConfig {
              enabled: boolean;
              credentials: Record<string, string>;
              settings: Record<string, unknown>;
              findWork?: { enabled: boolean; intervalMinutes: number; lastScanAt?: number };
              instructions?: {
                text?: string;
                permissions?: Partial<{ write: boolean; delete: boolean; crossContextShare: boolean }>;
                canShareWith?: string[]; // capability-instance ids this instance allows data to flow to
              };
            }
          Keep all existing fields unchanged. The `instructions` field is
          optional so every existing capability config blob loads as-is.
      - path: packages/core/src/instructions/per-instance-isolation.ts
        isNew: true
        change: |
          New module exporting `filterToolResultByIsolation(opts: {
            toolResult: unknown;
            sourceInstanceId: string;            // which instance produced this result
            sourceCanShareWith: string[] | undefined; // its declared allow-list (undefined = no isolation)
            activeContextInstanceId: string;     // the instance the agent run is "for"
          }): unknown`.
          Logic:
            - If sourceCanShareWith is undefined → return toolResult unchanged
              (capability didn't opt into isolation).
            - If sourceInstanceId === activeContextInstanceId → return
              toolResult unchanged (same instance = always visible).
            - If sourceCanShareWith includes activeContextInstanceId →
              return toolResult unchanged.
            - Otherwise → return { filtered: true, reason: 'isolated by canShareWith' }.
          Pure function. No I/O.
      - path: packages/core/src/agent/run.ts
        isNew: false
        change: |
          This file already wires runAgent. Wave 5 adds — but DOES NOT YET
          ENABLE — the isolation filter. Add a helper invocation point
          around the tool-execution loop OR inside a wrapping ToolSet
          (preferred: wrap each tool's `execute` with a function that
          invokes the filter on the result). Gate on:
            opts.activeContextInstanceId !== undefined &&
            <source capability declares canShareWith>
          For the wave-5 PR, this can be a small TODO seam — the unit
          tests in tests/instructions/isolation.test.ts exercise the pure
          filter function directly; the run.ts integration is exercised
          via a tightly-mocked test in tests/instructions/isolation.test.ts
          (see proof). Do NOT change the existing happy path for
          capabilities that don't declare canShareWith.
    tests:
      - packages/core/tests/instructions/isolation.test.ts::"tool result from instance A is visible in context A"
      - packages/core/tests/instructions/isolation.test.ts::"tool result from instance B is filtered when canShareWith excludes A"
      - packages/core/tests/instructions/isolation.test.ts::"tool result from instance B is visible when canShareWith includes A"
    verify: bun run --filter @tino/core test tests/instructions/isolation.test.ts
    mirror: packages/core/src/agent/output-validator.ts
    context: |
      // packages/core/src/capabilities/types.ts:13-22 — CapabilityConfig today
      export interface CapabilityConfig {
        enabled: boolean;
        credentials: Record<string, string>;
        settings: Record<string, unknown>;
        findWork?: { enabled: boolean; intervalMinutes: number; lastScanAt?: number };
      }

      // packages/core/src/agent/run.ts:39-51 — the existing runAgent core loop
      // wraps generateText({ model, system, messages, tools, stopWhen }). Wave 5
      // wraps the tools' execute functions BEFORE passing them in, so the model
      // sees post-filter results.
    conventions: |
      - "Instance id" semantics: a single capability type (e.g. 'linear')
        may have multiple configured instances. Today, the existing config
        path stores ONE config per (userId, capabilityId). For wave 5, the
        instance id == capabilityId (since multi-instance-same-type is not
        yet a real configuration shape). The filter function takes the id
        as a string and treats it opaquely — future multi-instance work
        can use 'linear-internal'/'linear-customer' without changing the
        filter.
      - Pure function. No logger, no I/O. Returns a plain object on filter
        so JSON serialization is trivial.
      - Filtered shape MUST be JSON-serializable so the model can read
        and adapt: `{ filtered: true, reason: 'isolated by canShareWith' }`.
    proof: |
      Tests must directly exercise filterToolResultByIsolation with
      synthetic inputs:
        - sourceInstanceId='A', activeContextInstanceId='A',
          sourceCanShareWith=[] → returns the original toolResult unchanged
          (same instance always wins).
        - sourceInstanceId='B', activeContextInstanceId='A',
          sourceCanShareWith=[] → returns
          { filtered: true, reason: 'isolated by canShareWith' }.
        - sourceInstanceId='B', activeContextInstanceId='A',
          sourceCanShareWith=['A'] → returns the original toolResult.
        - sourceCanShareWith=undefined → returns the original toolResult
          regardless of instance ids (proves the backwards-compatibility
          escape hatch for capabilities that haven't opted in).
    proof_type: test

