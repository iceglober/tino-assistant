# spec/wave_5.yaml
# Wave 5: instruction precedence + per-instance isolation + multi-tenant foundation.
#
# Implements the precedence rules from docs/plans/product.md:401-424
# (most-restrictive-wins for permissions, later-overrides-earlier for behavior).
# Adds per-capability-instance "canShareWith" labels for isolating two
# instances of the same capability type. Extracts the partition-key prefix
# into a single constant so a future managed-multi-tenant offering can swap
# "" for "TENANT#<tenantId>#" in one place.
#
# This wave is purely additive and can be deferred indefinitely. Waves 0-4
# already deliver the privacy boundary; wave 5 adds the next-layer features.
#
# IMPORTANT — path notes (executor: read carefully — same as waves 3 & 4):
#   - The plan-doc paths `tests/...` map to `packages/core/tests/...` in
#     this repo (tests are co-located per package). When CREATING real
#     files use `packages/core/tests/...`.
#   - The plan-doc says `bun:test` and `bun run test`; THIS REPO USES
#     VITEST. Use `import { describe, it, expect, vi } from "vitest";`.
#     The verify command `bun run test` is fine — it wraps vitest at the
#     workspace level.
#   - The plan's `packages/core/src/persistence/keys.ts` is NEW. The
#     existing persistence layer in this repo is a key-value config store
#     (`config.set('user.<id>.status', ...)`) — NOT DynamoDB-style
#     `USER#<id>` partition keys. The keys-module described in the plan
#     is forward-looking groundwork for a future managed offering. In
#     this repo, the helpers wrap the `user.<id>` / `user.<id>.capability.*`
#     prefixes used in places like `packages/core/src/server/routes/users.ts`
#     and replace literal string concatenation with helper calls. Do NOT
#     introduce a synthetic `USER#` prefix that doesn't exist today —
#     match the existing key shapes and add `tenantPrefix()` in front.

items:
  - id: a1
    intent: |
      The instruction resolver implements the precedence rules from
      product.md — permissions resolve via most-restrictive-wins regardless
      of level (any `false` flag wins over any `true`); behavioral text
      resolves via later-overrides-earlier ordered by level
      (base → org → cap-type → cap-instance → user). Conflicts at the
      same level (e.g. two cap-instance instructions disagreeing on
      permissions) are recorded in `conflicts` but do not block — the
      most-restrictive value still wins.
    checked: true
    files:
      - path: packages/core/src/instructions/types.ts
        isNew: true
        change: |
          Define `InstructionLevel`, `Instruction`, and `ResolvedInstructions`
          per the plan's "types.ts" block. `Instruction` carries optional
          behavioral text and optional partial permission flags (write,
          delete, crossContextShare). `ResolvedInstructions` exposes a
          fully-resolved permission set, an ordered behaviorChunks array
          (each `{ source, text }`), and a `conflicts` array recording any
          same-level disagreements detected during resolution.
      - path: packages/core/src/instructions/resolver.ts
        isNew: true
        change: |
          Pure function `resolveInstructions(instructions: Instruction[]): ResolvedInstructions`.
          No I/O, no async. Algorithm:
            1. permissions: start with default ALLOW for write/delete/crossContextShare;
               iterate every instruction's `permissions` partial; for each declared
               flag, if value is `false` OR (value is `true` AND a previous instruction
               at the same level set it to `false`), retain `false`. Net: any single
               `false` wins.
            2. behavior: stable-sort instructions by level using
               base → org → cap-type → cap-instance → user; emit each instruction's
               `text` (if present) into `behaviorChunks` in that order, prefixed
               with `source`. No detect-and-replace — later text simply appears
               later in the prompt.
            3. conflicts: when two instructions at the SAME level disagree on a
               permission flag, append `{ a, b, field }` to `conflicts`. Do NOT
               record a conflict for cross-level disagreement — that's expected
               (most-restrictive-wins handles it).
      - path: packages/core/tests/instructions/resolver.test.ts
        isNew: true
        change: |
          Vitest unit tests covering: empty input → defaults; single org
          write:false → resolved write:false; org write:false + user
          write:true → resolved write:false (most-restrictive); behavior
          chunks ordered base→user across all five levels; two cap-instance
          instructions on the SAME instance type with disagreeing
          permissions → one conflict recorded; cross-level disagreement
          → no conflict (expected).
    tests:
      - 'packages/core/tests/instructions/resolver.test.ts::"empty input returns default permissions"'
      - 'packages/core/tests/instructions/resolver.test.ts::"org write:false beats user write:true (most-restrictive)"'
      - 'packages/core/tests/instructions/resolver.test.ts::"behavior chunks are ordered base to user"'
      - 'packages/core/tests/instructions/resolver.test.ts::"two cap-instance instructions with disagreeing permissions record a conflict"'
    verify: bun run --filter @tino/core test tests/instructions/resolver.test.ts
    mirror: packages/core/src/agent/output-validator.ts
    context: |
