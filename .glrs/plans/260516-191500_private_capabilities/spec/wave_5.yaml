  - id: a5
    intent: |
      Admin and user instruction APIs work end-to-end. An admin can
      GET/PUT org-level instructions; a member can GET/PUT their own
      user-level instructions; a member is forbidden from setting
      org-level instructions (403). The system prompt for a member's
      agent run includes both the org and user instructions, with
      user-level appended last (matching the resolver's
      base → org → cap-type → cap-instance → user ordering).
    checked: true
    files:
      - path: packages/core/src/server/routes/instructions.ts
        isNew: true
        change: |
          New Hono router. `createInstructionsRoutes({ config, logger,
          auditLogger })`. Endpoints:
            - GET  /api/org/instructions       — admin-only via the
              existing requireAdmin() middleware mounted on /api/org/* in
              server/index.ts. Returns `{ instructions: Instruction[] }`
              read from `org.instructions` config key; defaults to `[]`.
            - PUT  /api/org/instructions       — admin-only. Body:
              `{ instructions: Instruction[] }`. Validates each entry has
              `level: 'org'`. Persists to `org.instructions`. Audit-logs
              an `org_instructions_updated` action.
            - GET  /api/me/instructions        — auth-only (any member).
              Returns the requesting user's instructions from
              `user.<userId>.instructions` (use the keys helper from a4).
            - PUT  /api/me/instructions        — auth-only. Body:
              `{ instructions: Instruction[] }`. Validates each entry has
              `level: 'user'`. Persists per-user. Audit-logs
              `user_instructions_updated`.
          The /api/org/* mount in server/index.ts already enforces
          requireAdmin() (set up in wave 3); the /api/me/* mount is
          auth-only. Member hitting /api/org/instructions → 403 by
          middleware (no extra check needed in this route).
      - path: packages/core/src/server/index.ts
        isNew: false
        change: |
          Mount the new router under both `/api/org/instructions`
          (admin-gated by the existing requireAdmin on /api/org/*) and
          `/api/me/instructions` (auth-only). Same shape as the wave-3
          /api/me/capabilities mount.
      - path: packages/core/src/instructions/resolver.ts
        isNew: false
        change: |
          Add `resolveInstructionsForUser({ tinoUserId, activeCapabilities,
          configStore, userCapStore, userStore })` — the I/O wrapper that
          loads org instructions from `org.instructions`, user instructions
          from `user.<id>.instructions`, capability-type instructions from
          each active capability's `capability.<capId>.instructions`, and
          builds the `Instruction[]` input to the pure `resolveInstructions`.
          (a1 ships the pure resolver; a5 ships the wrapper that calls it.)
      - path: packages/core/src/agent/run.ts
        isNew: false
        change: |
          Before `generateText`, call `resolveInstructionsForUser` and
          pass the returned `ResolvedInstructions` to `buildSystemPrompt`:
            const instructions = await resolveInstructionsForUser({
              tinoUserId: userId,
              activeCapabilities,
              configStore,
              userCapStore,
              userStore,
            });
            const systemPrompt = buildSystemPrompt({
              activeCapabilities,
              toolNames: Object.keys(tools ?? {}),
              instructions,
            });
          The `resolveInstructionsForUser` deps come from new
          `RunAgentParams` fields (configStore, userCapStore, userStore);
          when these deps are undefined, skip resolution and call
          `buildSystemPrompt` without `instructions` — preserves
          backwards compat for existing `runAgent` callers/tests.
      - path: packages/core/tests/server/instructions-routes.test.ts
        isNew: true
        change: |
          Vitest tests: admin can PUT org instructions; member CANNOT
          PUT org instructions (403); member can PUT their own
          instructions; GET/PUT round-trip preserves data; non-org-level
          entries in PUT /api/org/instructions are rejected (400);
          non-user-level entries in PUT /api/me/instructions rejected
