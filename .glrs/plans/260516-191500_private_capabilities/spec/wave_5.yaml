  - id: a3
    intent: |
      Per-instance isolation prevents data from one capability instance
      leaking into a context that shouldn't see it. `canShareWith` on a
      capability config is the explicit allow-list of OTHER instance ids
      that may receive its data. When an agent run involves multiple
      capability instances and the active context is "instance A", tool
      results from "instance B" are filtered out unless `B.canShareWith`
      includes `A`'s id. Capabilities without `canShareWith` declared on
      their config are unaffected (default-allow for backwards compat).
    checked: true
    files:
      - path: packages/core/src/capabilities/types.ts
        isNew: false
        change: |
          Extend `CapabilityConfig` with an optional `instructions` field:
            instructions?: {
              text?: string;
              permissions?: Partial<{ write: boolean; delete: boolean; crossContextShare: boolean }>;
              canShareWith?: string[]; // capability instance ids
            }
          The field sits at the same level as `enabled`, `credentials`,
          `settings`, `findWork` — i.e. it's another top-level key on the
          stored JSON blob. No required fields; absent `instructions`
          means "default allow + no extra prompt + no isolation."
      - path: packages/core/src/instructions/per-instance-isolation.ts
        isNew: true
        change: |
          Export a wrapping helper that, given a tool result and the
          `(activeInstanceId, sourceInstanceId, sourceConfig)` triple,
          returns either the original result OR a sentinel
          `{ filtered: true, reason: 'isolated by canShareWith' }`.
          Filter rule:
            - If sourceConfig has no `instructions.canShareWith`,
              return original (default-allow / backwards compat).
            - If `activeInstanceId === sourceInstanceId`, return original
              (same instance always sees its own data).
            - If `sourceConfig.instructions.canShareWith.includes(activeInstanceId)`,
              return original.
            - Otherwise return the sentinel.
          Wave 5 ships this as a wrapping layer around runAgent's tool-call
          loop in `agent/run.ts` — applied only to capabilities that
          declare `canShareWith` on their config.
      - path: packages/core/src/agent/run.ts
        isNew: false
        change: |
          When iterating `result.response.messages` tool-result parts (the
          existing wave-2 history-seam loop, ~lines 130-153), call into
          `per-instance-isolation` BEFORE handing the result to either the
          historyAppender path OR the legacy whole-batch append path.
          The active-context instance id comes from the run's userId +
          per-user capability config; the source instance id comes from
          the tool's capability config (already resolvable via
          `toolNameToCapabilityId`). Apply only when sourceConfig has
          `instructions.canShareWith` declared — otherwise skip the wrap
          (backwards compat).
      - path: packages/core/tests/instructions/isolation.test.ts
        isNew: true
        change: |
          Vitest unit tests for the isolation wrapper, NO live agent run
          (mock the `(activeInstanceId, sourceInstanceId, sourceConfig)`
          inputs directly). Cases per the plan: A→A passes; B→A blocked
          when canShareWith=[]; B→A passes when canShareWith=[A]; absent
          canShareWith on source → default-allow (backwards compat).
          One additional case: conflict-warning surface (when the
          resolver records a conflicts entry, that entry is observable
          via the ResolvedInstructions returned by resolveInstructions).
    tests:
      - 'packages/core/tests/instructions/isolation.test.ts::"tool result from instance A is visible in context A"'
      - 'packages/core/tests/instructions/isolation.test.ts::"tool result from instance B is filtered when canShareWith excludes A"'
      - 'packages/core/tests/instructions/isolation.test.ts::"tool result from instance B is visible when canShareWith includes A"'
    verify: bun run --filter @tino/core test tests/instructions/isolation.test.ts
    mirror: packages/core/src/agent/run.ts
