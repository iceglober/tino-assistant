  - id: a5
    intent: |
      Admin and user instruction CRUD endpoints are wired end-to-end. An
      admin can set org-level instructions via PUT /api/org/instructions.
      A member can set their own user-level instructions via PUT
      /api/me/instructions. A member CANNOT set org instructions (403).
      In an agent run for a member, the system prompt's resolved
      Instructions section contains BOTH the org-level chunks and the
      user-level chunks in correct precedence order (org first, user
      last).
    checked: false
    files:
      - path: packages/core/src/server/routes/instructions.ts
        isNew: true
        change: |
          New Hono router. createInstructionRoutes({ configStore, logger,
          auditLogger }).
          Routes (mounted at the app level, see server/index.ts edit):
            GET  /api/org/instructions — admin-only via requireAdmin().
