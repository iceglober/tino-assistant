          Instructions section. Uses the in-memory ConfigStore +
          identity stores like other wave integration tests.
    tests:
      - 'packages/core/tests/server/instructions-routes.test.ts::"admin can set org instructions"'
      - 'packages/core/tests/server/instructions-routes.test.ts::"member can set their own instructions"'
      - 'packages/core/tests/server/instructions-routes.test.ts::"member cannot set org instructions"'
      - 'packages/core/tests/integration/wave5-instruction-resolution.test.ts::"agent run for member includes org and user instructions in order"'
