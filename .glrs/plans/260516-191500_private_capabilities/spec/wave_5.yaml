items:
  - id: "a1"
    intent: "Pure-function instruction resolver implementing precedence: permissions via most-restrictive-wins, behavioral text via later-overrides-earlier ordered by level (base → org → cap-type → cap-instance → user). Records conflicts when two same-level instructions disagree."
    checked: false
    files:
      - path: packages/core/src/instructions/types.ts
        isNew: true
        change: "Define InstructionLevel union, Instruction interface (level, source, optional text, optional permissions {write,delete,crossContextShare}), and ResolvedInstructions interface (permissions, behaviorChunks, conflicts)."
      - path: packages/core/src/instructions/resolver.ts
        isNew: true
        change: "Export resolveInstructions(instructions: Instruction[]): ResolvedInstructions. Default permissions ALLOW; flip to DENY on any false. Order behavior chunks by level. Record cap-instance permission disagreements as conflicts."
    tests:
      - "packages/core/tests/instructions/resolver.test.ts"
    verify: "bun run test tests/instructions/resolver.test.ts"
    mirror: "packages/core/src/agent/output-validator.ts"
    context: |
      // packages/core/src/agent/output-validator.ts is a pure-function module with
      // a typed input → typed output shape, returned as a tagged record. The
      // resolver should follow the same idiom: no I/O, no side effects, just a
      // function over inputs that returns a structured result the caller decides
      // how to render. See validateAgentOutput(...) for the existing shape:
      //   export function validateAgentOutput(
      //     text: string,
      //     opts: { userId: string; activeCapabilities: string[] },
      //   ): { safe: true } | { safe: false; reason: string } { ... }
    conventions: "ESM imports with .js extension on relative paths; named exports only (no default exports); types defined in a sibling types.ts and re-imported; tests in packages/core/tests/<area>/ using vitest (describe/it/expect from 'vitest'); pure modules under packages/core/src/ have no side effects at import time."

  - id: "a2"
    intent: "Extend buildSystemPrompt to accept a ResolvedInstructions arg and render two new sections: 'Instructions' listing behaviorChunks in order with their source prefix, and 'Permissions' summarizing the resolved write/delete/crossContextShare flags."
    checked: false
    files:
      - path: packages/core/src/agent/systemPrompt.ts
        isNew: false
        change: "Add optional `instructions?: ResolvedInstructions` to the opts arg of buildSystemPrompt. When present, append two sections to the prompt: an 'Instructions:' section iterating behaviorChunks ({source, text}), and a 'Permissions:' section listing each flag with an explanatory clause (e.g., 'write: false — this agent must not modify external systems')."
      - path: packages/core/tests/agent/system-prompt.test.ts
        isNew: false
        change: "Add cases asserting the Instructions and Permissions sections render when instructions are provided, and are absent (back-compat) when not."
    tests:
      - "packages/core/tests/agent/system-prompt.test.ts"
    verify: "bun run test tests/agent/system-prompt.test.ts"
    mirror: "packages/core/src/agent/systemPrompt.ts"
    context: |
      // packages/core/src/agent/systemPrompt.ts — current signature and assembly idiom:
      export function buildSystemPrompt(opts: { activeCapabilities: string[]; toolNames: string[] }): string {
        const { activeCapabilities, toolNames } = opts;
        const active = new Set(activeCapabilities);
        const tools = new Set(toolNames);
        // ...
        let prompt = `You are tino, a personal assistant ...`;
        if (hasAnyCapabilityBullets) {
          prompt += `\n\nYou have these tools available:\n`;
          if (active.has("github")) { prompt += `\n- github_search_code(...) ...`; }
          // more sections appended conditionally with `prompt += ...`
        }
        return prompt;
      }
      // Wave 5 extends opts with `instructions?: ResolvedInstructions` and appends
      // two more `prompt += ...` sections near the end, keeping the existing
      // assembly idiom.
    conventions: "Sections are appended with `prompt += `\\n\\n...`` template literals; conditional gates use Set membership; the function returns a fresh string each call (date/time is interpolated live); tests assert with toContain / not.toContain on substrings rather than full-string matches."

  - id: "a3"
    intent: "Per-instance isolation: a tool result from capability instance B is filtered (replaced with `{ filtered: true, reason: 'isolated by canShareWith' }`) when the active context is instance A and B.canShareWith does not include A. When canShareWith does include A, the result flows through unchanged. Capabilities without canShareWith are unaffected."
    checked: false
    files:
      - path: packages/core/src/instructions/per-instance-isolation.ts
        isNew: true
        change: "Export a function that wraps the tool-call loop (or a tool-result post-processor) and applies the canShareWith allow-list. Only capabilities whose config declares canShareWith are filtered; others pass through."
      - path: packages/core/src/capabilities/types.ts
        isNew: false
        change: "Extend CapabilityConfig with optional `instructions?: { text?: string; permissions?: Partial<{ write: boolean; delete: boolean; crossContextShare: boolean }>; canShareWith?: string[] }`."
      - path: packages/core/src/agent/run.ts
        isNew: false
        change: "Wrap the runAgent tool-call loop so that, when multiple cap-instances are active, results are passed through the isolation filter before being appended to history."
    tests:
      - "packages/core/tests/instructions/isolation.test.ts"
    verify: "bun run test tests/instructions/isolation.test.ts"
    mirror: "packages/core/src/agent/output-validator.ts"
    context: |
      // packages/core/src/capabilities/types.ts — current CapabilityConfig:
      export interface CapabilityConfig {
        enabled: boolean;
        credentials: Record<string, string>; // tokens, API keys
        settings: Record<string, unknown>;   // allowlists, defaults, tool-specific config
        findWork?: {
          enabled: boolean;
          intervalMinutes: number;
          lastScanAt?: number; // epoch ms
        };
      }
      // Wave 5 adds: instructions?: { text?: string; permissions?: ...; canShareWith?: string[] }

      // packages/core/src/agent/run.ts — current tool result handling (history append):
      //   await history.append(userId, result.response.messages);
      // The isolation wrap should intercept tool-result messages before this line.
    conventions: "Capability config is a JSON blob stored under the `capability.<id>` key in the config table; new fields must be optional to preserve back-compat; isolation must be opt-in (no canShareWith → no filtering); tests use vitest and may stub tools by constructing minimal ToolSet objects with mock execute()."

  - id: "a4"
    intent: "Centralize partition/row key construction in a single keys module so a future managed-multi-tenant offering can prepend a TENANT#<id># prefix by editing one constant. Wave 5 ships with tenantPrefix() returning empty string."
    checked: false
    files:
      - path: packages/core/src/persistence/keys.ts
        isNew: true
        change: "Export tenantPrefix(): string returning ''. Export key-builders: userKey(tinoUserId), userHistoryKey(tinoUserId), and one helper per partition-key shape currently constructed inline in the persistence layer. Each helper composes from tenantPrefix() so the future prefix change is one-line."
      - path: packages/core/src/persistence/sqlite.ts
        isNew: false
        change: "Replace inline user_id usage with calls to the new key helpers where appropriate."
      - path: packages/core/src/persistence/config.ts
        isNew: false
        change: "Route key construction through helpers from persistence/keys.ts so the `user.<id>...` literals become userKey(...)-derived strings."
      - path: packages/core/src/persistence/preferences.ts
        isNew: false
        change: "Same routing — any inline key string-template becomes a call into the keys module."
      - path: packages/core/src/persistence/tasks.ts
        isNew: false
        change: "Same routing."
    tests:
      - "packages/core/tests/persistence/keys.test.ts"
    verify: "bun run test tests/persistence/keys.test.ts"
    mirror: "packages/core/src/persistence/config.ts"
    context: |
      // packages/core/src/persistence/sqlite.ts — current direct user_id usage:
      //   const stmtGet = db.query("SELECT messages_json FROM conversations WHERE user_id = ?");
      //   stmtGet.get(userId) // userId currently used as-is (no prefix)
      //
      // packages/core/src/server/routes/users.ts shows the dotted-key convention
      // currently in use across config storage:
      //   await config.set(`user.${targetUserId}.status`, "deactivated");
      //   const personalCapKeys = entries
      //     .filter((e) => e.key.startsWith(`user.${targetUserId}.capability.`));
      //
      // Wave 5 — every `user.${id}...` literal should be replaced with a call
      // such as `userKey(id)` or `userCapabilityKey(id, capId)` from persistence/keys.ts.
    conventions: "Helpers are pure functions over the tenantPrefix() constant — the JIT inlines them, zero runtime cost; helpers live in packages/core/src/persistence/keys.ts and are imported by every persistence module; key shapes use dotted segments (e.g. `user.<id>.status`) matching the existing config-table convention; tests round-trip helpers through the sqlite store to confirm reads/writes still resolve."

  - id: "a5"
    intent: "End-to-end instruction APIs: admin-only GET/PUT for org instructions; per-user GET/PUT for user instructions; member runs include both org and user instruction text in the system prompt with user-level appended last."
    checked: false
    files:
      - path: packages/core/src/server/routes/instructions.ts
        isNew: true
        change: "Hono router with: GET /api/org/instructions (admin-only) returning Instruction[] (level: 'org'); PUT /api/org/instructions (admin-only) writing them; GET /api/me/instructions returning the requester's user-level instructions; PUT /api/me/instructions writing them. Persists via ConfigStore under stable keys."
      - path: packages/core/src/server/index.ts
        isNew: false
        change: "Mount the new instructions router under /api/org/instructions and /api/me/instructions; ensure admin-only paths go through the admin middleware."
      - path: packages/core/src/agent/run.ts
        isNew: false
        change: "Before buildSystemPrompt, call a resolveInstructionsForUser({tinoUserId, activeCapabilities, configStore, ...}) helper that returns ResolvedInstructions and pass it into buildSystemPrompt."
    tests:
      - "packages/core/tests/server/instructions-routes.test.ts"
      - "packages/core/tests/integration/wave5-instruction-resolution.test.ts"
    verify: "bun run test tests/server/instructions-routes.test.ts tests/integration/wave5-instruction-resolution.test.ts"
    mirror: "packages/core/src/server/routes/users.ts"
    context: |
      // packages/core/src/server/routes/users.ts — ConfigStore-backed CRUD with audit:
      export function createUsersRoutes(opts: {
        config: ConfigStore;
        logger: AppLogger;
        auditLogger: AuditLogger | undefined;
      }): Hono {
        const app = new Hono();
        const { config, logger, auditLogger } = opts;
        app.delete("/:userId", async (c) => {
          const targetUserId = decodeURIComponent(c.req.param("userId"));
          // ... validate, mutate via config.set/delete, audit-log, return JSON
        });
        return app;
      }
      // Admin-gating today uses the global middleware mounted in
      // packages/core/src/server/index.ts; new admin-only sub-routes follow the
      // same factory shape (createXxxRoutes returning Hono) and rely on the
      // mount point for auth.
    conventions: "Routes are factory functions returning a Hono instance; dependencies (config, logger, auditLogger) are injected via opts; mutations are audit-logged with a stable `action` string; server/index.ts mounts each router under its /api/<area> base path; tests in packages/core/tests/server/ use the _helpers.ts harness which spins a Hono app with a stub ConfigStore."

  - id: "a6"
    intent: "All existing tests continue to pass — wave 5 changes are purely additive at the API surface and the keys-module refactor is mechanical."
    checked: false
    files: []
    tests:
      - "*"
    verify: "bun run test"
    mirror: "packages/core/tests"
    context: |
      // Full suite runs via `bun run test` (which invokes vitest under bun).
      // The keys-module refactor (a4) touches every persistence module — the
      // round-trip is identical because tenantPrefix() returns "" so all derived
      // strings match the pre-wave literals byte-for-byte. The systemPrompt
      // change (a2) adds an optional opts field — existing call sites passing
      // only {activeCapabilities, toolNames} continue to work unchanged.
    conventions: "Run via `bun run test` from repo root or `packages/core`; vitest config picks up packages/*/tests/**/*.test.ts; tests must not depend on network or live secrets — use stubs from packages/core/tests/server/_helpers.ts and capabilities/_helpers.ts."
