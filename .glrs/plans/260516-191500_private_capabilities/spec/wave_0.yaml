  - id: "a5"
    intent: |
      provisionFromSlack merges identities — when the slack user's email
      matches an existing google-linked tino user, the slack identity is
      linked to that user instead of creating a duplicate. This is the
      bidirectional-bootstrap correctness property.
    checked: true
    files:
      - path: packages/core/src/identity/resolver.ts
        isNew: true
        change: |
          In provisionFromSlack, before creating a new user, call
          identities.resolve('google', email.toLowerCase()) — if it returns
          a tinoUserId, link the slack identity to that existing user
          (and update users.update() to set slackUserId on the existing
          record), then return the existing user. Do NOT create a duplicate.
    tests:
      - packages/core/tests/identity/resolver.test.ts::"provisionFromSlack merges into existing google-linked user when emails match"
    verify: bun run test tests/identity/resolver.test.ts
    mirror: packages/core/src/identity/resolver.ts
    context: |
      // Merge invariant — derived from main.md open-question #1:
      //
      //   1. Bot owner exists with slack identity only.
      //   2. They sign into the console with Google → console auth
      //      middleware sees no google identity, creates a new user
      //      (BAD: now two users for the same human).
      //
      // The fix: at every "provision" boundary, first check whether the
      // email is already linked to a tino user via the OTHER provider. If
      // so, link the new identity to the existing user (the merge case).
      //
      // Wave 0 ships only the slack→google merge direction (called by the
      // migration when the bot owner's slack already exists and we're
      // adding a speculative google identity). The google→slack merge
      // direction (called by the console middleware) is wired in wave 1
      // / wave 3 — but the resolver function signature must already
      // support it.
    conventions: |
      - When the merge case fires, log
        `logger.info({ tinoUserId, mergedProvider: 'slack' }, "merged identity into existing user")`.

  - id: "a6"
    intent: |
      The one-shot migration creates a tino user from ALLOWED_SLACK_USER_ID
      (admin role), links slack and google identities, and copies existing
      slack-id-keyed history, preferences, and tasks under the new
      tino-UUID partition. Old records remain in place. Second invocation
      is a no-op.
    checked: true
    files:
      - path: packages/core/src/identity/migration.ts
        isNew: true
        change: |
          Export migrateToUserModel({ configStore, users, identities,
          history, preferences, tasks, slackClient, allowedSlackUserId,
          logger }). Steps per plan:
            1. Check configStore.get('migration.user-model-v1.completedAt');
               if set, return early (idempotency short-circuit).
            2. slackClient.users.info({ user: allowedSlackUserId }) →
               profile.email. On failure: log and return (retry next start).
            3. users.create({ id: crypto.randomUUID(), email,
               role: 'admin', status: 'active',
               slackUserId: allowedSlackUserId, createdAt, updatedAt }).
            4. identities.link({ provider: 'slack',
               externalId: allowedSlackUserId, tinoUserId, linkedAt });
               identities.link({ provider: 'google',
               externalId: email.toLowerCase(), tinoUserId, linkedAt }).
            5. Copy: existing history.get(allowedSlackUserId) →
               history.append(tinoUserId, msgs); preferences.list →
               for each {key,value} preferences.set(tinoUserId, key, value);
               tasks: listByUser(allowedSlackUserId) → for each,
               update userId field in place (write a backup config key
               'migration.tasks-backup.<taskId>' first).
            6. configStore.set('migration.user-model-v1.completedAt',
               Date.now()).
      - path: packages/core/src/persistence/factory.ts
        isNew: false
        change: |
          Add `users: UserStore` and `identities: IdentityStore` to
          Persistence. Construct them in the sqlite branch via the new
          createSqliteUserStore({ dbPath }) and
          createSqliteIdentityStore({ dbPath }). In the dynamodb branch,
          the factory in @tino/aws constructs them.
      - path: packages/core/src/index.ts
        isNew: false
        change: |
          After the existing `await migrateEnvToCapabilities(...)` call
          (line 31), invoke `await migrateToUserModel({ ... })` with the
          deps from `persistence` plus a fresh SlackWebClient. Wire
          users/identities into the destructured persistence.
      - path: packages/aws/src/persistence/dynamo/entities.ts
        isNew: false
        change: |
          Add createUserEntity(table) and createIdentityEntity(table)
          following the existing pattern.
      - path: packages/core/src/server/middleware/auth.ts
        isNew: false
        change: |
          Extend the betterAuth() config block (around line 52) with
          `user: { additionalFields: { role, status, slackUserId } }`.
          Defaults: role 'member', status 'active', slackUserId optional.
          Schema migration auto-runs via the existing getMigrations() call.
    tests:
      - packages/core/tests/identity/migration.test.ts::"migrateToUserModel creates admin user and links identities"
      - packages/core/tests/identity/migration.test.ts::"migrateToUserModel copies history under tino-UUID key"
      - packages/core/tests/identity/migration.test.ts::"migrateToUserModel copies preferences under tino-UUID key"
      - packages/core/tests/identity/migration.test.ts::"migrateToUserModel rewrites task.userId in place"
      - packages/core/tests/identity/migration.test.ts::"migrateToUserModel leaves legacy records intact"
      - packages/core/tests/identity/migration.test.ts::"migrateToUserModel is idempotent on second run"
    verify: bun run test tests/identity/migration.test.ts
    mirror: packages/core/src/capabilities/migration.ts
    context: |
      // packages/core/src/capabilities/migration.ts — the canonical
      // "one-shot, idempotent, runs at startup" pattern. Key shape:
      //
      //   export async function migrateEnvToCapabilities(
      //     env: LegacyEnv,
      //     configStore: ConfigStore,
      //     logger: AppLogger,
      //   ): Promise<MigrationResult> {
      //     const result: MigrationResult = { migrated: [], skipped: [], alreadyPresent: [] };
