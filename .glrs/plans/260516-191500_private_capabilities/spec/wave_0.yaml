  - id: "a4"
    intent: |
      provisionFromSlack in org-domain mode auto-creates a tino user when
      the slack email's domain matches the configured org domain, and
      rejects when it does not.
    checked: true
    files:
      - path: packages/core/src/identity/resolver.ts
        isNew: true
        change: |
          provisionFromSlack(slackUserId, { mode: 'allowlist'|'org-domain',
          orgDomain }):
            1. existing = identities.resolve('slack', slackUserId) →
               if user exists, fetch and return.
            2. if mode === 'allowlist', throw 'unknown_user'.
            3. fetch slack users.info → email.
            4. if email's domain matches orgDomain → check google identity
