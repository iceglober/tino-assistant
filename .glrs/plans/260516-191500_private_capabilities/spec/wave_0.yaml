# Wave 0: user + identity foundation
# Generated from wave_0.md. Enrichment fields point at real codebase
# patterns the executor should follow.
#
# Project conventions (apply to every item):
#   - ESM, "type": "module". TS source under packages/<pkg>/src, tests under
#     packages/<pkg>/tests.
#   - Imports use the `.js` extension on relative paths even from .ts files
#     (NodeNext module resolution).
#   - Package-internal imports use explicit subpath exports defined in each
#     package.json (e.g. `@tino/core/persistence/preferences`).
#   - Named exports throughout. No default exports.
#   - Test framework is **vitest** (NOT bun:test). `import { describe, it,
#     expect, vi } from "vitest"`. The plan's `bun run test` invokes vitest
#     under the hood via the workspace `test` script.
#   - SQLite stores use `bun:sqlite`'s synchronous Database, but wrap each
#     method in `Promise.resolve(...)` to satisfy the async store interfaces.
#   - DynamoDB stores use `dynamodb-toolbox` v2 (`Entity`, `item`, `string`,
#     `number`, `GetItemCommand`, `PutItemCommand`, etc.).
#   - Logger is a structured AppLogger from `@tino/core/slack/app` —
#     `logger.info({ ...fields }, "message")`.
#   - Errors thrown from store methods are plain `Error` with descriptive
#     messages; callers translate to HTTP / user-visible errors.

items:
  - id: "a1"
    intent: "A new tino user table exists (sqlite + dynamo) and stores the canonical per-user record with role, status, slackUserId, and timestamps. The store interface round-trips users by id and email."
    checked: true
    files:
      - path: packages/core/src/identity/types.ts
        isNew: true
        change: |
          Export TinoUser, Identity, IdentityProvider, SYSTEM_USER_ID,
          ResolvedUserId. Types-only module mirroring capabilities/types.ts
          shape.
      - path: packages/core/src/identity/store.ts
        isNew: true
        change: |
          Define UserStore + IdentityStore interfaces and the sqlite factory
          createSqliteUserStore + createSqliteIdentityStore. Tables:
          tino_user(id PK, email, name, role, status, slack_user_id,
          created_at, updated_at) with index on email; identity(provider,
          external_id, tino_user_id, linked_at, PK (provider, external_id)).
      - path: packages/aws/src/persistence/dynamo/users.ts
        isNew: true
        change: |
          createDynamoUserStore(table) — pk='ORG#USER#<id>', sk same.
          GetItem/PutItem/Query patterns mirror dynamo/preferences.ts.
      - path: packages/aws/src/persistence/dynamo/identities.ts
        isNew: true
        change: |
          createDynamoIdentityStore(table) — pk='IDENTITY#<provider>#<externalId>',
          sk same. resolve() = GetItem; link() = PutItem with
          ConditionExpression on pk attribute_not_exists; listForUser() =
          Query on a gsi or in-memory filter (use Query on email-keyed gsi
          if needed; otherwise full Scan is acceptable for wave 0 since
          identities-per-user is bounded at ~3).
    tests:
      - packages/core/tests/identity/store.test.ts::"UserStore round-trips a created user by id"
      - packages/core/tests/identity/store.test.ts::"UserStore.getByEmail is case-insensitive"
      - packages/core/tests/identity/store.test.ts::"UserStore.update patches mutable fields"
    verify: bun run test tests/identity/store.test.ts
    mirror: packages/core/src/persistence/preferences.ts
    context: |
      // packages/core/src/persistence/preferences.ts (lines 1-65) — the
      // pattern UserStore + IdentityStore should follow for sqlite.
      import { Database } from "bun:sqlite";

      export interface PreferencesStore {
        get(userId: string, key: string): Promise<string | null>;
        set(userId: string, key: string, value: string): Promise<void>;
        list(userId: string): Promise<Array<{ key: string; value: string }>>;
        delete(userId: string, key: string): Promise<void>;
      }

      export function createPreferencesStore({ dbPath }: { dbPath: string }): PreferencesStore {
        const db = new Database(dbPath);
        db.exec(`CREATE TABLE IF NOT EXISTS preferences (
          user_id    TEXT NOT NULL,
          key        TEXT NOT NULL,
          value      TEXT NOT NULL,
          updated_at INTEGER NOT NULL,
          PRIMARY KEY (user_id, key)
        )`);
        const stmtGet = db.query("SELECT value FROM preferences WHERE user_id = ? AND key = ?");
        const stmtUpsert = db.query(`INSERT INTO preferences ... ON CONFLICT(user_id, key) DO UPDATE SET ...`);
        // returns { get, set, list, delete } — each method wraps the
        // synchronous bun:sqlite call in Promise.resolve(...).
      }
    conventions: |
      - ESM, NodeNext module resolution: relative imports must end in `.js`.
      - Synchronous bun:sqlite calls; methods return Promise<...> via
        `Promise.resolve(...)`.
      - Use `db.exec(`CREATE TABLE IF NOT EXISTS ...`)` for schema (no
        migrations).
      - Prepared statements via `db.query(...)`; row casts via
        `as { ... } | null`.
      - For getByEmail case-insensitivity: store email lowercased OR query
        with `LOWER(email) = LOWER(?)`. Either is fine — tests assert
        round-trip, not stored form.

  - id: "a2"
    intent: |
      A new identity table maps (provider, externalId) → tinoUserId. Linking
      the same external identity twice is rejected. Listing identities for a
      user returns all linked providers.
    checked: true
    files:
      - path: packages/core/src/identity/store.ts
        isNew: true
        change: |
          IdentityStore.link() must throw when (provider, externalId) is
          already present. Use INSERT OR FAIL or check + throw.
          IdentityStore.listForUser(tinoUserId) returns all rows where
          tino_user_id = ?, ordered by linked_at.
      - path: packages/aws/src/persistence/dynamo/identities.ts
        isNew: true
        change: |
          link() uses PutItem with ConditionExpression
          'attribute_not_exists(pk)'; on ConditionalCheckFailed throws
          a descriptive Error('identity_already_linked').
    tests:
      - packages/core/tests/identity/store.test.ts::"IdentityStore.resolve returns null when no link"
      - packages/core/tests/identity/store.test.ts::"IdentityStore.link rejects duplicate (provider, externalId)"
      - packages/core/tests/identity/store.test.ts::"IdentityStore.listForUser returns all linked identities"
    verify: bun run test tests/identity/store.test.ts
    mirror: packages/aws/src/persistence/dynamo/preferences.ts
    context: |
      // packages/aws/src/persistence/dynamo/preferences.ts — pattern for
      // identities.ts. Note: link() needs ConditionExpression to enforce
      // uniqueness; preferences.ts uses unconditional PutItem.
      import type { PreferencesStore } from "@tino/core/persistence/preferences";
      import { DeleteItemCommand, GetItemCommand, PutItemCommand, QueryCommand } from "dynamodb-toolbox";
      import type { TinoTable } from "./client.js";
      import { createPreferenceEntity } from "./entities.js";

      export function createDynamoPreferencesStore(table: TinoTable): PreferencesStore {
        const entity = createPreferenceEntity(table);
        return {
          async get(userId, key) {
            const { Item } = await entity.build(GetItemCommand)
              .key({ pk: `PREF#${userId}`, sk: `PREF#${key}` })
              .send();
            return Item?.value ?? null;
          },
          async set(userId, key, value) {
            await entity.build(PutItemCommand)
              .item({ pk: `PREF#${userId}`, sk: `PREF#${key}`, value, updatedAt: Date.now() })
              .send();
          },
          // list() uses QueryCommand on the partition...
        };
      }
    conventions: |
      - For dynamo conditional puts: `entity.build(PutItemCommand).item(...)
        .options({ condition: { attr: "pk", exists: false } }).send()` —
        toolbox v2 conditions API. Catch `ConditionalCheckFailedException`
        (name on the SDK error) and rethrow as a domain error.
      - listForUser on dynamo: simplest is a Scan with FilterExpression on
        tinoUserId; acceptable for wave 0 because each user has ≤3
        identities and this is debug-only.

