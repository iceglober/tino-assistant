  - id: "a2"
    intent: "A new identity table maps (provider, externalId) → tinoUserId. Linking the same external identity twice is rejected. Listing identities for a user returns all linked providers."
    checked: false
    files:
      - path: packages/core/src/identity/store.ts
        isNew: true
        change: "IdentityStore.link must throw on duplicate (provider, externalId) — sqlite UNIQUE constraint on PRIMARY KEY (provider, external_id) provides this; surface as Error."
      - path: packages/aws/src/persistence/dynamo/identities.ts
        isNew: true
        change: "link() must use ConditionExpression `attribute_not_exists(pk)` to fail on duplicate."
    tests:
      - 'packages/core/tests/identity/store.test.ts::"IdentityStore.resolve returns null when no link"'
      - 'packages/core/tests/identity/store.test.ts::"IdentityStore.link rejects duplicate (provider, externalId)"'
      - 'packages/core/tests/identity/store.test.ts::"IdentityStore.listForUser returns all linked identities"'
    verify: "bun run --filter @tino/core test tests/identity/store.test.ts"
    mirror: "packages/aws/src/persistence/dynamo/preferences.ts"
    context: |
      // packages/aws/src/persistence/dynamo/preferences.ts — dynamo store pattern
      // (mirror this for users.ts / identities.ts)
      export function createDynamoPreferencesStore(table: TinoTable): PreferencesStore {
        const entity = createPreferenceEntity(table);
        return {
          async get(userId: string, key: string): Promise<string | null> {
            const { Item } = await entity.build(GetItemCommand)
              .key({ pk: `PREF#${userId}`, sk: `PREF#${key}` })
              .send();
            return Item?.value ?? null;
          },
          async set(userId, key, value) {
            await entity.build(PutItemCommand)
              .item({ pk: `PREF#${userId}`, sk: `PREF#${key}`, value, updatedAt: Date.now() })
              .send();
          },
          // ... list uses table.build(QueryCommand).entities(entity).query({ partition, range: { beginsWith } })
        };
      }
      //
      // packages/aws/src/persistence/dynamo/entities.ts — entity factory pattern
      export function createPreferenceEntity(table: TinoTable) {
        return new Entity({
          name: "Preference",
          table,
          schema: item({
            pk: string().key(),
            sk: string().key(),
            value: string(),
            updatedAt: number(),
          }),
          timestamps: false,
        });
      }
    conventions: |
      - Dynamo PutItemCommand for create-with-uniqueness uses
        `.options({ condition: { attr: 'pk', exists: false } })` in toolbox v2.
      - Sqlite duplicate-key surfaces as a SQLITE_CONSTRAINT exception from
        bun:sqlite — wrap and rethrow as a typed `IdentityLinkConflictError`
        (or plain Error with stable message) so tests can assert on it.

