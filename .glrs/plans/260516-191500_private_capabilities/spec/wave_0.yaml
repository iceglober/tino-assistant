    mirror: "packages/core/src/persistence/preferences.ts"
    context: |
      // packages/core/src/persistence/preferences.ts — sqlite-store factory pattern
      // (mirror this shape for createSqliteUserStore/createSqliteIdentityStore)
      export interface PreferencesStore {
        get(userId: string, key: string): Promise<string | null>;
        set(userId: string, key: string, value: string): Promise<void>;
        list(userId: string): Promise<Array<{ key: string; value: string }>>;
        delete(userId: string, key: string): Promise<void>;
      }
      export function createPreferencesStore({ dbPath }: { dbPath: string }): PreferencesStore {
        const db = new Database(dbPath);
        db.exec(`
          CREATE TABLE IF NOT EXISTS preferences (
            user_id    TEXT    NOT NULL,
            key        TEXT    NOT NULL,
            value      TEXT    NOT NULL,
            updated_at INTEGER NOT NULL,
            PRIMARY KEY (user_id, key)
          )
        `);
        const stmtGet = db.query("SELECT value FROM preferences WHERE user_id = ? AND key = ?");
        // ...prepared statements + return object with async-wrapping methods
      }
      //
      // packages/core/src/persistence/factory.ts — current Persistence interface
      export interface Persistence {
        history: HistoryStore;
        tasks: TaskStore;
        preferences: PreferencesStore;
        config: ConfigStore;
        auditLogger: AuditLogger;
        // ADD: users: UserStore;
        // ADD: identities: IdentityStore;
      }
    conventions: |
      - ESM with .js extensions in relative imports (e.g. `from "./types.js"`).
      - Named exports only; no default exports.
      - Sqlite stores: bun:sqlite Database, prepared statements at construction,
        Promise.resolve()-wrapped sync calls so the interface is async.
      - Dynamo entities: dynamodb-toolbox v2, schema via item({...}), timestamps: false.
      - Test framework is **vitest** (`import { describe, expect, it, vi } from "vitest"`).
