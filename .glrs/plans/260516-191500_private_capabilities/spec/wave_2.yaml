    files:
      - path: packages/core/src/agent/history-appender.ts
        isNew: true
        change: |
          Define ToolResultPlaceholder, Decision, PrivacyFilter, ToolResultAppender
          types. Export defaultPrivacyFilter ({ evaluate: () => ({ persist: true }) }).
          Export createHistoryAppender({ history, privacyFilter, logger }) that
          returns a ToolResultAppender. appendToolResult({ userId, capabilityId,
          toolName, toolArgs, toolResult }):
            const decision = privacyFilter.evaluate({ capabilityId, toolName, toolArgs, toolResult });
            const body = decision.persist ? toolResult : decision.placeholder;
            await history.append(userId, [{ role: 'tool', content: [{ type: 'tool-result', toolName, result: body }] }]);
          (Verify the exact ModelMessage tool-result shape vs the AI SDK's
          types — current run.ts appends `result.response.messages` directly
          which already has the tool-result shape; the new helper constructs
          the same shape from the decomposed inputs.)
