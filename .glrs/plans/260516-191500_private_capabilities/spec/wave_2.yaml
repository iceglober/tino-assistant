      - packages/core/tests/server/user-capabilities-routes.test.ts
    verify: |
      cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/server/user-capabilities-routes.test.ts
    mirror: packages/core/src/server/routes/capabilities.ts
    context: |
      // packages/core/src/server/routes/capabilities.ts (existing — pattern to mirror)
      export function createCapabilityRoutes(opts: {
        config: ConfigStore; logger: AppLogger;
      }): Hono {
        const app = new Hono();
        app.get('/', async (c) => {
          const entries = await config.list();
          // ... build views from ALL_CAPABILITIES + stored blob ...
          return c.json(views);
        });
        app.put('/:id', async (c) => {
          const id = decodeURIComponent(c.req.param('id'));
          if (!id) return c.json({ error: 'Missing capability id' }, 400);
          const parsed: unknown = await c.req.json();
          const cap = findCapability(id);
          if (!cap) return c.json({ error: `Unknown capability: ${id}` }, 400);
          const next = buildConfigFromPayload(cap, parsed, existing);
          await config.set(`capability.${id}`, next);
          return c.json({ ok: true, id });
        });
        return app;
      }
      // user-capabilities.ts mirrors this — but every handler resolves
      // c.get('user').email → tino-UUID via identityResolver, and reads/
      // writes via userCapStore.{get,set,delete,list} (encrypted) instead
      // of configStore (plaintext keyed on capability.<id>).
    conventions: |
      Hono routers: `const app = new Hono(); app.get('/', ...)` and return app.
      Use `c.json(body, statusCode?)` with explicit number status codes.
      Auth middleware (buildAuthMiddleware) sets `c.set('user', { email, ... })`;
      retrieve via `c.get('user')`. 401 for unauth; 400 for bad JSON / unknown
      capability id; 404 for missing entries.
      Always JSON.stringify config values via the existing helpers.

  - id: a6
    intent: |
      A user's get path cannot accidentally decrypt another user's
      credentials — even if a coding bug were to point GetItem at the
      wrong partition, the encryption context would not match and the
      decryption would be rejected. Cryptographic enforcement of D4.
    checked: false
    files:
      - path: packages/core/tests/integration/wave2-cross-user-decrypt.test.ts
        isNew: true
