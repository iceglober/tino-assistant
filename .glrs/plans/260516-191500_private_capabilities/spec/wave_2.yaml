  - id: a3
    intent: |
      The bot owner's existing global private capability credentials are migrated
      to a per-user partition encrypted with their tino-UUID encryption context.
      Steps: resolve bot owner's tinoUserId, copy each PrivateCapability's global
      `capability.<id>` blob into UserCapabilityStore (encrypts on write), then
      clear the global blob to `{ enabled: false, credentials: {}, settings: {} }`.
      A 30-day-TTL backup of each original blob is written before clearing.
      Gated by a `migration.user-creds-v1.completedAt` config marker; idempotent.
      Failure during encrypt or write: do NOT clear, do NOT mark complete — retry
      on next startup.
    checked: true
    files:
      - path: packages/core/src/crypto/migration.ts
        isNew: true
        change: |
          migrateUserCapabilityCreds({ configStore, userCapStore, identityResolver,
          allowedSlackUserId, logger }). Steps:
          (1) check `migration.user-creds-v1.completedAt` — if set, return early;
          (2) resolve bot owner's tinoUserId via identityResolver.resolveGoogle(...)
              — wave 0 guarantees this succeeds for the bot owner;
          (3) for each cap of ALL_CAPABILITIES where cap.scope === 'private':
              read `capability.<id>` global blob; if absent or no credentials,
              skip; else write a backup at `migration.user-creds-v1.backup.<id>`
              (with TTL metadata for dynamo); userCapStore.set(tinoUserId, cap.id,
              blob) — encrypts on write; configStore.set(`capability.<id>`,
              { enabled: false, credentials: {}, settings: {} }) — clear;
          (4) write the marker.
          Per-capability try/catch: on encrypt/write failure, log loudly, do
          NOT clear that global blob, do NOT write the marker. Other capabilities
          continue.
      - path: packages/core/src/index.ts
        isNew: false
        change: |
          Call migrateUserCapabilityCreds at startup, AFTER createPersistence
          and the existing migrateEnvToCapabilities call but BEFORE
          initCapabilityRegistry. Pass the configStore, userCapStore,
          identityResolver, ALLOWED_SLACK_USER_ID, and logger.
      - path: packages/core/tests/integration/wave2-migration.test.ts
        isNew: true
        change: |
          End-to-end test:
          (1) seed `capability.gmail` with { enabled: true, credentials: {
              clientId, clientSecret, refreshToken }, settings: {} };
          (2) run migrateUserCapabilityCreds with a stub identity resolver;
          (3) assert userCapStore.get(botOwnerTinoUserId, 'gmail') returns
              the same plaintext credentials;
          (4) assert configStore.get('capability.gmail') is the empty husk;
          (5) assert configStore.get('migration.user-creds-v1.backup.gmail')
              contains the original blob;
          (6) assert buildPrivateTools(botOwnerTinoUserId) returns a non-empty
              ToolSet (gmail tools materialized from the per-user partition);
          (7) assert getActiveCapabilities(botOwnerTinoUserId) includes 'gmail';
          (8) run migration a second time — assert it's a no-op (no extra
              writes, marker still set).
    tests:
      - packages/core/tests/integration/wave2-migration.test.ts
    verify: bun --bun ./node_modules/vitest/dist/cli.js run packages/core/tests/integration/wave2-migration.test.ts
    mirror: packages/core/src/capabilities/migration.ts
    context: |
      // packages/core/src/capabilities/migration.ts — env-to-config migration
      // (the closest existing peer, mirror its idempotency + log style):
      //
      //   export async function migrateEnvToCapabilities(
      //     env: LegacyEnv, configStore: ConfigStore, logger: AppLogger,
      //   ): Promise<MigrationResult> {
      //     // Check which capabilities already have config entries
      //     for (const id of capabilityIds) {
      //       const existing = await configStore.get(`capability.${id}`);
      //       if (existing !== null) result.alreadyPresent.push(id);
      //     }
      //     if (result.alreadyPresent.length === capabilityIds.length) {
      //       logger.debug("capability migration: all capabilities already configured, skipping");
      //       return result;
      //     }
      //     // Build configs from env vars for capabilities not yet present...
      //     for (const { id, config } of toMigrate) {
      //       await configStore.set(`capability.${id}`, config);
      //       logger.info({ capabilityId: id }, "capability migration: wrote config from env vars");
      //     }
      //   }
      //
      // Wave 2 differences vs this pattern:
      //   - Idempotency marker is a single key (`migration.user-creds-v1.completedAt`)
      //     rather than per-capability presence checks; we explicitly need the
      //     "completed" semantic because we ALSO clear the source on success.
      //   - CLEARS the source after copy (env-to-config migration leaves env
      //     vars in place; that's harmless. Leaving plaintext credentials in
      //     the global blob after the per-user copy is NOT harmless.)
      //   - Backups under `migration.user-creds-v1.backup.<id>` for rollback.
    conventions: |
      Idempotency via a config marker key; per-step logging with structured
      fields (`{ capabilityId, ... }`); per-capability try/catch with
      logger.warn — one capability's failure must not break the rest. Marker
      keys use `migration.<name>.<field>` namespace. SYSTEM_USER_ID and
      bootstrapAdminTinoUserId imported from wave 0's identity module.

