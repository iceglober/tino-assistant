  - id: a5
    intent: |
      The console exposes per-user capability management — list, configure
      (PUT encrypts on write), disconnect (DELETE), OAuth start, OAuth
      callback (encrypts and stores refresh token). Every route resolves
      c.get('user').email → tinoUserId via identityResolver. Unauthenticated
      or unresolvable users get 401. The console UI ships a "Your capabilities"
      page distinct from the org page; the org page hides private-scoped
      capabilities and links to the new page.
    checked: true
    files:
      - path: packages/core/src/server/routes/user-capabilities.ts
        isNew: true
        change: |
          createUserCapabilityRoutes({ userCapStore, identityResolver, oauthClients,
          logger }). Routes:
          - GET  /             → list user's connected private capabilities
          - PUT  /:capId       → set/update config (encrypts credentials)
          - DELETE /:capId     → disconnect
          - GET  /:capId/oauth/start    → start OAuth (gmail, calendar)
          - GET  /:capId/oauth/callback → finish OAuth, encrypt + store refresh_token
          Each handler reads c.get('user'), calls identityResolver.resolveGoogle(
          user.email). 401 if no user. 404 if resolveGoogle returns null. The PUT
          handler validates the body shape against the capability's fieldSchema
          before calling userCapStore.set.
      - path: packages/core/src/server/index.ts
        isNew: false
        change: |
          Mount the new router under /api/me/capabilities. Pass userCapStore +
          identityResolver from the persistence factory through the createApp
          options.
      - path: packages/core/src/console-app/pages/MyCapabilities.tsx
        isNew: true
        change: |
          New "Your capabilities" page. One CapabilityCard per PrivateCapability:
          gmail (Connect Gmail OAuth button → "Connected as <email>" + Disconnect),
          slack-personal (xoxp- token paste field with help link; on save, validate
