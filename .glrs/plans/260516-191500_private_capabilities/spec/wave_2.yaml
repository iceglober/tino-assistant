# spec/wave_2.yaml
# Wave 2: per-user private credentials + KMS envelope encryption.
#
# Path notes:
#   - Test root is `packages/core/tests/*` and `packages/aws/tests/*`
#     (NOT `tests/` at package root and NOT `src/__tests__`).
#   - Source `.ts` imports use `.js` extensions on relative paths
#     (ESM, NodeNext module resolution).
#   - The plan references `packages/core/src/console-app/router.tsx` —
#     no such file exists. Routes are added in `App.tsx`.
#   - The plan references `packages/core/src/console-app/pages/Capabilities.tsx`
#     — no such file exists either. The org/shared capabilities UI lives
#     inside `pages/Console.tsx` (capabilities grid).
items:
  - id: a1
    intent: |
      The CryptoAdapter encrypts and decrypts payloads, requiring an exact
      encryption-context match. Mismatched context fails decrypt
      cryptographically — at the KMS API for production (KMS rejects with
      InvalidCiphertextException), at the AES-GCM AAD for local
      (auth-tag verification fails).
    checked: true
    files:
      - path: packages/core/src/crypto/types.ts
        isNew: true
        change: |
          Define the canonical CryptoAdapter / EncryptionContext /
          EnvelopeCiphertext types here so `core` defines the contract
          without depending on `aws`. EncryptionContext schema is FIXED:
          { userId, capabilityId, fieldName }. Document that schema
          changes break all stored ciphertexts.
      - path: packages/aws/src/crypto/types.ts
        isNew: true
        change: |
          Re-export the canonical types from `@tino/core/crypto/types.js`
          for ergonomic imports inside `@tino/aws`. No new declarations.
      - path: packages/aws/src/crypto/kms-adapter.ts
        isNew: true
        change: |
          Production AWS KMS adapter. encrypt() does GenerateDataKey for
          AES_256, AES-256-GCM-encrypts plaintext with the data key + 12-byte
          IV + 16-byte authTag, AAD = JSON.stringify(ctxToRecord(ctx)),
          zeroes the plaintext data key (.fill(0)). decrypt() does
          KMS.Decrypt with the same EncryptionContext (KMS rejects
          on mismatch), then AES-256-GCM-decrypts. Uses @aws-sdk/client-kms.
          alg field is 'AES-256-GCM/v1'.
      - path: packages/core/src/crypto/local-adapter.ts
        isNew: true
        change: |
          Dev-only AES-GCM adapter using a static key derived via
          crypto.scryptSync(env.LOCAL_DEV_CRYPTO_KEY ?? 'dev-key', 'salt', 32).
          Mirrors the kms adapter structure but skips KMS round trips.
          Still binds the encryption context to the AAD so a mismatch
          fails the auth-tag check.
      - path: packages/core/src/crypto/factory.ts
        isNew: true
        change: |
          Export `createCryptoAdapter(env, logger): Promise<CryptoAdapter>`.
          Returns the KMS adapter when `env.KMS_KEY_ARN` is set, otherwise
          the local AES adapter. Mirror of `persistence/factory.ts` —
          dynamic-import the @tino/aws KMS adapter so it stays out of
          core's dep tree on local dev.
      - path: packages/core/src/env.ts
        isNew: false
        change: |
          Add `KMS_KEY_ARN: z.string().min(1).optional()` to EnvSchema.
          Add `LOCAL_DEV_CRYPTO_KEY: z.string().min(1).optional()` so the
          local adapter has a deterministic dev key path.
      - path: packages/aws/tests/crypto/kms-adapter.test.ts
        isNew: true
        change: |
          Unit tests using `aws-sdk-client-mock`. Cases:
            - encrypt then decrypt with same context recovers plaintext
            - decrypt with mismatched userId throws (KMS InvalidCiphertext mock)
            - decrypt with mismatched capabilityId throws
            - decrypt with mismatched fieldName throws
            - encrypt produces all required envelope fields
            - alg field is 'AES-256-GCM/v1'
      - path: packages/core/tests/crypto/local-adapter.test.ts
        isNew: true
        change: |
          Same shape as the KMS adapter test, against the local AES-GCM
          adapter. Mismatched context → AES-GCM auth-tag mismatch.
    tests:
      - packages/aws/tests/crypto/kms-adapter.test.ts
      - packages/core/tests/crypto/local-adapter.test.ts
    verify: |
      cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/crypto/ && cd ../aws && bun --bun ./node_modules/vitest/dist/cli.js run tests/crypto/
    mirror: packages/aws/src/encryption/envelope.ts
    context: |
      // packages/aws/src/encryption/envelope.ts (current — single-user, will be DELETED)
      export interface EncryptedValue {
        ciphertext: string;  // base64 AES-256-GCM ciphertext + 16-byte tag appended
        dataKey: string;     // base64 KMS-encrypted data key
        iv: string;          // base64 12-byte IV
      }
      export async function encryptValue(
        kmsClient: KMSClient, kmsKeyId: string, userId: string, plaintext: string,
      ): Promise<EncryptedValue> {
        const generateCmd = new GenerateDataKeyCommand({
          KeyId: kmsKeyId, KeySpec: 'AES_256',
          EncryptionContext: { userId },  // ← wave 2 expands to { userId, capabilityId, fieldName }
        });
        // ... AES-256-GCM with appended tag ...
      }
      // Wave 2 generalizes the encryption context to a 3-field schema and
      // splits ciphertext / authTag / iv / encryptedDataKey into named fields
      // so callers can't accidentally munge the auth tag with the body.
    conventions: |
      ESM imports with `.js` extensions on relative paths even for .ts source.
      Named exports only. JSDoc on every exported interface/function.
      Test framework: vitest (run via `bun --bun ./node_modules/vitest/dist/cli.js run`).
      Mocking: `aws-sdk-client-mock` for AWS SDK clients.
      Use `node:crypto` (`createCipheriv`, `createDecipheriv`, `randomBytes`,
      `scryptSync`) — same pattern as the existing envelope.ts.
      AAD is `Buffer.from(JSON.stringify(ctxToRecord(ctx)))` — defense in depth
      so even if KMS context were ever stripped, the GCM tag still binds it.
      Always `dataKey.fill(0)` after use (best-effort plaintext wipe).

  - id: a2
    intent: |
      UserCapabilityStore stores per-user capability configs with encrypted
      credentials. Get returns plaintext credentials. Different
      (userId, capabilityId) partitions are isolated. List returns enabled
      flags without decryption. Dynamo wiring uses pk=USER#<uid>, sk=CAP#<capId>
      so list() is a real single-partition Query.
    checked: false
    files:
      - path: packages/core/src/persistence/user-capabilities.ts
        isNew: true
        change: |
          Define UserCapabilityStore interface:
            get(tinoUserId, capabilityId): Promise<CapabilityConfig | null>
            set(tinoUserId, capabilityId, config): Promise<void>
            list(tinoUserId): Promise<Array<{ capabilityId; enabled }>>
            delete(tinoUserId, capabilityId): Promise<boolean>
          Reads decrypt all credentials before returning; writes encrypt
          all credentials before storing. Caller passes plaintext.
          Also export a sqlite implementation `createSqliteUserCapabilityStore`
          backed by a `user_capability` table with columns
          (tino_user_id, capability_id, enabled, credentials_json, settings_json).
          credentials_json holds a JSON object whose values are
          EnvelopeCiphertext records, one per credential field.
      - path: packages/aws/src/persistence/dynamo/user-capabilities.ts
        isNew: true
        change: |
          DynamoDB implementation `createDynamoUserCapabilityStore`.
          pk = `USER#<tinoUserId>`, sk = `CAP#<capabilityId>`.
          Encrypts each credential field with its own envelope on write
          (one GenerateDataKey per field — lets us add/remove fields
          without re-encrypting others). list() issues a single-partition
          Query with `partition: 'USER#<uid>'` and `range.beginsWith: 'CAP#'`.
          delete() short-circuits to false when GetItem returns nothing
          (skips the DeleteItemCommand entirely).
      - path: packages/aws/src/persistence/dynamo/entities.ts
        isNew: false
        change: |
          Add `createUserCapabilityEntity(table)`: pk + sk keys,
          tinoUserId, capabilityId, enabled (boolean), credentialsJson,
          settingsJson, updatedAt. timestamps: false (mirror of every
          other entity in this file).
      - path: packages/core/src/persistence/factory.ts
        isNew: false
        change: |
          Add `userCapabilities: UserCapabilityStore` to the Persistence
          interface. Wire through both adapters. The dynamo branch passes
          the cryptoAdapter into createDynamoUserCapabilityStore; the sqlite
          branch passes one too (for local-dev parity). The crypto adapter
          is constructed via createCryptoAdapter(env, logger) before the
          persistence layer (or threaded in by index.ts).
      - path: packages/core/tests/persistence/user-capabilities.test.ts
        isNew: true
        change: |
          Real `bun:sqlite` `:memory:` integration tests using a stub
          CryptoAdapter that does identity-with-context-binding (preserves
          the property check without needing AES). Cases:
            - set then get round-trips plaintext credentials
            - different users do not share capability state
            - list returns enabled flags only (does not decrypt)
            - delete returns true on existing, false on missing
            - get returns null when nothing stored
      - path: packages/aws/tests/persistence/dynamo-user-capabilities.test.ts
        isNew: true
        change: |
          DynamoDB-toolbox-mocked unit tests for createDynamoUserCapabilityStore.
          Asserts the pk=USER#<uid>, sk=CAP#<capId> wiring:
            - get/set/delete target the correct (pk, sk) pair
            - list issues a single-partition Query with
              partition: 'USER#<uid>' and range.beginsWith: 'CAP#'
              (regression guard against the rejected
              partition: 'USER#<uid>#CAP#' draft)
            - list rows expose only capabilityId + enabled, never credentials
            - delete short-circuits to false / skips DeleteItemCommand on missing
    tests:
      - packages/core/tests/persistence/user-capabilities.test.ts
      - packages/aws/tests/persistence/dynamo-user-capabilities.test.ts
    verify: |
      cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/persistence/user-capabilities.test.ts && cd ../aws && bun --bun ./node_modules/vitest/dist/cli.js run tests/persistence/dynamo-user-capabilities.test.ts
    mirror: packages/aws/src/persistence/dynamo/preferences.ts
    context: |
      // packages/aws/src/persistence/dynamo/preferences.ts (mirror — same pk/sk shape pattern)
      // Key pattern:  pk = `PREF#${userId}`,  sk = `PREF#${key}`
      // list() issues a single-partition Query:
      //   table.build(QueryCommand).entities(entity).query({
      //     partition: `PREF#${userId}`,
      //     range: { beginsWith: 'PREF#' },
      //   })
      // get/set/delete target an exact (pk, sk) pair.
      //
      // Wave 2 mirrors this exactly with USER#/CAP# prefixes:
      //   pk = `USER#${tinoUserId}`,  sk = `CAP#${capabilityId}`
      //   list:    partition: `USER#${uid}`, range: { beginsWith: 'CAP#' }
      //
      // Earlier draft tried `pk = USER#<uid>#CAP#<capId>` which puts every
      // row in its own partition — list() would return nothing. The reshape
      // is the cheapest fix and matches PREF#/PREF# precedent already here.
    conventions: |
      DynamoDB Toolbox v2 (`Entity`, `item`, `string`, `number`, `boolean`).
      Build commands via `entity.build(GetItemCommand|PutItemCommand|...)` —
      not the raw client. timestamps: false on every entity.
      Test framework: vitest. Mock dynamodb-toolbox via aws-sdk-client-mock
      against the underlying DynamoDBDocumentClient (see existing
      preferences/history dynamo tests in packages/aws/tests/persistence/).

  - id: a3
    intent: |
      The bot owner's existing global private-capability credentials are
      migrated to a per-user partition encrypted with their tino-UUID
      encryption context. The global blob is cleared after migration.
      A 30-day-TTL backup of each original blob is written before clearing
      (rollback path). The migration is idempotent.
    checked: false
    files:
      - path: packages/core/src/crypto/migration.ts
        isNew: true
        change: |
          Export `migrateUserCapabilityCreds(opts)`. Idempotent (uses
          a `migration.user-creds-v1.completedAt` config marker). Steps
          (only on first run):
            1. Resolve bot owner's tinoUserId from ALLOWED_SLACK_USER_ID
               via the identity resolver (wave 0 makes this always succeed).
            2. For each PrivateCapability in ALL_CAPABILITIES:
               - Read `capability.<id>` global blob.
               - If credentials present and capability enabled:
                 * Write backup to
                   `migration.user-creds-v1.backup.<capabilityId>`
                   (TTL is set on the table; verify in pulumi).
                 * userCapStore.set(botOwnerTinoUserId, capId, blob)
                   — encrypts on write.
                 * configStore.set(`capability.<id>`,
                   { enabled: false, credentials: {}, settings: {} })
                   — clear the global blob.
            3. Write the marker.
          Failure modes: KMS Encrypt fails → log loudly, do NOT clear,
          do NOT write the marker — fall back to the per-user-fallback path
          in registry.ts and retry next startup. Same on DynamoDB write fail.
      - path: packages/core/src/capabilities/registry.ts
        isNew: false
        change: |
          Add the migration-window fallback inside `buildPrivateTools(tinoUserId)`:
          if `userCapStore.get(tinoUserId, cap.id)` is null AND
          `tinoUserId === bootstrapAdminTinoUserId`, fall back to the
          global `capability.<id>` blob. Any other user with no per-user
          config gets null. `bootstrapAdminTinoUserId` is the tino-UUID
          resolved from ALLOWED_SLACK_USER_ID, cached at startup.
          Also pass the migration's userCapStore and bootstrapAdminTinoUserId
          through RegistryOptions.
      - path: packages/core/src/index.ts
        isNew: false
        change: |
          After persistence init and before server start, call
          `migrateUserCapabilityCreds({ configStore, userCapStore,
            identityResolver, logger })`. Resolve bootstrapAdminTinoUserId
          once at startup (identityResolver.resolveSlack(allowedUserId).tinoUserId).
          Pass userCapStore and bootstrapAdminTinoUserId to
          initCapabilityRegistry. Construct the cryptoAdapter via
          createCryptoAdapter(env, logger) and thread it into the
          persistence factory (so the dynamo+sqlite UserCapability stores
          can encrypt/decrypt).
      - path: packages/core/tests/integration/wave2-migration.test.ts
        isNew: true
        change: |
          End-to-end migration test (real bun:sqlite + LocalKmsAdapter).
          Cases:
            - migration moves gmail credentials to per-user partition
            - migration writes a backup of the original blob before clearing
            - migration encrypts credentials with userId encryption context
              (assert ciphertext field present and not equal to plaintext)
            - migration clears global private blob after copy
              ({ enabled: false, credentials: {}, settings: {} } husk)
            - second migration run is a no-op (marker check)
            - buildPrivateTools includes gmail after migration
            - getActiveCapabilities lists gmail for bot owner after migration
    tests:
      - packages/core/tests/integration/wave2-migration.test.ts
    verify: |
      cd packages/core && bun --bun ./node_modules/vitest/dist/cli.js run tests/integration/wave2-migration.test.ts
    mirror: packages/core/src/capabilities/migration.ts
    context: |
      // packages/core/src/capabilities/migration.ts (existing env→config-store migration)
      // Demonstrates the marker-check + idempotent shape this new migration must follow:
      //   const completed = await configStore.get('migration.<name>.completedAt');
      //   if (completed) { logger.info(...); return; }
      //   // ... do the work ...
      //   await configStore.set('migration.<name>.completedAt', String(Date.now()));
      //
      // Wave 2's marker key is 'migration.user-creds-v1.completedAt'.
      // Backup keys are 'migration.user-creds-v1.backup.<capabilityId>'.
      // The TTL field on the dynamo Config entity comes from the table-
      // level TTL attribute — confirm in pulumi tino-service.ts. SQLite
      // adapter ignores TTL; that's fine — local dev doesn't need backups.
    conventions: |
      Migrations live as module-level async functions, no class wrapper.
      Always idempotent; always marker-gated.
      Always log.info({ migration: '<name>', step: '...' }) at boundaries.
      Failures inside the loop are logged with logger.error and re-thrown
      ONLY when the failure leaves data inconsistent. Per-capability
      KMS failures abort the whole migration (do NOT clear blob, do NOT
      write marker) so the next startup retries.

