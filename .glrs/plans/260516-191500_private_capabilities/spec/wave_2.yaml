# spec/wave_2.yaml
# Wave 2: per-user private credentials + KMS envelope encryption.
#
# Introduces the `USER#<tinoUserId>#CAP#<capId>` partition; replaces the existing
# single-user envelope helpers (`packages/aws/src/encryption/envelope.ts`,
# `provider.ts`) with a richer CryptoAdapter abstraction whose EncryptionContext
# is `{ userId, capabilityId, fieldName }` (vs the current `{ userId }` only).
# Migrates the bot owner's existing global gmail / slack-personal / calendar
# credentials into a per-user partition and clears the global blobs. Adds a
# console "Your capabilities" page distinct from the existing org page. Adds
# the history-writer seam (`appendToolResult` + default-allow `PrivacyFilter`)
# that wave 3.5 hooks into.
#
# IMPORTANT — depends on waves 0 and 1:
#   - identityResolver.resolveGoogle(email) -> tinoUserId  (wave 0)
#   - SYSTEM_USER_ID, bootstrapAdminTinoUserId               (wave 0)
#   - PrivateCapability.buildToolsForUser(...)               (wave 1)
#   - registry.sharedTools / buildPrivateTools(userId)       (wave 1)
#   - slackPersonalCapability module                         (wave 1)
# These are referenced as if they exist; if executing wave_2 standalone, ensure
# waves 0 and 1 are landed first.

items:
  - id: a1
    intent: |
      The CryptoAdapter encrypts and decrypts payloads, requiring an exact
      encryption-context match `{ userId, capabilityId, fieldName }`. Mismatched
      context fails decrypt cryptographically — at the KMS API for production
      (KMS rejects with InvalidCiphertextException), at the AES-GCM AAD for
      local dev (auth-tag verification fails). Both adapters produce the same
      EnvelopeCiphertext shape and accept the same EncryptionContext schema.
    checked: true
    files:
      - path: packages/aws/src/crypto/types.ts
        isNew: true
        change: |
          Define EncryptionContext (userId, capabilityId, fieldName), EnvelopeCiphertext
          (ciphertext, encryptedDataKey, iv, authTag, alg), and the CryptoAdapter
          interface (encrypt(plaintext, ctx) / decrypt(ct, ctx)). Export from
          @tino/aws/crypto.
      - path: packages/aws/src/crypto/kms-adapter.ts
        isNew: true
        change: |
          createKmsAdapter({ kmsKeyArn, region, logger }) — production AWS KMS
          adapter. encrypt: GenerateDataKey (KeySpec=AES_256, EncryptionContext)
          → AES-256-GCM with random 12-byte IV, AAD = JSON.stringify(ctxRecord),
          16-byte auth tag → return base64-encoded envelope, alg='AES-256-GCM/v1'.
          decrypt: Decrypt(EncryptionContext) → AES-256-GCM verify auth tag.
          Zero out plaintext data key after use (dataKey.fill(0)).
      - path: packages/core/src/crypto/local-adapter.ts
        isNew: true
        change: |
          createLocalCryptoAdapter({ devKey?: string }) — dev-only AES-GCM-with-
          static-key. Mirror kms-adapter shape; derive the data key with
          crypto.scryptSync(env.LOCAL_DEV_CRYPTO_KEY ?? 'dev-key', 'salt', 32);
          skip the GenerateDataKey/Decrypt round trips (encryptedDataKey field
          is the same scrypt-derived bytes, base64). Still uses AAD = ctx JSON
          so context-mismatch fails decrypt locally too.
      - path: packages/core/src/crypto/factory.ts
        isNew: true
        change: |
          createCryptoAdapter(env, logger) → KmsAdapter when KMS_KEY_ARN is
          set, otherwise LocalCryptoAdapter. Mirror of persistence/factory.ts:
          dynamic import of @tino/aws/crypto when KMS path selected so core
          stays free of AWS SDK.
      - path: packages/aws/tests/crypto/kms-adapter.test.ts
        isNew: true
        change: |
          aws-sdk-client-mock based tests:
          (1) encrypt then decrypt with same context recovers plaintext;
          (2) decrypt with mismatched userId throws (KMS InvalidCiphertext mocked);
          (3) decrypt with mismatched capabilityId throws;
          (4) decrypt with mismatched fieldName throws;
          (5) envelope contains all fields (ciphertext, encryptedDataKey, iv, authTag, alg);
          (6) alg field is 'AES-256-GCM/v1';
          (7) GenerateDataKeyCommand sent with EncryptionContext={userId,capabilityId,fieldName};
          (8) DecryptCommand sent with the same EncryptionContext.
      - path: packages/core/tests/crypto/local-adapter.test.ts
        isNew: true
        change: |
          Same 8 cases as kms-adapter.test.ts but against the local AES adapter.
          Real AES-GCM (no mocks). Mismatched-context throws via auth-tag failure.
    tests:
      - packages/aws/tests/crypto/kms-adapter.test.ts
      - packages/core/tests/crypto/local-adapter.test.ts
    verify: bun --bun ./node_modules/vitest/dist/cli.js run packages/aws/tests/crypto/ packages/core/tests/crypto/
    mirror: packages/aws/src/encryption/envelope.ts
    context: |
      // packages/aws/src/encryption/envelope.ts — the EXISTING helper
      // (wave 2 deprecates this in favor of the richer CryptoAdapter):
      //
      // export interface EncryptedValue {
      //   ciphertext: string;     // base64 AES-256-GCM (16-byte auth tag appended)
      //   dataKey: string;        // base64 KMS-encrypted data key
