  - id: a8
    intent: |
      The history-writer seam exists and is the single path through which
      tool results enter HISTORY#<userId>. The default PrivacyFilter
      persists every tool result body unchanged (wave-2 behavior).
      A stubbed filter returning persist:false causes the placeholder to
      be written in the body's place. runAgent (the only production
      producer of tool results) routes through the seam when historyAppender
      is provided. Boundary enforcement: a structural test scans every
      file under packages/core/src and fails if any file outside the seam
      itself or agent/run.ts BOTH calls history.append( AND references
      "tool-result". Wave 3.5 is therefore a one-line filter swap at the
      construction site in index.ts.
    checked: false
    files:
      - path: packages/core/src/agent/history-appender.ts
        isNew: true
        change: |
          Define and export:
            - type ToolResultPlaceholder = { type: 'redacted'; reason; metadata }
            - type Decision = { persist: true } | { persist: false; placeholder: ToolResultPlaceholder }
            - interface PrivacyFilter { evaluate(args): Decision }
            - interface ToolResultAppender { appendToolResult(input): Promise<void> }
            - export function createHistoryAppender(deps: { history; privacyFilter; logger }): ToolResultAppender
            - export const defaultPrivacyFilter: PrivacyFilter (returns { persist: true })
          The seam consults privacyFilter.evaluate(); on persist:false it
          writes the placeholder (one ModelMessage row whose tool-result
          content part is the placeholder JSON, not the original body).
          On persist:true it writes the original body unchanged.
          Module exports ONLY appendToolResult/createHistoryAppender/
          types/defaultPrivacyFilter — no raw store mutators.
      - path: packages/core/src/agent/run.ts
        isNew: false
        change: |
          Add optional `historyAppender?: ToolResultAppender` to RunAgentParams.
          When provided, decompose result.response.messages: assistant messages
          go through `history.append` directly; each tool-result content part
          is routed through `historyAppender.appendToolResult` with
          capabilityId = toolNameToCapabilityId(toolName).
          When undefined, preserve the legacy `history.append(userId,
          result.response.messages)` behavior — no regression for existing
          callers / tests.
          Add helper `toolNameToCapabilityId(toolName)`:
            gmail_*       → 'gmail'
            slack_*       → 'slack'   (or 'slack-personal' when prefix matches)
            calendar_*    → 'calendar'
            github_*      → 'github'
            linear_*      → 'linear'
            cloudwatch_*  → 'cloudwatch'
            set_preference|get_preferences|schedule_task|list_tasks|cancel_task → 'core'
            (anything else) → 'unknown'
          Default-allow on 'unknown' is the filter's job, NOT this helper.
      - path: packages/core/src/index.ts
        isNew: false
        change: |
          Construct the historyAppender once at startup with
          defaultPrivacyFilter and thread it into all three runAgent
          call sites: the slack DM handler, the findWork onNewWork
          callback, and the scheduler runTask closure. Wave 3.5 swaps
          defaultPrivacyFilter for the real filter at this single
          construction site — no run.ts/call-site changes.
      - path: packages/core/tests/agent/history-appender.test.ts
        isNew: true
        change: |
          Unit tests:
            - default filter persists tool result body unchanged
            - filter returning persist:false writes the placeholder
            - raw history-store mutators are not importable outside
              the history module (structural scan: every file under
              packages/core/src is read; assert that no file other than
              agent/history-appender.ts or agent/run.ts BOTH calls
              `history.append(` AND references the literal string
              `"tool-result"`)
      - path: packages/core/tests/agent/run-history-seam.test.ts
        isNew: true
        change: |
          End-to-end tests proving the seam IS the single path:
            - with historyAppender provided, tool-result messages route
              through the privacy filter (filter consulted exactly once
              per tool-result with the correct capabilityId)
            - with historyAppender provided and filter returning persist:false,
              the placeholder is what reaches history (NOT the original body)
            - without historyAppender, falls back to the legacy raw-append
              behavior (no regression for pre-wave-2 callers / existing
              run.test.ts harness)
    tests:
      - packages/core/tests/agent/history-appender.test.ts
      - packages/core/tests/agent/run-history-seam.test.ts
    verify: |
      bun --bun ./node_modules/vitest/dist/cli.js run packages/core/tests/agent/history-appender.test.ts packages/core/tests/agent/run-history-seam.test.ts
    mirror: packages/core/src/agent/history.ts
    context: |
      // packages/core/src/agent/run.ts (current — wave 1 shape; wave 2 inserts the seam)
      export async function runAgent(params: RunAgentParams): Promise<string> {
        const { model, history, logger, tools, userId, text, auditLogger, activeCapabilities = [] } = params;
        await history.append(userId, [{ role: 'user', content: text }]);
        const result = await generateText({ model, system: ..., messages: ..., tools: ..., stopWhen: stepCountIs(10) });
        await history.append(userId, result.response.messages);  // ← wave 2: split through historyAppender
        // ... audit log + output validation ...
        return responseText;
      }
      //
      // packages/core/src/agent/history.ts (existing) — interface and trim()
      // helper. The ToolResultAppender is NOT a HistoryStore; it composes one
      // (`deps: { history: HistoryStore; privacyFilter; logger }`). Existing
      // call-sites that use HistoryStore directly for non-tool-result writes
      // (assistant messages, user messages) keep working.
      //
      // The boundary is structural, not enforced by module-system tricks:
      // a test walks every file under packages/core/src and fails if any
      // file outside agent/history-appender.ts or agent/run.ts both calls
      // `history.append(` AND references the literal string `"tool-result"`.
      // That's the cheapest signal that catches a new producer of tool-results
      // bypassing the seam, without requiring the canonical agent/history
      // module to be unexported (it's still re-exported because @tino/aws's
      // dynamo/history.ts implements HistoryStore).
    conventions: |
      One default export site = the seam in agent/history-appender.ts.
      runAgent must be the ONLY production producer of tool-result rows in
      HISTORY#<userId> — the structural test enforces this.
      Decision union has discriminator `persist` (boolean literal). Use
      `persist: true as const` when constructing the default decision.
      Logger fields: { capabilityId, toolName, persist: 'yes' | 'redacted' }.

