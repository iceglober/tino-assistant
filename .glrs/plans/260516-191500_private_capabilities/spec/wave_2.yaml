          on line 52 with a loop over result.steps[].toolResults that calls
          appendToolResult for each tool-result, plus a separate path for
          assistant messages (which still call history.append directly — the
          seam is for TOOL RESULTS specifically). Take the historyAppender
          via RunAgentParams (or via a constructor in the registry).
      - path: packages/core/src/index.ts
        isNew: false
        change: |
          Construct historyAppender = createHistoryAppender({ history,
