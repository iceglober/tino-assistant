    files:
      - path: packages/aws/src/pulumi/tino-service.ts
        isNew: false
        change: |
          Update the kmsKey policy at lines ~374-408 to add a third statement
          (alongside EnableRootAccountFullAccess and AllowCloudWatchLogs):
            Sid: 'AllowTaskRoleEncryptDecryptWithUserContext',
            Effect: 'Allow',
            Principal: { AWS: taskRoleArn },
            Action: ['kms:GenerateDataKey', 'kms:Decrypt'],
            Resource: '*',
            Condition: {
              StringLike: {
                'kms:EncryptionContext:userId': '*',
