      //   const generateCmd = new GenerateDataKeyCommand({
      //     KeyId: kmsKeyId, KeySpec: "AES_256",
      //     EncryptionContext: { userId },          // <-- wave 2 widens to {userId,capId,field}
      //   });
      //   const { Plaintext, CiphertextBlob } = await kmsClient.send(generateCmd);
      //   const iv = crypto.randomBytes(12);
      //   const cipher = crypto.createCipheriv("aes-256-gcm", Buffer.from(Plaintext), iv);
      //   const encrypted = Buffer.concat([cipher.update(plaintext, "utf8"), cipher.final(), cipher.getAuthTag()]);
      //   Plaintext.fill(0);
