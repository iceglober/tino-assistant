  - id: a2
    intent: |
      UserCapabilityStore stores per-user capability configs with envelope-encrypted
      credentials. `set` encrypts every credentials.* field on write; `get` decrypts
      every field on read. Different (userId, capabilityId) partitions are isolated
      in storage and by encryption context. `list` returns enabled flags without
      decrypting credentials. `delete` returns true on existing entry, false on
      missing. Each credential field gets its own GenerateDataKey/envelope so adding
      or removing a single field doesn't re-encrypt the others.
    checked: true
    files:
      - path: packages/core/src/persistence/user-capabilities.ts
        isNew: true
        change: |
          Define UserCapabilityStore interface (get, set, list, delete) +
          createSqliteUserCapabilityStore({ dbPath, crypto }) implementation.
          Sqlite table: user_capability(tino_user_id, capability_id, enabled,
          credentials_json, settings_json) PRIMARY KEY(tino_user_id, capability_id).
          credentials_json stores `Record<fieldName, EnvelopeCiphertext>` as JSON.
          On set: walk config.credentials, encrypt each via crypto.encrypt(value,
          { userId, capabilityId, fieldName }), JSON-stringify the map. On get:
          parse map, decrypt each, return plaintext credentials.
      - path: packages/aws/src/persistence/dynamo/user-capabilities.ts
        isNew: true
        change: |
          createDynamoUserCapabilityStore(table, crypto) — dynamo implementation.
          pk='USER#<tinoUserId>#CAP#<capId>', sk='USER#<tinoUserId>#CAP#<capId>'.
          Same encrypt-on-write / decrypt-on-read flow as sqlite. Uses
          createUserCapabilityEntity. list() runs a scan or GSI on
          pk-begins-with(`USER#<tinoUserId>#CAP#`) — confirm the table layout
          supports this pattern; if not, add a GSI or denormalize a list-marker.
      - path: packages/aws/src/persistence/dynamo/entities.ts
        isNew: false
        change: |
          Add createUserCapabilityEntity(table) using dynamodb-toolbox v2:
          schema = item({ pk, sk, tinoUserId, capabilityId, enabled (boolean),
          credentialsJson, settingsJson, updatedAt }). timestamps: false (matches
          all other entities). Update the file's top-of-file key-pattern comment
          to document USER#<tinoUserId>#CAP#<capId>.
      - path: packages/core/src/persistence/factory.ts
        isNew: false
        change: |
          Add `userCapabilities: UserCapabilityStore` to Persistence interface.
          Wire through both adapters. Sqlite path: createSqliteUserCapabilityStore({
          dbPath, crypto: localCrypto }). Dynamo path: createDynamoPersistence
          builds the dynamoUserCapabilityStore(table, kmsCrypto). The factory
          accepts the cryptoAdapter (created via createCryptoAdapter) as a new
          dependency.
      - path: packages/aws/src/persistence/dynamo/index.ts
        isNew: false
        change: |
          createDynamoPersistence now accepts (or constructs) a CryptoAdapter
          and threads it into the user-capabilities store. Add the new field
          to DynamoPersistence interface.
      - path: packages/core/tests/persistence/user-capabilities.test.ts
        isNew: true
        change: |
          Integration tests over both sqlite (real bun:sqlite tmp file) and
          dynamodb-local. Cases:
          (1) set then get round-trips plaintext credentials;
          (2) different users do not share capability state (set userA, get
              userB returns null);
          (3) different capabilities for same user are isolated;
          (4) list returns enabled flags only (no credentials field decrypted);
          (5) delete returns true on existing, false on missing;
          (6) settings (plaintext) round-trip through set/get unchanged.
          Use LocalKmsAdapter for both — see wave 2's open-question note about
          dynamodb-local + KMS.
    tests:
      - packages/core/tests/persistence/user-capabilities.test.ts
    verify: bun --bun ./node_modules/vitest/dist/cli.js run packages/core/tests/persistence/user-capabilities.test.ts
    mirror: packages/aws/src/persistence/dynamo/config.ts
    context: |
