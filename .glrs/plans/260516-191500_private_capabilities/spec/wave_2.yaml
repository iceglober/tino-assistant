  - id: a6
    intent: |
      A user's get path cannot accidentally decrypt another user's credentials.
      Even if a coding bug pointed GetItem at the wrong (userId, capabilityId)
      partition, the encryption context bound at encrypt-time would not match
      the context passed at decrypt-time and KMS (or the local AES-GCM AAD
      check) would reject the operation. This is the cryptographic floor
      enforcing D4.
    checked: true
    files:
      - path: packages/core/tests/integration/wave2-cross-user-decrypt.test.ts
        isNew: true
        change: |
          (1) Seed userA's gmail credentials via userCapStore.set('userA',
              'gmail', config);
          (2) Reach into the underlying storage to grab the raw EnvelopeCiphertext
              for userA's refreshToken;
          (3) Call cryptoAdapter.decrypt(envelope, { userId: 'userB',
              capabilityId: 'gmail', fieldName: 'refreshToken' });
          (4) Assert it throws (KMS InvalidCiphertext for the kms adapter or
              auth-tag verification failure for the local adapter).
          (5) Repeat with mismatched capabilityId and mismatched fieldName.
          Cover both adapters: parametrize the suite or run twice.
    tests:
      - packages/core/tests/integration/wave2-cross-user-decrypt.test.ts
    verify: bun --bun ./node_modules/vitest/dist/cli.js run packages/core/tests/integration/wave2-cross-user-decrypt.test.ts
    mirror: packages/core/tests/crypto/local-adapter.test.ts
    context: |
      // The defense-in-depth guarantee comes from TWO places:
      //
      //   1. KMS EncryptionContext (production): if you call DecryptCommand with
      //      a different EncryptionContext than was passed to GenerateDataKey,
      //      the API returns InvalidCiphertextException. Cryptographically
      //      enforced — the data key is bound to the context at the AWS API.
      //
      //   2. AES-GCM AAD (both adapters): cipher.setAAD(JSON.stringify(ctx))
      //      means the auth tag is a function of (key, IV, plaintext, ctx).
      //      A different ctx → tag mismatch → decipher.final() throws.
      //
      // The test demonstrates both layers work even if the application code
      // were buggy. Its existence is part of the security review evidence.
    conventions: |
      vitest. Reach into the storage adapter via either a `getRawEnvelope` test
      helper or by reading the underlying sqlite/dynamo entry directly. Same
      approach used in audit/dynamo tests for direct table inspection.

  - id: a7
    intent: |
      The KMS key policy requires userId AND capabilityId in the EncryptionContext
      for any kms:Decrypt or kms:GenerateDataKey call from the ECS task role.
      The `Null: { ... 'false' }` condition ensures the keys must be PRESENT
      (not just any value). Verified via Pulumi preview output. The existing
      CloudWatch Logs statement (which uses ArnLike on aws:logs:arn) stays
      unchanged.
