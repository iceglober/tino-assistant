  - id: a8
    intent: |
      The history-writer seam exists and is the single path through which
      tool results enter HISTORY#<userId>. The default PrivacyFilter persists
      every tool result body unchanged (wave-2 behavior). A stubbed filter
      returning persist:false causes the placeholder to be written in the
      body's place. Direct writes from anywhere else are blocked at the
      module-boundary level (raw history-store mutators are not exported,
      enforced by an eslint/biome rule).
