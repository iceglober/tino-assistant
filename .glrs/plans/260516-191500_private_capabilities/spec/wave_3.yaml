# spec/wave_3.yaml
# Wave 3: multi-user slack DM + per-user agent dispatch.
#
# Drops the `ALLOWED_SLACK_USER_ID` hard gate in the slack DM handler in favour
# of an identity-table lookup (waves 0 + 2). Routes each DM through a new
# `resolveDmSender` gate that handles allowlist vs org-domain modes, suspended
# vs invited vs active status, and per-user runAgent dispatch. Adds admin-only
# org-config + user-management routes and a `requireAdmin` middleware. Migrates
# better-auth sessions from `/tmp/tino-auth.db` to a DynamoDB-backed
# `secondaryStorage` adapter so multi-user deployments survive ECS restarts.
# Ships minimal Users + AccessControl pages so the bot owner can manually
# invite a teammate before wave 4 lands the polished UI.
#
# IMPORTANT — depends on waves 0, 1, 2:
#   - identityResolver.resolveSlack(slackId) -> tinoUserId | null      (wave 0)
#   - identityResolver.resolveGoogle(email)  -> tinoUserId | null      (wave 0)
#   - identityResolver.provisionFromSlack(...) -> { id, ... }          (wave 0)
#   - users store with { status, role, slackUserId } fields            (wave 0)
#   - registry.sharedTools / buildPrivateTools(userId)                 (wave 1)
#   - getActiveCapabilities(userId)                                    (wave 1)
#   - per-user encrypted credential partitions                         (wave 2)
#
# IMPORTANT — path notes (executor: read carefully):
#   - The plan-doc paths `tests/...` map to `packages/core/tests/...` in this
#     repo (tests are co-located per package; no repo-root `tests/` dir
#     exists). Files below use the plan-doc paths verbatim; if creating real
#     files, use `packages/core/tests/...`.
#   - The plan-doc paths `packages/core/console-app/src/pages/...` map to
#     `packages/core/src/console-app/pages/...` (console-app is nested
#     under src/, not a sibling). Same handling: paths below match the plan;
#     real files belong under `packages/core/src/console-app/pages/`.
#   - The plan-doc says `bun run test` and `bun:test`; THIS REPO USES VITEST
#     (`vitest` is in package.json, all existing tests `import from "vitest"`).
#     Use `vitest` / `bun run test` (bun script wraps vitest) and
#     `import { describe, it, expect, vi } from "vitest"`.

items:
  - id: a1
    intent: |
      The slack DM handler no longer rejects based on ALLOWED_SLACK_USER_ID.
      Instead it resolves the sender's slack id via the identity table,
      falling back to allowlist or org-domain auto-provisioning depending on
      the configured mode. The gate logic lives in a new `resolveDmSender`
      function that is unit-testable in isolation; `app.ts` becomes a thin
      caller.
    checked: true
    files:
      - path: packages/core/src/slack/resolve-dm-sender.ts
        isNew: true
        change: |
          Export `resolveDmSender(slackUserId, opts) -> Promise<string | null>`.
          opts: { identityResolver, users, configStore, say, auditLogger, logger }.
          Returns the sender's tino-UUID on success, or null on rejection
          (caller stops processing). On rejection, this function is responsible
          for sending the rejection DM via `opts.say` and writing the audit
          entry — the caller does not duplicate that work.

          Six paths:
            1. identity hit + status=='active'           -> return tinoUserId
            2. identity hit + status=='invited'          -> flip to 'active' (ConditionExpression on status='invited' for idempotency), return tinoUserId
            3. identity hit + status=='suspended'        -> say "your access has been revoked.", audit denied, return null
            4. miss + accessControl.mode=='allowlist'    -> say "i don't recognize you. ask your admin to add you to tino.", audit denied (userId='UNKNOWN_SLACK_USER'), return null
            5. miss + accessControl.mode=='org-domain' + email matches -> provisionFromSlack, audit success, return new tinoUserId
            6. miss + accessControl.mode=='org-domain' + email mismatch / unknown_user -> say domain-mismatch rejection, audit denied with err.code, return null

          Read access-control config via `configStore.getTyped('org.accessControl', { mode: 'allowlist', orgDomain: undefined })`.
      - path: packages/core/src/slack/app.ts
        isNew: false
        change: |
          Replace lines 47-50 (the `if (m.user !== env.ALLOWED_SLACK_USER_ID)` gate)
          with `const tinoUserId = await resolveDmSender(m.user, opts); if (!tinoUserId) return;`.
          Update `handleDmMessage` params to take the deps `resolveDmSender`
          needs (identityResolver, users, configStore) and pass them through.
          Rename `onDmFromOwner` -> `onDmFromUser` and update the `DmHandler`
          type comment to clarify userId is now a tino-UUID, not a slack id.
          The login-audit block at lines 60-68 moves into `resolveDmSender`
          (already audits success/denied there); remove the duplicate here.
      - path: packages/core/src/index.ts
        isNew: false
        change: |
          Update the `handler: DmHandler` closure (line 175-185) so userId
          flowing into runAgent is the tino-UUID resolveDmSender returned.
          Build per-user toolset before runAgent: `const privateTools = await
          registry.buildPrivateTools(userId); const tools = { ...registry.sharedTools, ...privateTools };
          const activeCapabilities = await registry.getActiveCapabilities(userId);`
          Pass the new tools+activeCapabilities to runAgent (replaces
          `registry.tools` / `registry.capabilityIds`). Pass the resolveDmSender
          deps (identityResolver, users, configStore) into createSlackApp so it
          can wire them into handleDmMessage.
    tests:
      - packages/core/tests/slack/resolve-dm-sender.test.ts::"known slack user returns tinoUserId"
      - packages/core/tests/slack/resolve-dm-sender.test.ts::"unknown user in allowlist mode is rejected"
      - packages/core/tests/slack/resolve-dm-sender.test.ts::"unknown user in org-domain mode with matching email auto-provisions"
      - packages/core/tests/slack/resolve-dm-sender.test.ts::"unknown user in org-domain mode with non-matching email is rejected"
    verify: bun run test packages/core/tests/slack/resolve-dm-sender.test.ts
    mirror: packages/core/src/slack/reset.ts
    context: |
      // packages/core/src/slack/app.ts:42-50 — current gate to replace
      if (!m.user) {
        logger.debug("ignored DM with no user");
        return;
      }

      if (m.user !== env.ALLOWED_SLACK_USER_ID) {
        logger.warn({ user: m.user, channel: m.channel }, "rejected DM from non-allowlisted user");
        return;
      }

      // packages/core/src/slack/app.ts:60-68 — current login-audit (move into resolveDmSender)
      if (auditLogger && seenUsers && !seenUsers.has(m.user)) {
        seenUsers.add(m.user);
        await auditLogger.log({
          userId: m.user,
          action: "login",
          status: "success",
        });
      }

      // packages/core/src/index.ts:175-185 — current DmHandler (userId is slack id today)
      const handler: DmHandler = async (userId, text) =>
        runAgent({
          model,
          history,
          logger,
          tools: registry.tools,
          userId,
          text,
          auditLogger,
          activeCapabilities: registry.capabilityIds,
        });
    conventions: |
      - ESM imports with `.js` extension on relative imports (NodeNext resolution).
      - Named exports only; no default exports.
      - Test framework is VITEST, not bun:test (despite the plan-doc wording).
        Import: `import { describe, it, expect, vi } from "vitest";`.
      - Audit logger shape: `auditLogger.log({ userId, action: 'login', status: 'denied'|'success', errorMessage? })`.
      - Logger is the `AppLogger` interface from `slack/app.ts` (debug/info/warn/error).
      - ConfigStore reads via `configStore.getTyped<T>(key, fallback)`.

  - id: a2
    intent: |
      A suspended user's DM is rejected with a clear message and an audit
      entry. An invited user's first DM activates them (status flips
      'invited' -> 'active' atomically via DynamoDB ConditionExpression) and
      is processed normally.
    checked: true
    files:
      - path: packages/core/src/slack/resolve-dm-sender.ts
        isNew: true
        change: |
          Path 2 (invited): use the user-store update with a DynamoDB
          ConditionExpression `status = :invited` so two rapid DMs from the
          same invited user can't double-activate (idempotent flip). After
          the flip succeeds OR the ConditionExpression fails because
          another concurrent flip already activated, return the tinoUserId
          either way. Path 3 (suspended): `opts.say({ text: 'your access to
          tino has been revoked. ask your admin if this is a mistake.' });
          await opts.auditLogger.log({ userId, action: 'login', status:
          'denied', errorMessage: 'suspended' }); return null;`.
    tests:
      - packages/core/tests/slack/resolve-dm-sender.test.ts::"suspended user is rejected with revocation message"
      - packages/core/tests/slack/resolve-dm-sender.test.ts::"invited user is activated on first DM"
    verify: bun run test packages/core/tests/slack/resolve-dm-sender.test.ts
    mirror: packages/core/src/server/routes/users.ts
    context: |
      // packages/core/src/server/routes/users.ts:24-52 — pattern for user-status mutation
      app.delete("/:userId", async (c) => {
        const targetUserId = decodeURIComponent(c.req.param("userId"));
        if (!targetUserId) return c.json({ error: "Missing userId" }, 400);

        // 1. Set user status to deactivated
        await config.set(`user.${targetUserId}.status`, "deactivated");
        // ... audit log on action ...
      });

      // packages/core/src/audit/logger.ts:14-34 — AuditEntry shape
      export interface AuditEntry {
        timestamp: number;
        userId: string;
        action: "tool_call" | "config_change" | "login" | "capability_toggle"
              | "task_scheduled" | "task_executed" | "injection_suspected"
              | "user_deprovisioned" | "admin_restart";
        status: "success" | "error" | "denied";
        errorMessage?: string;
      }
    conventions: |
      - User-store updates that flip status MUST use DynamoDB
        ConditionExpression (idempotent on concurrent writes). The wave-0
        users store is expected to expose `users.update(id, patch, { conditionExpression })`.
      - Reject messages are plain prose, lowercase, no exclamation marks
        (matches the existing tone in slack/reset.ts and resolve-dm-sender's
        sibling functions).

