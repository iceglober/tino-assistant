  - id: a5
    intent: |
      Better-auth sessions persist across ECS restarts via the DynamoDB
      `secondaryStorage` adapter. A session set before a simulated restart
      is still readable after. Local dev keeps better-auth's built-in
      in-memory store (no adapter passed when no DynamoDB table configured).
    checked: true
    files:
      - path: packages/core/src/server/middleware/dynamo-session-store.ts
        isNew: true
        change: |
          Export `createDynamoSessionStore({ table, logger }) -> SecondaryStorage`.
          Implements better-auth's `SecondaryStorage` interface:
            get(key)            -> string | null     // null on cache miss
            set(key, value, ttl?) -> void            // ttl in seconds
            delete(key)         -> void
          DynamoDB schema:
            pk = "SESSION#"+key
            sk = "SESSION#"+key
            value = the raw string better-auth passed in
            expiresAt = ttl ? Math.floor(Date.now()/1000) + ttl : undefined
          The DynamoDB table's TTL attribute is `expiresAt` (verify via
          pulumi; if the existing TTL field has a different name, configure
          it in this wave). Errors from DynamoDB SDK propagate; better-auth
          treats throws from secondaryStorage as fatal.
      - path: packages/core/src/server/middleware/auth.ts
        isNew: false
        change: |
          (1) Pass `secondaryStorage` to the `betterAuth` config: prefer
              `opts.sessionStore` if provided (DI for tests), else
              `createDynamoSessionStore({ table, logger })` when DynamoDB
              is configured, else undefined (better-auth uses its built-in
              in-memory store).
          (2) Remove the lines 14-31 doc comment about `/tmp/tino-auth.db`
              being acceptable. Replace with: "Sessions persist in DynamoDB
              via secondaryStorage so multi-user deployments survive ECS
              restarts. Local dev uses better-auth's built-in in-memory
              store when no DynamoDB table is configured."
          (3) Plumb a new optional `sessionStore?: SecondaryStorage` into
              `createAuth` opts.
    tests:
      - packages/core/tests/server/dynamo-session-store.test.ts::"set then get round-trips a session value"
      - packages/core/tests/server/dynamo-session-store.test.ts::"set with TTL sets the dynamo expiresAt field"
      - packages/core/tests/server/dynamo-session-store.test.ts::"get after delete returns null"
      - packages/core/tests/server/auth-middleware.test.ts::"session survives a process restart simulation"
    verify: bun run test packages/core/tests/server/dynamo-session-store.test.ts packages/core/tests/server/auth-middleware.test.ts
    mirror: packages/core/src/persistence/factory.ts
    context: |
      // packages/core/src/server/middleware/auth.ts:32-73 — current createAuth
      export async function createAuth(opts: {
        googleClientId: string;
        googleClientSecret: string;
        allowedDomain?: string;
        baseUrl: string;
        dbPath?: string;
        logger?: AppLogger;
      }): Promise<Auth> {
        // ...
        const auth = betterAuth({
          baseURL: opts.baseUrl,
          secret,
          database: new Database(opts.dbPath ?? "./tino-auth.db"),
          socialProviders: { google: { clientId: ..., clientSecret: ... } },
          session: { expiresIn: 60 * 60 * 24 },
        }) as unknown as Auth;
        const { runMigrations } = await getMigrations((auth as any).options);
        await runMigrations();
        return auth;
      }

      // The sqlite `database` field stays — better-auth still uses it for
      // user/account tables. Only the SESSION storage moves to DynamoDB
      // via the new secondaryStorage option.
    conventions: |
      - The wave-0 / wave-2 dynamo helpers expose a `TinoTable` opaque type
        whose put/get/delete methods are the canonical write/read API.
        Do not reach into `@aws-sdk/client-dynamodb` directly from this
        adapter — go through `TinoTable`.
      - DynamoDB TTL eviction is best-effort and can lag by up to 48h. The
        adapter's `get()` MUST also check `expiresAt` and treat any item
        whose `expiresAt < now` as a miss (return null). This avoids
        better-auth handing a stale session to a caller during the lag
        window.

  - id: a6
    intent: |
      The auth middleware stashes the requesting user's tino-UUID, role,
      and status on the request context. Routes that use the requireAdmin
      middleware reject member-role users with 403 and let admins through.
      AuthVariables.user.id changes meaning: it was better-auth's user.id;
      it is now the tino-UUID (resolved via identityResolver.resolveGoogle).
    checked: true
    files:
      - path: packages/core/src/server/middleware/auth.ts
        isNew: false
        change: |
          Update `AuthVariables` (line 78-84) so `user` includes role,
          status, and slackUserId:
            type AuthVariables = {
              user: {
                id: string;          // tino-UUID (NOT better-auth's user.id)
                email: string;
                name?: string;
                role: 'admin' | 'member';
                status: 'active' | 'invited' | 'suspended';
                slackUserId?: string;
              };
            };
          Update `buildAuthMiddleware` (line 100-148) to:
            (1) After session check, call `identityResolver.resolveGoogle(session.user.email)`.
            (2) If null AND email-domain matches `org.accessControl.orgDomain`
                in org-domain mode, auto-provision a member-role tino user
                via `identityResolver.provisionFromEmail(email)`.
            (3) If null otherwise -> 403 "your account is not provisioned in
                tino — ask your admin."
            (4) If `user.status === 'suspended'` -> 403 "your access has
                been revoked."
            (5) Stash the tino user (id=tinoUserId, role, status) on context.
          Plumb `identityResolver`, `users`, `configStore` into the
          middleware factory opts.
      - path: packages/core/src/server/middleware/require-admin.ts
        isNew: true
        change: |
          export function requireAdmin(): MiddlewareHandler<{ Variables: AuthVariables }> {
            return async (c, next) => {
              const user = c.get('user');
              if (user.role !== 'admin') {
                return c.json({ error: 'forbidden', message: 'admin role required' }, 403);
              }
              await next();
            };
          }
      - path: packages/core/src/server/index.ts
        isNew: false
        change: |
          Attach `requireAdmin()` to `/api/org/*` and `/api/users/*` route
          mounts (wave 4 will also attach it to `/api/audit/*`). Pass the
          new middleware deps (identityResolver, users, configStore) into
          buildAuthMiddleware via StartServerOptions.
    tests:
      - packages/core/tests/server/auth-middleware.test.ts::"middleware resolves session to tinoUserId via identity resolver"
      - packages/core/tests/server/auth-middleware.test.ts::"requireAdmin middleware rejects member role"
      - packages/core/tests/server/auth-middleware.test.ts::"requireAdmin middleware allows admin role"
    verify: bun run test packages/core/tests/server/auth-middleware.test.ts
    mirror: packages/core/src/server/middleware/auth.ts
    context: |
      // packages/core/src/server/middleware/auth.ts:78-84 — current AuthVariables (id is better-auth id)
      export type AuthVariables = {
        user: {
          id: string;
          email: string;
          name?: string;
        };
      };

      // packages/core/src/server/middleware/auth.ts:140-146 — current stash (replace)
      c.set("user", {
        id: session.user.id,         // <-- this becomes tinoUserId
        email: session.user.email,
        name: session.user.name,
      });
      await next();
    conventions: |
      - `MiddlewareHandler<{ Variables: AuthVariables }>` is the Hono type
        for typed middleware (mirrors existing buildAuthMiddleware return).
      - Auth-middleware tests use vitest's `vi.fn()` for resolver mocks
        and fake-Hono-context helpers. Look at the existing
        `auth-middleware.test.ts` (modify, do not replace).
      - The middleware MUST fail closed: any error from
        `identityResolver.resolveGoogle` should produce a 500 ("auth
        backend unavailable") rather than passing through.

