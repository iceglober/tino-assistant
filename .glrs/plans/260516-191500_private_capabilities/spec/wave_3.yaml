  - id: a4
    intent: |
      A malicious or buggy code path that reads another user's encrypted
      credentials cannot decrypt them — KMS rejects the decrypt because the
      encryption context does not match. This proves the cryptographic
      isolation property in the multi-user dispatch scenario (wave 2's a6
      proved the unit case).
    checked: true
    files:
      - path: packages/core/tests/integration/wave3-cross-user-isolation.test.ts
        isNew: true
        change: |
          Adversarial test. Provision two users A and B (via the wave-0
          test harness) each with their own encrypted gmail credential.
          (1) Verify direct `dynamodb:GetItem` on `USER#<userB>#CAP#gmail`
              succeeds at the dynamo level (we can read the bytes).
          (2) Attempt CryptoAdapter.decrypt(ciphertextB, { userId: userA, ... })
              and assert it throws — KMS rejects with InvalidCiphertextException
              in production; AES-GCM auth-tag failure in local dev.
          (3) Wrap the decrypt in the same path the tool layer uses
              (buildPrivateTools or equivalent) and assert the rejection
              bubbles up as a tool-loading error, not a leaked credential.
    tests:
