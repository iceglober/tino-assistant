      - packages/core/tests/integration/wave3-multi-user.test.ts::"teammate DM uses teammate's private tools (empty until they configure)"
      - packages/core/tests/integration/wave3-multi-user.test.ts::"teammate's gmail tools never appear in bot owner's runs"
